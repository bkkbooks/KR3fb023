body:
  text: 辛丑二十魯十正建子辛巳三庚辰六己酉八戊甲十丁未十二丙午朔杜氏長術正癸丑二壬午四辛巳六庚辰七己卯十戊申十二丁未朔閏六壬寅二十一魯十一正建子丙子二乙巳四甲辰六癸卯八壬寅十一辛未朔杜氏長術正丁丑二丙午四乙巳六甲辰八癸卯十壬寅十二辛丑朔按外紀目錄四乙巳作五乙亥乃刊本之譌癸卯二十二魯十二正建子庚午三己巳五戊辰六丁卯八丙寅十乙丑朔閏五五丁酉淸明六丁卯小滿杜氏長術正辛未三庚午五己巳七戊辰九丁卯十一丙寅十二乙丑朔閏十一甲辰二十三魯十三正建子甲午三癸巳五壬辰七辛卯九庚寅十一己丑朔杜氏長術正乙未二甲子四癸亥六壬戌八辛酉十庚申朔乙巳二十四魯十四正建子戊子三丁亥六丙辰八乙卯十甲寅十二癸丑朔杜氏長術正己丑三戊子五丁亥七丙戌十乙卯十二甲寅朔閏十二丙午二十五魯十五正建子癸未二壬子三辛亥五庚戌七己酉十戊寅十二丁丑朔閏二二辛巳大寒三壬子驚蟄杜氏長術正癸丑三壬子五辛亥七庚戌九己酉十一戊申朔
