body:
  text: 七丙戌九乙酉十二甲寅朔辛亥十一正甲申二癸丑四壬子六己亥八庚戌十己酉十二戊申朔閏十二十二丙子大寒按通鑑目録閏十二作明年閏二不合本紀北史二辛巳晦亦不合壬子十二正丁未四丙子六乙亥八甲戌十癸酉十二壬申朔正丁未雨水按通鑑目録正丁未作二丁未誤以閏在二月後也本紀北史通鑑七壬申晦不合癸丑十三正壬寅二辛未四庚午七己亥九戊戌十一丁酉朔甲寅十四正丙申三乙未五甲午七癸巳九壬辰十一辛酉朔閏十十辛卯小雪十一辛酉冬至按通鑑目録十一辛酉作閏十一辛酉不合禮儀志閏七亦不合今推十一辛酉朔冬至與蕭吉傳及北史合乙卯十五正庚申三己未五戊午七丁巳九丙辰十一乙卯朔丙辰十六正甲寅四癸未六壬午八辛巳十庚辰十二己卯朔按李百藥裴鏡民碑三月癸丑朔不合丁巳十七初用張胄元開皇術上元甲子以來一百四十二萬七千六百三十四年正己酉二戊寅四丁丑閏五丙子七乙亥九甲戌十二癸卯朔五乙亥夏至六丙午大暑按此術
