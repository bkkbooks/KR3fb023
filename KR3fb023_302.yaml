body:
  text: 乙巳八正丁卯三丙寅丑乙丑七甲子八癸亥十壬戌十二辛酉朔閏七七癸巳處暑八甲子秋分按紀閏五不合襄楷傳注正辛巳朔日食譌今推正丙申晦日食與紀志合丙午九正辛卯二庚申五己丑七戊子九丁亥十一丙戌朔按紀正辛亥朔不合今推辛卯朔與五行志及襄楷傳注合丁未永康元正乙酉三甲申五癸未八壬子十辛亥十二庚戌朔戊申靈帝建甯元正庚辰二己酉閏三戊申五丁未七丙午九乙巳十二甲戌朔三丁未穀雨四戊寅小滿己酉二正甲辰二癸酉四壬申六辛未八庚午十己巳十二戊辰朔按紀十庚子晦不合今推戊戌晦與五行志合柳敏碑十月有甲子亦不合庚戌三正戊戌二丁卯五丙申七乙未九甲午十一癸巳十二壬辰朔閏十一十一辛酉冬至十二壬辰大寒按通鑑目錄十二壬辰作閏十二壬辰不合辛亥四正壬戌二辛卯四庚寅七己未九戊午十一丁巳朔壬子熹平元正丙辰三乙卯五甲寅七癸丑九壬子十二辛巳朔按郙閣頌建甯五年四月十八日癸不合今
