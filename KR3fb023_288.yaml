body:
  text: 一甲戌朔丁未安帝永初元正癸酉三壬申六辛丑八庚子十己亥十二戊戌朔按袁紀二癸酉日食不合今推三月二日癸酉日食與五行志合戊申二正戊辰二丁酉四丙申六乙未八甲子十癸亥十二壬戌朔閏七七甲午處暑八甲子秋分按鄧騭討羌符六月丁未朔二十日丙寅不合己酉三正壬辰二辛酉四庚申六己未八戊午十丁巳朔庚戌四正丙戌三乙酉五甲申七癸未九壬午十一辛巳朔辛亥五正庚辰四己酉五戊申七丁未九丙午十一乙巳朔閏四四戊寅小滿五已酉夏至按通鑑目錄五戊申作六戊申宋本不譌壬子六正甲辰三癸卯五壬寅八辛未十庚午十二已巳朔癸丑七正己亥二戊辰四丁卯六丙寅八乙丑十甲子閏十二癸巳朔十二壬辰大寒甲寅元初元正癸亥二壬辰四辛卯六庚寅八已丑十戊子十二丁亥朔正癸亥雨水按本紀三癸酉日食通鑑作癸
