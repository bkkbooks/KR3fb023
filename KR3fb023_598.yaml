body:
  text: 一辛未朔正丙子雨水己未宋二遼五宋正辛未二庚子四己亥五戊辰七丁卯八丙申十一乙丑朔按宋大詔令閏九乃三年之譌遼同庚申宋三遼六宋正乙丑三甲子五癸亥六壬辰八辛卯九庚申十己未朔閏九九己丑霜降十庚申小雪按長編以七月丁亥爲二十七日不合遼正乙丑三甲子五癸亥六壬辰八辛卯閏八庚申十己未朔八己未秋分九庚寅霜降按趙知微術閏九九己丑霜降十庚申小雪今進爲庚寅霜降使與閏八相合辛酉宋四遼七宋正己丑二戊午五丁亥六丙辰八乙卯九甲申十一癸未朔遼同壬戌宋五遼八宋正癸未三壬午五辛巳七庚辰九己卯十戊申十二丁未朔按東坡集閏六薛鑑五壬午朔並不合遼同癸亥宋六遼九宋正丁丑三丙子六乙巳七甲辰九癸卯十一壬寅十二辛未朔閏六六癸酉大暑七甲辰處暑按禮志十一月甲辰冬至又云五日冬至長編丙午冬至今推五日丙午冬至甲辰譌遼朔閏同六甲戌大暑七甲辰處暑甲子宋七遼十宋正辛丑二庚午五己亥七戊戌十丁丑
