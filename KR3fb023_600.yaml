body:
  text: 十二丙寅朔按文昌雜錄九月二十一日立冬與今推二十八日乙丑立冬不合遼同乙丑宋八遼大安元宋正丙申二乙丑三甲午五癸巳八壬戌十一辛卯朔按四史朔閏攷錢侗曰東都事略八丙子日食旣誤是月丙子月食旣十朝綱要十月六日乙酉不合遼同丙寅宋哲宗元祐元遼二宋正庚寅閏二己丑三戊午五丁巳七丙辰十乙酉朔二戊子春分三戊午穀雨按遼朔攷云宋十一庚午誤遼同按朔攷云大任六丙午誤儼十己酉誤丁卯宋二遼三宋正甲寅三癸丑四壬午六辛巳七庚戌十己卯朔按四史朔閏攷錢侗曰十二月七日興龍節紀書丙戌誤差一日今攷長編哲宗生于十二月七日避僖祖忌以八日爲興龍節紀作以七日爲節誤也八日丙戌正與己卯朔合遼同戊辰宋三遼四宋正己酉二戊寅四丁丑五丙午七乙巳八甲戌十癸酉朔閏十二十二壬寅大寒遼同按朔攷云儼十二癸卯誤己巳宋四遼五宋正壬申四辛丑五庚午七己巳八戊戌十丁酉朔正癸酉雨水遼同庚午宋五遼六宋正丁卯二丙申五乙丑六甲午八癸巳
