body:
  text: 十二丙寅朔按文昌雜録九月二十一日立冬與今推二十八日乙丑立冬不合遼同乙丑宋八遼大安元宋正丙申二乙丑三甲午五癸巳八壬戌十一辛卯朔按四史朔閏考錢侗曰東都事略八丙子日食既誤是月丙子月食既十朝綱要十月六日乙酉不合遼同丙寅宋哲宗元祐元遼二宋正庚寅閏二己丑三戊午五丁巳七丙辰十乙酉朔二戊子春分三戊午穀雨按遼朔考云宋十一庚午誤遼同按朔考云大任六丙午誤儼十己酉誤丁卯宋二遼三宋正甲寅三癸丑四壬午六辛巳七庚戌十己卯朔按四史朔閏考錢侗曰十二月七日興龍節紀書丙戌誤差一日今考長編哲宗生于十二月七日避僖祖忌以八日為興龍節紀作以七日為節誤也八日丙戌正與己卯朔合遼同戊辰宋三遼四宋正己酉二戊寅四丁丑五丙午七乙巳八甲戌十癸酉朔閏十二十二壬寅大寒遼同按朔考云儼十二癸卯誤己巳宋四遼五宋正壬申四辛丑五庚午七己巳八戊戌十丁酉朔正癸酉雨水遼同庚午宋五遼六宋正丁卯二丙申五乙丑六甲午八癸巳
