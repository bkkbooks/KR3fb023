  text: 丙申二十三正建子辛巳四庚戌六己酉八戊申九丁未十一丙午朔閏八八丙子大暑九丁未處暑丁酉二十四正建子乙巳三甲辰六癸酉八壬申十辛未十二庚午朔戊戌二十五正建子庚子二己巳四戊辰六丁卯八丙寅十一乙未朔己亥二十六正建子甲午三癸巳五壬辰六辛卯八庚寅十己丑朔閏五五辛酉淸明六辛卯小滿庚子二十七正建子戊午三丁巳五丙辰七乙卯九甲寅十一癸丑朔辛丑二十八正建子壬子三辛亥六庚辰八己卯十戊寅十二丁丑朔壬寅二十九正建子丁未二丙子三乙亥五甲戌七癸酉十壬寅十二辛丑朔閏二二乙巳大寒三丙子驚蟄癸卯三十正建子辛未二庚子四已亥六戊戌八丁酉十丙甲朔甲辰三十一正建子乙丑三甲子五癸亥七壬戌九辛酉閏十庚申十二己未朔十己未秋分十一庚寅霜降乙巳三十二正建子己丑二戊午五丁亥七丙戌九乙酉十一甲申朔
