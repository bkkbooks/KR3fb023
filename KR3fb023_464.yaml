body:
  text: 庚寅周天授元正建子庚辰臘己酉二戊申四丁未五丙子七乙亥八甲辰朔按此年改國號周用子正以十一月為正月十二月為臘月夏正月為一月以十月為歲終辛卯周二正建子癸酉三壬申五辛未六庚子八己亥九戊辰朔壬辰周長壽元正建子戊辰臘丁酉四丙申閏五乙未六甲子八癸亥九壬辰朔五癸巳夏至六甲子大暑按會要九丁亥朔顏真卿麻姑仙壇銘十月壬申朔並不合癸巳周二正建子壬辰臘辛酉三庚寅五己丑七戊子九丁亥朔甲午周延載元正建子丙戌一乙酉三甲申六癸丑八壬子十辛亥朔乙未周天冊萬歲元正建子辛巳臘庚戌二己酉三戊申五丁未八丙子十乙亥朔閏二二戊寅春分三戊申穀雨按通鑑目録二己酉作一己酉乃刊本之訛丙申周萬歲通天元正建子乙巳臘甲戌二癸酉三壬寅五辛丑八庚午朔丁酉周神功元正建子己亥一戊戌三丁酉四丙寅六乙丑八甲子朔閏十十壬辰小雪按此年本無閏月明年正甲午朔丁未大雪壬戌冬至臘癸亥朔丙子小寒壬辰大寒閏
