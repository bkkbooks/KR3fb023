body:
  text: 壬戌漢五魏三吳五漢正庚午二已亥五戊辰七丁卯九丙寅十一乙丑朔魏正已巳三戊辰五丁卯八丙申十乙未十二甲午朔按魏紀注九辛未朔不合吳正已巳三戊辰六丁酉八丙申十乙未十二甲午朔癸亥漢六魏四吳六漢正甲子三癸亥五壬戌八辛卯十庚寅十二已丑朔魏正甲子二癸巳四壬辰六辛卯八庚寅十已丑朔按晉志五丁丑朔不合吳正甲子二癸巳四壬辰六辛卯八庚寅十一已未朔甲子漢七魏五吳七漢正已未二戊子閏三丁亥五丙戌七乙酉九甲申十二癸丑朔三丙戌穀雨四丁巳小滿按後主傳閏二乃刊本之訛魏正戊午三丁巳四丙辰六乙卯八甲寅十癸丑十二壬子朔閏三三丙戌穀雨四丙辰小滿按通鑑目録脫十二壬子朔吳正戊午三丁巳四丙辰六乙卯八甲寅十癸丑朔閏三三丙戌穀雨四丙辰小滿乙丑漢八魏六吳八漢正癸未二壬子四辛亥六庚戌八已酉十戊申十二丁未朔魏正壬午二辛亥五庚辰七已卯九戊寅十一丁丑朔按通鑑目録魏朔並與漢同乃刊本之訛晉志四壬子朔不合今推辛亥朔與宋志壬子不書朔合宋志十戊寅朔不合今推戊申朔與晉志合吳正壬午三辛巳五庚辰七已卯九戊寅十一
