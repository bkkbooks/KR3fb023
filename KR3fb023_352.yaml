body:
  text: 子朔閏十十丙午小雪十一丙子冬至甲午九正乙亥三甲戌五癸酉七壬申九辛未十一庚午朔按志十乙未朔不合乃明年之朔乙未咸康元正庚午二已亥四戊戌六丁酉八丙申十乙未十二甲午朔丙申二正甲子二癸巳四壬辰七辛酉八庚申十已未十二戊午朔閏七七庚寅處暑八辛酉秋分丁酉三正戊子二丁巳四丙辰六乙卯八甲寅十一癸未朔戊戌四正壬午三辛巳五庚辰七己卯九戊寅十一丁丑朔己亥五正丁丑二丙午四乙巳五甲辰七癸卯九壬寅十一辛丑朔閏四四甲戌小滿五乙巳夏至庚子六正庚子三己亥六戊辰八丁卯十丙寅十二乙丑朔辛丑七正乙未二甲子四癸亥六壬戌八辛酉十一庚寅閏十二已丑朔十二戊子大寒按元經正甲午朔紀二甲午朔並不合今推二甲子朔與志及宋志建康寅録合壬寅八正己未二戊子四丁亥六丙戌八乙酉十甲申朔正已未雨水按志及宋志正乙未朔不合今推已未朔與
