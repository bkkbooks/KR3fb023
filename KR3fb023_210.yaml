body:
  text: 明五癸未小滿應閏三丁卯六殷十辛巳十二庚辰二己卯四戊寅六丁丑八丙子朔顓十辛巳十一庚戌正乙酉三戊申五丁未七丙午朔戊辰七殷十乙亥十二甲戌二癸酉五壬寅七辛丑九庚子朔按通鑑目録二癸酉作三癸卯不合顓十乙亥十二甲戌二癸酉四壬申六辛未八庚午朔己巳八殷十庚午十一己亥正戊戌三丁酉五丙申八乙丑後九甲子朔十一丁卯冬至正戊戌大寒應閏十一顓十己巳十二戊辰三丁酉五丙申七乙未九甲午朔後九正丁卯驚蟄三戊戌春分應閏正庚午九殷十甲午十一癸亥正壬戌三辛酉五庚申七己未九戊午朔按通鑑目録三辛酉作二辛卯蓋與顓頊術互訛宋本作三辛卯亦訛顓十癸巳十二壬辰二辛卯五庚申七己未九戊午朔按通鑑目録二辛卯作三辛酉蓋與殷術互訛宋本作二辛酉亦訛辛未十殷十戊子十二丁亥二丙戌四乙酉六甲申八癸未後九壬午朔八壬子秋分後九壬午霜降應閏八顓十戊子十一丁巳正丙辰三乙卯五甲寅七癸丑後九壬午朔九辛巳霜降
