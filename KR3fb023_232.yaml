body:
  text: 二甲寅四癸丑六壬子八辛亥後九庚戌朔四壬午小滿六壬子夏至應閏四甲子六殷十庚辰十二己卯二戊寅四丁丑六丙子九乙巳朔顓十庚辰十一己酉二戊寅四丁丑六丙子八乙亥朔按荀紀四乙巳朔不合乙丑元鼎元殷十乙亥十一甲辰正癸卯三壬寅五辛丑七庚子九已亥朔顓十甲戌十二癸酉二壬申四辛未七庚子九己亥朔丙寅二殷十己巳十二戊辰二丁卯四丙寅六乙丑八甲子後九癸亥朔十二丁酉大寒二丁卯驚蟄應閏十二顓十己巳十一戊戌正丁酉三丙申五乙未七甲午後九癸亥朔正丙寅驚蟄三丁酉春分應閏正丁卯三殷十癸巳十一壬戌正辛酉四庚寅六己丑八戊子朔按通鑑目録十一壬戌作十一壬寅乃刊本之訛顓十癸已十一壬戌正辛酉三庚申五己未七戊午九丁巳朔戊辰四殷十丁亥十二丙戌二乙酉四甲申七癸丑九壬子朔後九九辛巳霜降顓十丁亥十一丙辰二乙酉四甲申六癸未八壬午後九辛巳朔九庚辰霜降己巳五殷十辛亥十二庚戌二己酉四戊申六丁未八
