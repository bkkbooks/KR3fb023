body:
  text: 庚戌宋三遼六宋正癸巳二壬戌四辛酉五庚寅七己丑八戊午十二丁巳朔按遼朔考宋二癸亥不合遼正癸巳二壬戌四辛酉五庚寅七己丑九戊子十二丁巳朔辛亥宋四遼七宋正丁亥三丙戌五乙酉六甲寅八癸丑九壬午十二辛亥朔按十朝綱要十戊子朔薛鑑十一壬子朔不合遼同壬子宋五遼八宋正辛巳四庚戌六己酉七戊寅八丁丑九丙午十二乙亥朔閏七七丁未處暑八丁丑秋分按遼閏考宋閏六不合遼朔閏同七丙午處暑八丁丑秋分癸丑宋六遼九宋正乙巳三甲辰五癸卯七壬寅九辛丑十庚午十二己巳朔按長編及遼朔考宋十二庚午不合長編十一月癸丑冬至與今推十五日甲寅冬至亦不合遼正乙巳三甲辰六癸酉七壬寅九辛丑十庚午十二己巳朔甲寅宋七遼十宋正己亥三戊戌六丁卯八丙寅十乙丑十二甲子朔遼同乙卯宋八遼大康元宋初用奉元術上元甲子以來八千三百一十八萬五千七十二年正甲午二癸亥四壬戌五辛酉八庚寅十己丑十二戊子朔閏四四辛卯小滿五辛酉夏至
