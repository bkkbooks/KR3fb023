body:
  text: 一丁未朔按紀正癸丑三已未朔紀志十一戊申朔並不合今推十一丁未朔與宋志戊申不書朔合戊辰二正丙午三乙巳五甲辰七癸卯十壬申十二辛未朔按紀志正景子朔不合今推丙午朔與宋志合己巳三正辛丑二庚午四己巳五戊辰七丁卯九丙寅十一乙丑朔閏四四丁酉小滿五戊辰夏至按通鑑目錄五戊辰作閏五戊辰不合庚午四正乙丑二甲午四癸巳六壬辰八辛卯十庚寅十二己丑朔辛未五正已未二戊子五丁巳七丙辰九乙卯十一甲寅朔壬申六正癸丑二壬子四辛亥六庚戌九己卯十一戊寅朔閏正正壬午雨水二壬子春分癸酉愍帝建興元正丁丑三丙子五乙亥七甲戌九癸酉十一壬申朔按通鑑目錄七甲戌作十甲戌乃刊本之譌甲戌二正壬申二辛丑四庚子六己亥八戊戌十丁酉十一丙申朔閏十十丙寅小雪十一丙申冬至按紀志正己巳朔不合通鑑目錄六已亥作六乙亥乃刊本之譌乙亥三正乙未四甲子六癸亥八壬戌十辛酉十二庚申朔
