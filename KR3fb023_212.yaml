body:
  text: 壬申十一殷十壬子十一辛巳二庚戌四己酉六戊申八丁未朔按通鑑目録二庚戌作正庚辰不合顓十壬子十一辛巳正庚辰三己卯五戊寅七丁丑九丙子朔十癸丑小雪癸酉十二殷十丙午十二乙巳二甲辰四癸卯七壬申九辛未朔顓十丙午十一乙亥二甲辰四癸卯六壬寅八辛丑朔甲戌十三殷十辛丑十一庚午正己巳三戊辰五丁卯七丙寅九乙丑朔後九五丙申夏至七丁卯大暑應閏五顓十庚子十二己亥二戊戌五丁卯七丙寅九乙丑朔後九五乙未夏至七丙寅大暑應閏五乙亥十四殷十乙丑十一甲午正癸巳三壬辰五辛卯七庚寅九己丑朔顓十甲子十二癸亥二壬戌四辛酉六庚申九己丑朔丙子十五殷十己未十一戊子二丁巳四丙辰六乙卯八甲寅朔顓十己未十一戊子正丁亥三丙戌五乙酉七甲申九癸未朔丁丑十六殷十癸丑十二壬子二辛亥四庚戌七己卯九戊寅朔後九正庚戌驚蟄三辛巳春分應閏正顓十癸丑十二壬子二辛亥四庚戌六己酉八戊申後九丁未朔二庚辰春分四庚戌
