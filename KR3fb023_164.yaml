body:
  text: 壬辰四十正建子己卯三戊寅五丁丑七丙子九乙亥十一甲戌朔癸巳四十一正建子甲戌二癸卯四壬寅六辛丑八庚子十己亥十二戊戌朔甲午四十二正建子戊辰二丁酉四丙申六乙丑八甲子十癸亥十二壬戌朔閏五五乙未淸明六乙丑小滿乙未四十三正建子壬辰二辛酉四庚申六己未八戊午十一丁亥朔丙申四十四正建子丙戌三乙酉五甲申七癸未九壬午十一辛巳朔丁酉四十五秦惠文王初更元周正建子辛巳二庚戌三已酉五戊申七丁未九丙午十一乙巳朔閏二二己卯大寒三己酉驚蟄秦用顓頊術甲寅蔀四十三年十建亥辛亥十二庚戌三己卯五戊寅七丁丑九丙子朔後九正己酉驚蟄三庚辰春分應閏正按秦以十月建亥為歲首閏在歲末謂之後九月不知始于何年史記秦本紀昭襄王四十八年十月在正月前則未并天下時已如此矣今因惠文王上年稱王此年改元姑從此年推起戊戌四十六秦二周正建子甲辰三癸卯六壬申八辛未十庚午十二己巳朔秦十乙亥十二甲戌二癸酉五壬寅
