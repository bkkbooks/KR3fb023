body:
  text: 戊辰宋十八金八宋正庚申三己未四戊子六丁亥八丙戌十乙丑朔閏八八乙卯秋分九丙戌霜降按紀元術同金同己巳宋十九金海陵煬王天德元宋正甲申三癸未四壬子六辛亥七庚辰十己酉朔按紀元術同高座寺新公塔記九甲戌朔蓋亦月建也金同庚午宋二十金二宋正己卯二戊申四丁未五丙子七乙亥八甲辰十癸卯朔按紀元術同四史朔閏考五丁丑朔不合金同辛未宋二十一金三宋正癸酉二壬寅閏四辛未五庚子七己亥八戊辰十丁卯朔四己巳小滿五庚子夏至按紀元術同趙雄韓蘄王廟碑八月四日壬申不合金同壬申宋二十二金四宋復用紀元術正丁酉二丙寅四乙丑六甲子八癸亥九壬辰十一辛卯朔按系年要録四丙寅七癸巳朔並不合今推七甲午朔與紀合金仍用楊級大明術正丁酉二丙寅五乙未六甲子八癸亥九壬辰十一辛卯朔按天文志十二乙卯朔又閏十二並不合癸酉宋二十三金貞元元宋正辛卯二庚申五己丑七戊子九丁亥十丙辰十二乙卯朔閏十二十二癸未大寒金同甲辰宋二十四金二宋正甲寅四癸未七壬子九辛亥十庚
