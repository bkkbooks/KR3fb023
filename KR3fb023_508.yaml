body:
  text: 甲辰四正辛亥三庚戌五己酉七戊申八丁丑十丙子十二乙亥朔按舊紀四庚申八丁酉九丙午朔通鑑八丁卯朔並不合乙巳敬宗寶曆元正乙巳四甲戌六癸酉閏七壬申八辛丑十庚子十二己亥朔七辛未處暑八壬寅秋分按舊紀六壬申閏七壬午朔並不合丙午二正己巳三戊辰六丁酉七丙寅九乙丑十一甲子朔按通鑑目錄六丁酉作五丁卯不合舊紀九丁丑朔亦不合丁未文宗大和元正癸亥三壬戌六辛卯八庚寅十己丑十二戊子朔按舊紀三庚戌朔白居易祭崔常侍文二丙午朔並不合戊申二正戊午二丁亥閏三丙戌五乙酉八甲寅十癸丑十二壬子朔三乙酉穀雨四丙戌小滿按舊紀三丁丑朔不合己酉三正壬午二辛亥四庚戌五己卯八戊申十一丁丑朔庚戌四正丙子三乙亥五甲戌六癸卯八壬寅十一辛未朔閏十二十二庚午大寒辛亥五正庚子三己亥五戊戌六丁卯八丙寅十乙丑朔正庚子雨水按通鑑目錄正月二日雨水與今推一日庚
