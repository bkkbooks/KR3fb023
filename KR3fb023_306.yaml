body:
  text: 辛酉四正甲午三癸巳五壬辰七辛卯九庚寅十己丑朔閏九九戊午霜降十己丑小雪按通鑑目録十己丑作閏十己丑不合今推閏九與紀合又推十己丑朔與潘乾校官碑合壬戌五正戊午三丁巳五丙辰七乙卯九甲寅十一癸丑朔癸亥六正壬子三辛亥六庚辰八已卯十戊寅十二丁丑朔按通鑑目録十戊寅作十一戊寅宋本不訛甲子中平元正丁未二丙子四乙亥六甲戌八癸卯十壬寅十二辛丑朔閏七七癸酉處暑八癸卯秋分乙丑二正辛未二庚子四已亥六戊戌八丁酉十丙申朔丙寅三正乙丑三甲子五癸亥七壬戌九辛酉十一庚申朔丁卯四正已未四戊子五丁亥七丙戌九乙酉十一甲申朔閏四四丁巳小滿五戊子夏至按隸釋譙敏碑七月草八日癸卯訛拓本作十八日合戊辰五正癸未三壬午五辛巳八庚戌十已酉十二戊申朔己巳六正戊寅二丁未四丙午六乙巳八甲辰十癸卯
