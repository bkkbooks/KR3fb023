body:
  text: 十一丁未朔杜氏長術正壬子四辛巳六庚辰八己卯十戊寅十二丁丑朔按外紀目録四辛巳作三辛巳乃刊本之訛癸卯頃王元魯九正建子丙午三乙巳五甲辰八癸酉十壬申十二辛未朔閏十二十二庚子小雪杜氏長術正丁未二丙子五乙巳七甲辰八癸卯十壬寅十二辛丑朔閏七甲辰二魯十正建子庚午三己巳五戊辰七丁卯九丙寅十二乙未朔正庚午冬至杜氏長術正辛未二庚子五己巳七戊辰九丁卯十一丙寅朔乙巳三魯十一正建子乙丑二甲午四癸巳六壬辰八辛卯十庚寅十二己丑朔杜氏長術正乙丑三甲子六癸巳八壬辰十辛卯十二庚寅朔丙午四魯十二正建子己未三戊午五丁巳七丙辰九乙卯十甲寅十二癸丑朔閏九九甲申處暑十乙卯秋分杜氏長術正庚申二己丑五戊午七丁巳九丙辰十一乙卯十二甲寅朔閏十一丁未五魯十三正建子癸未二壬子四辛亥七庚辰九己卯十一戊寅朔杜氏長術正甲申二癸丑五壬午七辛巳九庚辰十一己卯朔按外紀目録脫七月以下三朔戊申六魯十四正建子丁丑三丙子五乙亥七甲戌十癸卯
