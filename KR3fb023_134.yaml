body:
  text: 壬申七魯二十六正建子壬子二辛巳四庚辰六己卯八戊寅十丁丑朔杜氏長術正壬子三辛亥五庚戌七己酉九戊申十一丁未朔癸酉貞定王元魯二十七正建子丙午三乙巳四甲辰六癸卯八壬寅十辛丑十二庚子朔閏三三癸酉驚蟄四甲辰春分杜氏長術正丙午四乙亥六甲戌八癸酉九壬申十一辛未朔閏八按杜氏長術止于此年甲戌二正建子庚午三己巳五戊辰七丁卯九丙寅十一乙丑朔乙亥三正建子甲子三癸亥五壬戌八辛卯十庚寅十二己丑朔閏十二十二戊午小雪丙子四正建子戊子三丁亥五丙戌七乙酉九甲申十二癸丑朔正戊子冬至丁丑五正建子癸未二壬子四辛亥六庚戌八己酉十戊申十二丁未朔戊寅六正建子丁丑三丙子五乙亥七甲戌九癸酉十壬申十二辛未朔閏九九壬寅處暑十癸酉秋分己卯七正建子辛丑二庚午四己巳七戊戌九丁酉十一丙申朔庚辰八正建子乙未三甲午五癸巳七壬辰十辛酉十二
