body:
  text: 而絶無饜飫之一日是又非吾所願也吾之為此固種藝烹飪之事乃正所以為飽食之資特將使人人得以專求飽食之逸而不必先事乎種孰烹飪之勞焉耳是則吾識其小而人得識其大吾任其難而人將任其易雖不足稱史學而於學史之人則似不無小補矣余頗韙其言是時余方從事古文辭曰楨因前請曰頃創此書持籌握管挑燈揮汗不勝其勞吾母所親見也他日書成辨以序文可乎余笑而頷之迄今忽忽已閲二十年而其書惟史記至新舊唐書屬草粗定為書已一百餘卷自新舊五代史至明史尚未暇及僅全書三分之二約計全書之成至速亦更需數年余亟欲睹其成時加督促而舉業間之人事又擾之有萬萬不能速成之勢余衰年久病恐不及待其成故預為此序俾俟他時寫定冠諸簡端若夫是書體大文繁曰楨雖努力為之究不免力少任重且以一人精力別無佽助末及詳加覆核舛訛缺漏必多此後或曰楨學識稍進自能補改或得良友如劉仲更之流匡其不逮使得附於著作之林亦云厚幸是益非余所及知矣咸豐五年崴在乙卯秋九月辛酉朔二十九日己丑立冬善約老人汪趙棻儀姞氏撰史記三卷卷一至卷三
