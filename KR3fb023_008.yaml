body:
  text: 芳幅之紙橫書十二月每月繫朔晦於首尾細求經傳之干支日數不合即為置閏則亦猶夫杜氏之術也今先生此書雖襲杜氏長術之名而各就當時所用之術以布算則非苟以求合者視杜氏異矣且以一人持籌握管而坐致二千餘年之日至其精力固有大過人者讀其書自周迄明厯厯然如指諸掌而羣書所見朔閏有不合者則備載於每年之下蓋存其說以待後人之考定固不至削足合屨如杜氏所譏也余於是書雖無能贅一辭然其用力之勤用意之精則固深知之故不辭而書數語於簡端既喜其書之成又冀其書之流布於世為讀史者一助也光緒丁丑八月德清俞樾
  hash: sha256:24b1524f87dc360bd0a31dd64ffe2da71301b5e2660e716fcaa33f5d4fd001fc
