body:
  text: 辛巳朔後九十乙卯小雪十二乙酉冬至應閏十顓十丙戌十一乙卯正甲寅四癸未六壬午八辛巳後九庚辰朔十一甲申冬至正乙卯大寒應閏十一按荀紀閏己酉朔不合今推後九己酉晦與史本紀合壬戌文帝元殷十庚戌十二己酉二戊申四丁未六丙午八乙巳朔顓十庚戌十一己卯正戊寅三丁丑五丙子八乙巳朔癸亥二殷十甲辰正癸酉三壬申五辛未七庚午九己巳朔後九七己亥處暑九庚午秋分應閏七顓十甲辰十二癸卯二壬寅四辛丑六庚子八己亥朔後九七戊戌處暑九己巳秋分應閏七按漢本紀五行志十一癸卯晦與殷合甲子三殷十戊辰十二丁卯二丙寅五乙未七甲午九癸巳朔顓十戊辰十二丁卯二丙寅四乙丑六甲子八癸亥朔按漢本紀五行志十一丁卯晦不合乙丑四殷十癸亥十一壬辰正辛卯三庚寅五己丑八戊午朔顓十壬戌十二辛酉三庚寅五己丑七戊子九丁亥朔丙寅五殷十丁巳十二丙辰二乙卯四甲寅六癸丑八壬子後九辛亥朔三癸丑淸明五甲申小滿應閏三顓十丁巳十一丙戌正乙酉三甲申五癸未八壬子後九辛亥朔三壬子淸
