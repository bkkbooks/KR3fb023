body:
  text: 戊戌四正辛卯三庚寅五己丑七戊子八丁亥十丙戌十二乙酉朔閏七七丁巳處暑八戊子秋分己亥五正乙卯二甲申五癸丑七壬子九辛亥十一庚戌朔庚子六正己酉三戊申五丁未八丙子十乙亥十二甲戌朔按通鑑目錄五丁未作五己未宋本不譌辛丑元鳳元正甲辰二癸酉閏三壬申五辛未七庚午九己巳十二戊戌朔三辛未淸明四壬寅小滿按本紀荀紀七乙亥晦不合今推己亥晦與五行志合壬寅二正戊辰二丁酉四丙申六乙未八甲午十癸巳十二壬辰朔按通鑑目錄二丁酉作二丁未四丙申作四丙午宋本不譌癸卯三正壬戌三辛酉五庚申七已未九戊午十一丁巳十二丙辰朔閏十一十一乙酉冬至十二丙辰大寒按通鑑目錄三辛酉作二辛卯十二丙辰作閏十二丙辰並不合律秝志十一月朔旦冬至與今推廿九日乙酉冬至不合甲辰四正丙戌二乙卯四甲寅七癸未九壬午十一辛巳朔乙巳五正庚辰三乙卯五戊寅七丁丑九丙子十二乙巳朔
