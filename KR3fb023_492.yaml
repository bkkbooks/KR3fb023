body:
  text: 字丁巳十二正甲寅二癸未四壬午五辛亥七庚戌九己酉朔戊午十三正戊申三丁未五丙午六乙亥八甲戌十癸酉朔按唐大詔令六月十七日癸酉不合己未十四正壬寅四辛未閏五庚午六己亥七戊辰十丁酉朔五己巳夏至六庚子大暑按七戊辰本當進爲己巳朔當時應進失進故五月以下連三小通鑑目錄閏五庚午作五庚子不合今推五辛丑朔與傳位皇太子文二十三日癸亥代宗哀冊文二十六日景寅合舊志二丙寅朔亦不合庚申德宗建中元正丁卯二丙申四乙未五甲子七癸亥八壬辰十辛卯朔按正月本丙寅朔當時強進爲丁卯以避正旦日食辛酉二正庚申四己丑六戊子八丁亥九丙辰十一乙卯朔按舊紀四己酉七戊子朔並不合壬戌三正乙卯閏正甲申三癸未六壬子八辛亥十庚戌十一己卯朔正癸未雨水二甲寅春分癸亥四正戊寅四丁未六丙午九乙亥十一甲戌朔甲子興元元初用正元術上元甲子以來四十萬二千
