body:
  text: 甲午宋淳熙元金十四宋正己丑二戊午四丁巳五丙戌八乙卯十一甲申朔金同按五行志八丁巳朔不合乙未宋二金十五宋正甲申二癸丑三壬午五辛巳六庚戌八己酉十戊寅朔閏九九丁未霜降十戊寅小雪按正月本癸未朔當時依崇天統元二術進爲甲申紀九乙卯朔不合禮志十一月十一日冬至亦不合今推戊申朔旦冬至與兩朝編年合金同丙申宋三金十六宋正丁未三丙午五乙巳六甲戌八癸酉十壬申朔金正戊申二丁丑三丙午五乙巳六甲戌八癸酉十壬申朔丁酉宋四金十七宋初用淳熙術上元甲子以來五千二百四十二萬一千九百七十四年正壬寅二辛未四庚午六己巳七戊戌九丁酉十一丙申朔金仍用楊級大明術同戊戌宋五金十八宋正丙申三乙未五甲午閏六癸巳七壬戌九辛酉十一庚申朔六壬辰大暑七壬戌處暑金正丙申三乙未五甲午閏六癸巳七壬戌九辛酉十庚寅朔六壬辰大暑七壬戌處暑按十月本應進爲辛卯朔當時應進失進己亥宋六金十九宋正庚申二己丑五戊午七丁巳八丙戌十乙酉十二甲申朔金同按后妃傳十一月有甲寅
