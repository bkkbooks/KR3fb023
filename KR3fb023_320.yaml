body:
  text: 十壬子十二辛亥朔吳正丙戌二乙卯四甲寅七癸未九壬午十一辛巳朔乙卯漢十三魏三吳四漢魏正辛巳二庚戌四己酉六戊申八丁未十一丙子朔吳正庚辰三己卯五戊寅七丁丑九丙子十二乙巳朔丙辰漢十四魏四吳五漢魏正乙亥二甲戌四癸酉六壬申八辛未十庚午朔閏正正癸卯雨水二甲戌春分按明年魏用景初術以十二月戊戌晦為正月戊戌朔故此年魏十二月止於二十八日與漢不同魏紀十一月有已亥疑當時以景初術改十一己亥朔十二己巳朔也宋志閏四不合今推閏正與晉志合吳正乙亥二甲辰三癸卯五壬寅七辛丑九庚子十一己亥朔閏二二癸酉春分三甲辰穀雨按通鑑目録十一己亥作十一已卯乃刊本之訛丁巳漢十五魏景初元吳六漢仍用四分術正建寅己亥三戊戌五丁酉七丙申九乙未十一甲午朔魏初用景初術甲申紀三百六十年正建寅戊戌四建辰丁酉七建未丙寅九建酉乙丑十一建亥甲子朔按是年魏改用丑正以三月為四月故止十一月為一年與漢吳不同通鑑目録正戊戌作正已亥四丁酉作夏正三戊戌五丁酉宋本作正己亥三丁酉並不合吳仍用乾象術正建寅戊戌四丁
