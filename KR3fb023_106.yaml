body:
  text: 乙巳十六魯十七正建子丁丑二丙午四乙巳六甲辰八癸卯十壬寅十二辛丑朔杜氏長術正戊寅二丁未四丙午六乙巳八甲辰十癸卯十二壬寅朔丙午十七魯十八正建子辛未二庚子四己亥六戊辰八丁卯十丙寅十二乙丑朔閏五五戊戌淸明六戊辰小滿杜氏長術正壬申二辛丑四庚子六己亥八戊戌十丁酉十二丙申朔丁未十八魯十九正建子乙未二甲子四癸亥六壬戌八辛酉十一庚寅朔杜氏長術正丙寅二乙未四甲午六癸巳九壬戌十辛酉十二庚申朔閏九戊申十九魯二十正建子己丑三戊子五丁亥七丙戌九乙酉十一甲申朔杜氏長術正庚寅二己未四戊午七丁亥九丙戌十一乙酉朔己酉二十魯二十一正建子甲申二癸丑三壬子五辛亥七庚戌九己酉十一戊申朔閏二二壬午大寒三壬子驚蟄杜氏長術正甲申三癸未六壬子八辛亥九庚戌十一己酉朔閏八庚戌二十一魯二十二正建子丁未三丙午六乙亥八甲戌十癸酉十二壬申朔杜氏長術正戊申四丁丑六丙子八乙亥十甲戌十二癸酉朔辛亥二十二魯二十三正建子壬寅二辛未四庚午六己巳九戊戌十一丁酉十二丙申朔閏十一十一丙寅霜降十二丁酉小雪杜氏
