body:
  text: 己酉十正丁卯二丙申四乙未六甲午八癸巳十壬辰十二辛卯朔庚戌惠帝永熙元正辛酉二庚寅五已未六戊午八丁巳十丙辰十二乙卯朔閏五五戊子夏至六戊午大暑辛亥元康元正乙酉二甲寅四癸丑七壬午九辛巳十一庚辰朔壬子二正己卯三戊寅五丁丑七丙子九乙亥十二甲辰朔按通鑑目錄十二甲辰作十甲辰不合癸丑三正甲戌二癸卯三壬寅五辛丑七庚子九已亥十一戊戌朔閏二二壬申春分三癸卯穀雨按通鑑目錄云三月一日穀雨與今推二日癸卯穀雨不合甲寅四正丁酉四丙寅六乙丑八甲子十癸亥十二壬戌朔乙卯五正壬辰二辛酉四庚申七己丑九戊子閏十丁亥十二丙戌朔十丙戌小雪十一丁巳冬至丙辰六正丙辰二乙酉四甲申六癸未八壬午十一辛亥朔丁巳七正庚戌三已酉五戊申七丁未九丙午十一乙巳朔戊午八正甲辰四癸酉六壬申七辛未九庚午十一已
