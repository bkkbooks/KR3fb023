body:
  text: 丁亥五丙戌八乙卯十甲寅十二癸丑朔己巳八魯十一周術壬子蔀首正建子壬子二辛巳四庚辰六己卯八戊寅十丁丑十二丙子朔正壬子冬至杜氏長術正癸未二壬子四辛亥六庚戌八己酉十戊申朔庚午九魯桓公元正建子丙午二乙亥四甲戌七癸卯九壬寅十一辛丑朔杜氏長術正丁丑三丙子五乙亥七甲戌九癸酉十一壬申閏十二辛未朔辛未十魯二正建子庚子三己亥五戊戌七丁酉閏八丙申十一乙丑朔八乙未大暑九丙寅處暑杜氏長術正辛丑二庚午五己亥七戊戌九丁酉十一丙申朔壬申十一魯三正建子甲子三癸亥五壬戌七辛酉九庚申十一己未朔杜氏長術正乙未三甲午五癸巳七壬辰十辛酉十二庚申朔癸酉十二魯四正建子己未二戊子四丁亥六丙戌八乙酉十甲申十二癸未朔杜氏長術正庚寅二己未四戊午六丁巳八丙辰十乙卯十二甲寅朔甲戌十三魯五正建子癸丑二壬午四辛巳六庚戌八己酉十戊申十二丁未朔閏五五庚辰淸明六庚戌小滿杜氏長術正甲申二癸未四壬午六辛巳八庚辰十一己酉十二戊寅朔閏正按十月十一月連小當有譌外紀目錄二癸未
