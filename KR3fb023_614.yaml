body:
  text: 烏程汪曰楨丁未宋高宗建炎元金天會五南宋仍用紀元術正辛卯四庚申六已未八戊午十丁巳十二丙辰朔按南渡後紀元術亡紹興二年始購得之自戊申至壬子五年不知用何法推步宋史及建炎以來系年要録所紀月朔皆與紀元術合蓋史臣追定之也今亦以紀元術推之四史朔閏考錢侗曰揮麈後録二月辛亥朔二十一日辛巳誤酉為亥又錢東垣曰大金國志及桯史載張邦昌册文三月辛亥朔二十一日辛巳誤也曰楨按三朝北盟會編載册文作辛卯朔不誤金仍用賈俊大明術同戊申宋二金六宋正丙戌二乙卯四甲寅七癸未九壬午十一辛巳朔按北盟會編二月十八日癸酉禮志閏四並不合今推二月乙卯朔與系年要録合金同己酉宋三金七宋正庚辰三己卯四戊申七丁丑九丙午十一乙巳朔閏八八丙子秋分九丙午霜降金正庚辰三己卯五戊寅七丁丑九丙午十一乙巳朔閏八八丙子秋分九丙午霜降按交聘表正庚寅朔兩見不合庚戌宋四金八宋正甲辰三癸卯四壬申六辛未九庚子十二己巳朔按十朝綱要三甲辰朔系年要録九辛丑
