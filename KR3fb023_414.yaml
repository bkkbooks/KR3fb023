body:
  text: 五丙午七乙巳九甲辰十二癸酉朔正戊申雨水丙辰梁二魏二東魏三梁正癸卯二壬申四辛未六庚午八己巳十戊辰十二丁卯朔魏同丁巳梁三魏三東魏四梁正丁酉二丙寅五乙未七丙午九癸巳十壬辰十二辛卯朔閏九九壬戌霜降十癸巳小雪魏同戊午梁四魏四東魏元象元梁正辛酉二庚寅四己丑六戊子九丁巳十一丙辰朔按南史六辛丑日蝕不合魏同按天象志正辛丑朔不合今推辛酉朔與北史合己未梁五魏五東魏興和元梁正乙卯三甲寅五癸丑七壬子九辛亥十一庚戌朔魏正乙卯三甲寅五癸丑七壬子九辛亥十二庚辰朔庚申梁六魏六東魏二梁仍用大明術正庚戌二己卯四戊寅閏五丁丑七丙子九乙亥十一甲戌朔五丙子夏至六丁未大暑西魏仍用正光術同東魏初用興和術甲戌紀十二萬五千三百九十七年亦同辛酉梁七魏七東魏三梁正癸酉四壬寅六辛丑八庚子十己亥十二戊戌朔西魏同東魏亦同壬戌梁八魏八東魏四梁正戊辰二丁酉四丙申六乙未九甲子十一癸亥朔西魏同東魏亦同癸亥梁九魏九東魏武定元梁正壬戌二辛酉四庚申六己未
