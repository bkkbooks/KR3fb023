body:
  text: 丁未二十六魯哀公元正建子丁未二丙子四乙亥六甲戌八癸酉十壬申朔杜氏長術正戊申二丁丑四丙子六乙亥八甲戌十癸酉十二壬申朔按外紀目録二丁丑作正丁丑乃刊本之訛戊申二十七魯二正建子辛丑三庚子五己亥七戊戌九丁酉閏十丙申十二乙未朔十乙未秋分十一丙寅霜降杜氏長術正壬寅二辛未四庚午七己亥九戊戌十一丁酉十二丙申朔閏十一己酉二十八魯三正建子乙丑二甲午五癸亥七壬戌九辛酉十一庚申朔杜氏長術正丙寅二乙未四甲午六癸巳九壬戌十一辛酉朔庚戌二十九魯四正建子己未三戊午五丁巳八丙戌十乙酉十二甲申朔杜氏長術正庚申三己未五戊午七丁巳九丙辰十一乙卯朔辛亥三十魯五正建子甲寅二癸未四壬午六辛巳七庚辰九己卯十二戊申朔閏六六己酉小滿七庚辰夏至杜氏長術正乙卯二甲申四癸未六壬午八辛巳十庚辰十一己卯朔閏十壬子三十一魯六正建子戊寅二丁未四丙午六乙巳八甲辰十癸卯十二壬寅朔杜氏長術正戊寅三丁丑五丙子
