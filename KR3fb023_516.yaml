body:
  text: 進失進故閏七月僧幼恭經幢正月壬寅朔廿四日辛卯壬寅乃月建朔字連下句非不合也癸酉七正壬辰三辛卯六庚申八己未十戊午十一丁亥朔按馮鍊經幢二月乙卯朔十八日己卯乙卯亦月建也劉重約修敬亭府君廟記七月戊申朔九月丁未朔並承大中七年癸酉歲之下不合乃九年之朔耳甲戌八正丙戌三乙酉六甲寅八癸丑十一壬午朔乙亥九正辛巳二庚戌四己酉五戊申八丁丑十一丙午朔閏四四戊寅小滿五戊申夏至丙子十正乙巳二甲戌四癸酉六壬申辛未十一庚子朔按李柔岳林寺塔銘大中七年歲次子月乙巳朔七年乃十年之譌月上當缺正字丁丑十一正庚子二己巳四戊辰五丁酉七丙申八乙丑十二甲子朔戊寅十二正甲午閏二癸巳四壬辰五辛酉七庚申八己丑十一戊午朔二壬辰春分三癸亥穀雨按通鑑目錄七庚申作六庚寅不合己卯十三正戊午三丁巳五丙辰六乙酉七甲寅九癸丑十一壬子朔庚辰懿宗咸通元正壬子三辛亥五庚戌七己酉九戊申十
