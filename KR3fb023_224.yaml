body:
  text: 烏程汪曰楨辛丑漢武帝建元元殷十甲子十一癸巳二壬戌四辛酉六庚申八己未後九戊午朔六戊子大暑八己未處暑應閏六顓十甲子十一癸巳正壬辰三辛卯五庚寅七己丑九戊子朔後九七戊午處暑九戊子秋分應閏七壬寅二殷十戊子十一丁巳正丙辰四乙酉六甲申八癸未朔顓十戊子十一丁巳正丙辰三乙卯五甲寅七癸丑九壬子朔癸卯三殷十壬午十二辛巳二庚辰四己卯六戊寅九丁未朔顓頊術辛亥蔀首十壬午十一辛亥二庚辰四己卯六戊寅八丁丑朔按漢本紀五行志九丙子晦與殷合甲辰四殷十丁丑十一丙午正乙巳三甲辰五癸卯七壬寅九辛丑朔後九三癸酉淸明五癸卯小滿應閏三顓十丙子十二乙亥二甲戌四癸酉七壬寅九辛丑朔後九四壬寅小滿六癸酉夏至應閏四乙巳五殷十辛丑十一庚午正己巳三戊辰五丁卯七丙寅九乙丑朔顓十庚子十二己亥二戊戌四丁酉六丙申八乙未朔
