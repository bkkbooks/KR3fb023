body:
  text: 丙申宋六遼六宋正丙寅二乙丑四甲子六癸亥七壬辰九辛卯十一庚寅朔閏正正甲午雨水二乙丑春分按遼朔考宋二己丑不合遼同丁酉宋七遼七宋正庚寅二己未五戊子七丁亥八丙辰十乙卯十二甲寅朔按紀十二戊申朔不合遼同戊戌宋重和元遼八宋正甲申二癸丑五壬午七辛巳九庚辰十己卯十二戊寅朔閏九九戊申霜降十己卯小雪按十朝綱要五壬戌朔遼朔考宋閏五庚戌宋大詔令六壬午朔並不合遼同己亥宋宣和元遼九宋正戊申二丁丑四丙子七乙巳九甲辰十一癸卯朔遼同庚子宋二遼十宋正壬寅三辛丑五庚子七己亥十戊辰十二丁卯朔遼同辛丑宋三遼保大元宋正丁酉二丙寅四乙丑五甲午六癸巳九壬戌十二辛卯朔閏五五壬戌夏至六癸巳大暑遼正丁酉二丙寅四乙丑五甲午六癸巳十壬辰十二辛卯朔閏五五壬戌夏至六癸巳大暑壬寅宋宣和四遼保大二金太祖天輔六宋仍用紀元術正辛酉二庚寅四己丑五戊午七丁巳十丙戌朔按齊東野語八月三日己卯不合遼金同用賈俊大明術朔同
