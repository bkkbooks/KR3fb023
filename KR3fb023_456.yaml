body:
  text: 甲子麟德元正己酉四戊寅六丁丑八丙子十乙亥十二甲戌朔乙丑二正甲辰二癸酉閏三壬申六辛丑八庚子十己亥十二戊戌朔三辛未穀雨四壬寅小滿按通鑑目録六辛丑作五辛未不合傅仁均術平朔閏三壬申朔二日癸酉日食與紀志合麟德術平朔三癸卯四壬申閏四壬寅五辛未定朔三癸卯四癸酉閏四壬寅五壬申四辛丑小滿五壬申夏至通鑑目録明年始用麟德術定朔此年猶用仁均術平朔新曆志麟德術起此年頒用非也考舊紀頒麟德術在此年五月辛卯蓋下詔在今年行用實始明年或疑此年五月後當參用新舊術今推麟德術定朔七庚午九己巳十一戊辰並與仁均平朔不同附記備考丙寅乾封元初用麟德術上元甲子以來二十六萬九千八百八十三年正戊辰三丁卯五丙寅七乙丑八甲午十癸巳十二壬辰朔按此年復用定朔自此以後永用定朔又以瞿曇羅經緯術與麟德術參行其法無考不能推算通鑑目録三丁卯作二丁酉不合今推二戊戌朔與祭先聖孔宣父文石刻合麟德術節氣亦先啓蟄後雨水與三統術同丁卯二正壬戌三辛酉六庚寅八己丑九戊午十一丁
  hash: sha256:c9172da4eeb66fb92ea7ce8c35e8d5b437faa662ae170c5d3671028fc9a1f901
