body:
  text: 壬午敬王元魯二十三正建子壬寅二辛未四庚午六己巳八戊辰十丁卯十二丙寅朔杜氏長術正壬寅四辛未六庚午八己巳十戊辰十二丁卯朔癸未二魯二十四正建子丙申三乙未五甲午七癸巳九壬辰十一辛卯朔杜氏長術正丁酉一丙寅五乙未七甲午九癸巳十一壬辰朔甲申三魯二十五正建子庚寅三己丑六戊午七丁巳九丙辰十一乙卯朔閏大大丁亥小滿七戊午夏至杜氏長術正辛卯三庚寅五己丑八戊午十丁巳十二丙辰朔閏十二乙酉四魯二十六正建子甲寅三癸丑五壬子七辛亥十庚辰十二己卯朔杜氏長術正乙卯三甲寅六癸未七壬子九辛亥十二庚辰朔按三四兩月九十兩月並連大五六兩月連小當有訛丙戌五魯二十八正建子己酉二戊寅四丁丑六丙子八乙亥十甲戌十二癸酉朔杜氏長術正庚戌二己卯四戊寅六丁丑八丙子十乙亥十二甲戌朔丁亥六魯二十八正建子癸卯閏二壬寅四辛丑六庚子八己亥十戊戌十二丁酉朔二辛丑大寒三壬申驚蟄杜氏長術正甲辰二癸酉五壬寅六辛丑八庚子十己亥十二戊戌朔閏五按外紀目録二癸酉作三癸酉乃刊本之訛
