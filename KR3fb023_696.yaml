body:
  text: 十一甲午朔按天文志十二甲午朔不合丙申十四正甲午三癸巳五壬辰六辛酉七庚寅九己丑十一戊子朔丁酉十五正戊子三丁亥五丙戌六乙酉七甲寅九癸丑十一壬子朔閏五五甲寅夏至六乙酉大暑戊戌十六正壬子三辛亥五庚戌七己酉八戊寅十丁丑十二丙子朔己亥十七正丙午三乙巳六甲戌八癸酉十壬申十一辛丑朔庚子十八正庚子二己亥五戊辰七丁卯九丙寅十一乙丑朔閏正正戊辰雨水二己亥春分辛丑十九正甲子三癸亥五壬戌七辛酉十庚寅朔壬寅二十正己未二戊子四丁亥六丙戌八己酉十一甲寅朔閏十二十二癸丑大寒按實録四乙亥朔訛癸卯二十一正癸未二壬子四辛亥五庚辰七己卯十戊申朔正甲申雨水甲辰二十二正戊寅二丁未四丙午五乙亥六甲辰八癸卯十壬寅朔按仁宗實録八戊午朔訛乙巳仁宗洪熙元正壬申二辛丑四庚子六己亥七戊辰八丁卯十丙寅朔閏七七丁酉處暑八丁卯秋分
