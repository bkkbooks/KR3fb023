body:
  text: 烏程汪曰楨戊寅隋義寧二唐高祖武德元唐仍用大業術正丁未二丙子四乙亥六甲戌八癸酉十壬申十二辛未朔按通鑑目録此年作三丙午四乙亥六甲戌七癸卯九壬寅朔明年正辛丑朔已用定朔今考明年始用定朔此年猶是平朔劉氏長術所推不合己卯唐武德二初用傅仁均戊寅元術即以武德戊寅為元正辛丑三庚午四己亥五戊辰七丁卯九丙寅朔閏二二己亥春分三庚午穀雨按此年始用定朔仁均術不用上元至崔善為校定始復用上元史志所載即善為校定之術今並依善為術推之節氣先啓蟄後雨水與三統術同秦王告少林寺主教有四月卅日不合疑當時以四月連三小改五月為己巳朔也庚辰三正乙丑三甲子五癸亥六壬辰八辛卯十庚寅十二己丑朔辛巳四正己未四戊子六丁亥七丙辰九乙卯閏十甲寅十二癸丑朔十癸丑小雪十一甲申冬至壬午五正癸未三壬午六辛亥七庚辰九己卯十一戊寅朔
  hash: sha256:093af4cb832699e711c6ad03b77f9e42f565ec5f255717f73adcf6b310025c52
