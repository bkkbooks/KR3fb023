body:
  text: 辛酉十庚申朔魏同丙午宋二魏獻文帝天安元宋正己丑三戊子五丁亥七丙戌九乙酉十一甲申朔魏同丁未宋三魏皇興元宋正癸未二壬午五辛亥七庚戌九已酉十一戊申朔閏正正辛亥雨水二壬午春分按宋索虜傳正月三十日壬寅不合通鑑目録二月二日春分與今推一日壬午春分不合魏朔閏同正壬子雨水二癸未春分按通鑑目録二月三日春分與今推二日癸未春分不合北史十已亥朔不合今推已卯朔與天象志合戊申宋四魏二宋正丁未三丙午五乙巳八甲戌十癸酉十二壬申朔按宋志八丙子朔南史正丙辰朔並不合魏同已酉宋五魏三宋正壬寅二辛未四庚午六己巳八戊辰十丁卯十二丙申朔閏十一十一丙寅冬至十二丁酉大寒按建康實録十丁酉朔不合今推丁卯朔與宋紀南史通鑑合魏正壬寅二辛未四庚午六己巳八戊辰閏九丁卯十二丙申朔九丙寅霜降十丁酉小雪按通鑑目録閏十宋本閏十一並不合今推十丁酉朔與天象志合庚戌宋六魏四宋正丙寅二乙未四甲午六癸巳八壬辰十辛卯十二庚寅朔魏同
