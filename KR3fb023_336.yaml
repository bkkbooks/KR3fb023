body:
  text: 已酉五戊寅七丁丑九丙子十一乙亥朔丁亥晉三吳二晉正甲戌三癸酉五壬申七辛未十庚子十二已亥朔吳正甲戌三癸酉五壬申八辛丑十庚子十二已亥朔戊子晉四吳三晉正已巳二戊戌四丁酉六丙申八乙未九甲午十一癸巳朔閏八八甲子秋分九甲午霜降按紀六甲申朔不合吳正已巳二戊戌四丁酉六丙申八乙未九甲午十二癸亥朔閏八八甲子秋分九甲午霜降已丑晉五吳建衡元晉正癸巳二壬戌四辛酉六庚申八已未十戊午十二丁巳朔吳同庚寅晉六吳二晉正丁亥二丙辰四乙卯七甲申九癸未十一壬午朔吳正丁亥二丙辰五乙酉七甲申九癸未十一壬午朔辛卯晉七吳三晉正辛巳三庚辰五已卯六戊寅九丁未十一丙午朔閏五五戊申夏至六已卯大暑吳正辛巳三庚辰五已卯七戊申九丁未十一丙午朔閏五五戊申夏至六已卯大暑按吳閏五大六小六一日已卯大暑通鑑曰録謂吳朔與晉同吳亦六月二日大暑不合壬辰晉八吳鳳皇元晉正乙巳三甲辰五癸卯七壬寅九辛五十一庚子朔吳正乙巳三甲辰五癸卯七壬寅九
