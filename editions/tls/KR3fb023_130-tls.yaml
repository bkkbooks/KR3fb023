body:
  text: 己未三十八魯十三正建子丁酉三丙申五乙未七甲午閏八癸巳十一壬戌朔八壬辰大暑九癸亥處暑杜氏長術正戊戌二丁卯四丙寅六乙丑八甲子十癸亥十二壬戌朔庚申三十九魯十四正建子辛酉三庚申五己未七戊午九丁巳十一丙辰朔杜氏長術正壬辰二辛酉三庚申六己丑八戊子十丁亥十二丙戌朔閏二辛酉四十魯十五正建子丙辰二乙酉四甲申六癸未八壬午十辛巳十二庚辰朔杜氏長術朔同閏十二壬戌四十一魯十六正建子庚戌二己卯四戊寅六丁未八丙午十乙巳十二甲辰朔閏五五丁丑淸明六丁未小滿杜氏長術正己卯四戊申六丁未八丙午十乙巳十二甲辰朔癸亥四十二魯十七正建子甲戌二癸卯四壬寅六辛丑八庚子十一己巳朔杜氏長術正甲戌二癸卯四壬寅七辛未九庚午十一己巳朔按外紀目錄九庚午作十庚午乃刊本之譌甲子四十三魯十八正建子戊辰三丁卯五丙寅七乙丑九甲子十一癸亥朔杜氏長術正戊辰三丁卯五丙寅七乙丑十甲午十一癸巳朔閏十乙丑四十四魯十九正建子癸亥二壬辰三辛卯五庚寅七己丑九戊子十一丁亥朔閏二二辛酉大寒三辛卯驚蟄杜氏長術正
