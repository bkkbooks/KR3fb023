body:
  text: 並不合舊志閏十二壬辰朔會要閏十壬辰朔亦並不合今推閏十二丙辰朔與新志合乙丑十三正丙戌二乙卯四甲寅五癸未七壬午八辛亥十二庚戌朔正丙戌啟蟄按通鑑目錄四甲寅作三甲申七壬午作六壬子十二庚戌作十一庚辰並不合乙速孤行儼碑二月景辰朔不合丙寅十四正庚辰三己卯五戊寅六丁未七丙子九乙亥十二甲辰朔按通鑑目錄三己卯作二己酉五戊寅作四戊申十二甲辰作十一甲戌並不合今推二庚戌朔與舊紀合四己酉朔與蘇頲惠文太子哀冊文合十一乙亥朔與陳憲墓誌合丁卯十五正甲戌三癸酉六壬寅七辛未九庚午閏九己亥十二戊辰朔九戊戌霜降十己巳小雪按張說王君㚟碑閏九月二十三日庚申不合戊辰十六正戊戌二丁卯五丙申七乙未八甲子十癸亥十二壬戌朔按開元寺經幢十一月甲午朔八日乙丑不合己巳十七初用大衍術上元甲子以來九千六百九十六萬一千七百四十六年正壬辰三辛卯五庚寅七己丑九戊子十一丁亥朔按通鑑攷異引實錄八癸亥朔明
