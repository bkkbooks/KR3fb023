body:
  text: 巳十二戊辰朔秦同丁亥晉十二秦二晉正戊戌二丁卯四丙寅六乙丑八甲子十癸亥朔秦正戊戌二丁卯四丙寅六乙丑八甲子十癸亥十二壬戌朔戊子晉十三秦三晉正壬辰二辛卯四庚寅六已丑八戊子十丁亥十二丙戌朔閏正正庚辰雨水二辛卯春分秦同已丑晉十四秦四晉正丙辰二乙酉五甲寅七癸丑九壬子十一辛亥朔秦同庚寅晉十五秦五晉正庚戌三己酉五戊申七丁未十丙子十一乙亥朔閏十十乙巳小雪十一乙亥冬至按志二己酉朔元經三乙酉朔並不合今推三已酉朔與紀及宋志合秦同辛卯晉十六秦六晉正甲戌三癸酉五壬申七辛未九庚午十二己亥朔秦正甲戌三癸酉五壬申七辛未九庚午十一己巳朔壬辰晉十七秦七晉正已已二戊戌四丁酉六丙申八乙未十甲午十二癸已朔秦同癸巳晉十八秦八晉正癸亥二壬辰五辛酉七庚申八己未十戊午十二丁巳朔閏七七己丑處暑八庚申秋分按紀及元經建康實錄正癸卯朔不合今推癸亥朔與志合通鑑目錄
