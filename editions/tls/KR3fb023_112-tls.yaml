body:
  text: 二辛巳朔杜氏長術正丙辰四乙酉六甲申八癸未十壬午十二辛巳朔乙丑九魯六正建子辛亥二庚辰四己卯閏五戊寅七丁丑九丙子十一乙亥朔五丁丑淸明六戊申小滿杜氏長術正辛亥二庚辰五己酉七戊申八丁未十丙午十二乙巳朔閏七按外紀目錄二庚辰作三庚辰乃刊本之譌丙寅十魯七正建子乙亥二甲辰四癸卯六壬寅八辛丑十庚子十二己亥朔杜氏長術正乙亥二甲辰五癸酉七壬申九辛未十一庚午朔按外紀目錄二甲辰作三甲辰乃刊本之譌丁卯十一魯八正建子己巳二戊戌四丁酉七丙寅九乙丑十一甲子朔杜氏長術正己巳三戊辰五丁卯七丙寅九乙未十一甲午朔閏八戊辰十二魯九正建子癸亥二壬申四辛酉六庚申九己丑十一戊子朔閏正正辛卯冬至二壬戌大寒杜氏辰術正癸巳三壬辰五辛卯七庚寅九己丑十一戊子朔己巳十三魯十正建子丁亥三丙戌五乙酉七甲申九癸未十一壬午朔杜氏長術正戊子二丁巳四丙辰六乙卯八甲寅十癸丑十二壬子朔庚午十四魯十一正建子壬午二辛亥四庚戌六己酉八戊申
