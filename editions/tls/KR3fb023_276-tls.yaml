body:
  text: 天文志注引古今注閏九亦不合己未二正癸丑二壬午四辛巳七庚戌九己酉十戊申十二丁未朔閏九九戊寅霜降十己酉小雪庚申三正丁丑二丙午四乙巳六甲辰九癸酉十一壬申朔按通鑑目錄九癸酉作八癸卯不合辛酉四正辛未三庚午五己巳七戊辰九丁卯十一丙寅朔壬戌五正丙寅二乙未四甲午閏五癸巳七壬辰九辛卯十一庚寅朔五壬辰夏至六癸亥大暑按通鑑目錄二乙未作正乙丑不合癸亥六正已丑三戊子六丁巳八丙辰十乙卯十二甲寅朔按五行志注引古今注六庚寅晦不合甲子七正甲申二癸丑四壬子六辛亥九庚辰十一己卯朔按通鑑目錄九庚辰作八庚戌不合乙丑八正戊寅二丁丑四丙子六乙亥八甲戌十癸酉朔閏正正丙午驚蟄二丁丑春分按五行志注引古今注十二壬寅日食不合今推十壬寅晦日食與紀志合丙寅九正壬寅三辛丑五庚子七己亥九戊戌十一丁酉朔丁卯十正丙申四乙丑六甲子八癸亥十壬辰十一辛
