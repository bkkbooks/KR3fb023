body:
  text: 同癸卯宋六遼二十一宋正辛卯四庚申六己未八戊午十丁巳十二丙辰朔按四史朔閏攷十丁亥十一丁巳朔並不合遼同甲辰宋景德元遼二十二宋正丙戌二乙卯四甲寅七癸未九壬午十辛巳十二庚辰朔閏九九辛亥霜降十壬午小雪按四史朔閏攷十壬午朔不合今推辛巳朔與遼朔攷合九朝編年備要十朝綱要十二庚寅朔亦不合遼朔閏同九辛亥霜降十辛巳小雪乙巳宋二遼二十三宋正庚戌二己卯四戊寅六丁丑九丙午十一乙巳朔按長編五戊辰宋大詔令十一丁巳朔並不合遼同丙午宋三遼二十四宋正甲辰三癸卯四壬申六辛未九庚子十二己巳朔按禮志四月十三日立夏與今推三日甲戌立夏不合遼同丁未宋四遼二十五宋正己亥二戊辰四丁卯五丙申六乙未八甲午十二癸巳朔閏五五乙丑夏至六甲申大暑遼朔閏同五乙丑夏至六乙未大暑戊申宋大中祥符元遼二十六宋正癸亥二壬辰四辛卯五庚申七己未九戊午十二丁亥朔遼同
