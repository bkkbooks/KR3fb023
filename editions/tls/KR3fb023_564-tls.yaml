body:
  text: 酉閏八壬寅十辛丑十二庚子朔八辛丑秋分九壬申霜降按紀閏九朔攷大任正甲戌四甲戌六癸酉並不合丙戌宋三遼四宋正庚午三己巳五戊辰八丁酉九丙寅十一乙丑朔遼正庚午二己亥五戊辰七丁卯九丙寅十一乙丑朔按紀十一丙寅朔朔攷大任八丙申十一丙寅儼十二丁酉並不合丁亥宋四遼五宋正甲子三癸亥五壬戌八辛卯十庚寅十二己丑朔按遼朔攷宋五癸亥十二庚寅長編十二庚寅朔並不合遼同戊子宋端拱元遼六宋正己未二戊子四丁亥閏五丙戌七乙酉十甲寅朔五乙酉夏至六丙辰大暑按遼朔攷宋二己丑五丙辰並不合遼同己丑宋二遼七宋正癸未二壬子四辛亥五庚辰七己卯十一戊寅朔遼同庚寅宋淳化元遼八宋正戊寅二丁未三丙子五乙亥六甲辰八癸卯十一壬申朔遼同辛卯宋二遼九宋正壬申閏二辛未三庚子五己亥六戊辰八丁卯十丙寅朔二庚午春分三庚子穀雨按遼朔攷宋二辛丑六己巳並不合遼同壬辰宋三遼十宋正丙申二乙丑四甲子六癸亥七壬辰
