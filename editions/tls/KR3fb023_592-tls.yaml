body:
  text: 癸卯宋七遼八宋正癸卯四𡈼申六辛未七庚子九己亥十戊辰朔遼同甲辰宋英宗治平元遼十宋正丁酉五丙申六乙未七甲子九癸亥十壬辰朔閏五五甲子夏至六乙未大暑按遼閏攷宋閏六朔攷宋十癸巳長編正乙酉朔並不合遼正丁酉五丙申閏六乙未七甲子九癸亥十壬辰朔六甲午大暑七甲子處暑乙巳宋二遼咸雍元宋初用明天術上元甲子以來七十一萬一千七百六十二年正辛酉四庚寅六己丑八戊子十丁亥十二丙戌朔遼仍用賈俊大明術同丙午宋三遼二宋正丙辰二乙酉四甲申七癸丑九壬子十一辛亥朔遼同丁未宋四遼三宋正庚戌三己酉四戊申六丁未九丙子十一乙亥朔閏三三戊寅穀雨四己酉小滿按五行志正庚辰朔遼朔攷宋閏二己卯並不合遼同戊申宋神宗熙甯元遼四宋復用重修崇天術正甲戌三癸酉四壬寅六辛丑九庚午十二己亥朔遼仍用賈俊大明術同己酉宋二遼五宋正己巳二戊戌四丁酉五丙寅七乙丑九甲子十二癸亥朔閏十一十一癸巳冬至十二癸亥大寒按十朝綱要七乙巳朔不合遼朔閏同十一壬辰冬至十二癸亥大寒
