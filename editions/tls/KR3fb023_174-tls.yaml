body:
  text: 六壬午八辛巳朔癸亥十七秦九周正建子己酉四戊寅六丁丑八丙子十乙亥十二甲戌朔秦十庚辰十二己卯二戊寅五丁未七丙午九乙巳朔甲子十八秦十周正建子甲辰二癸酉閏三壬申五辛未八庚子十己亥十二戊戌朔三辛未驚蟄四壬寅春分秦十乙亥十一甲辰正癸卯三壬寅五辛丑八庚午後九己巳朔二辛丑春分四壬申淸明應閏二乙丑十九秦十一周正建子戊辰二丁酉四丙申六乙未八甲午十一癸亥朔秦十己亥十一戊辰正丁卯三丙寅五乙丑七甲子九癸亥朔丙寅二十秦十二周正建子壬戌三辛酉五庚申七己未九戊午十一丁巳十二丙辰朔閏十一十一乙酉霜降十二丙辰小雪秦十癸巳十二壬辰二辛卯四庚寅六己丑八戊子朔丁卯二十一秦十三周正建子丙戌三乙酉五甲申七癸未九壬午十一辛巳朔秦十丁亥十二丙戌二乙酉五甲寅七癸丑九壬子朔後九十乙卯小雪十二丙戌冬至應閏十戊辰二十二秦十四周正建子庚辰三己卯五戊寅八丁未十丙午十二乙巳朔秦十辛亥十二庚戌二己酉四戊申七丁丑九丙子朔
