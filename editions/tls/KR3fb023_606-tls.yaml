body:
  text: 五十萬一千七百六十年正辛巳二庚戌四己酉六戊申八丁未十二丙午朔按此術盈縮遲疾諸率無攷今求定朔備觀天術日躔月離二表化分擬數推之四史朔閏攷云十一月朔初以觀天術推得丙子後悟其失改正乃造占天術頒行見玉海遼仍用賈俊大明術正辛巳二庚戌四己酉六戊申九丁丑十二丙午朔甲申宋三遼四宋正丙子二乙巳三甲戌五癸丑六壬寅九辛未十二庚子朔遼同乙酉宋四遼五宋正庚午閏二己巳三戊戌五丁酉六丙寅八乙丑十二甲子朔二丁卯春分三戊戌穀雨按宋大詔令閏十二不合遼正庚午三己巳四戊辰五丁酉六丙寅八乙丑十二甲子朔閏三三戊戌穀雨四戊辰小滿按趙知微術閏二二丁卯春分三戊戌穀雨戊戌卽三月朔與宋同當時強進爲己亥朔故閏三而閏三月以後連三小丙戌宋五遼六宋初用紀元術上元庚辰以來二千八百六十一萬三千四百六十七年正甲午三癸巳四壬戌六辛酉七庚寅九己丑十一戊子朔遼仍用賈俊大明術同丁亥宋大觀元遼七宋正戊子三丁亥五丙戌七乙酉八甲寅十癸丑十一壬子朔閏十十辛巳小雪十一壬子冬至按天文志
