body:
  text: 二丙子四乙亥六甲戌九癸卯十一壬寅朔丁丑二十一魯十八正建子辛未二庚子四己亥六戊戌八丁酉十一丙寅朔杜氏長術正辛丑二庚子五己巳七戊辰九丁卯十一丙寅朔閏正戊寅二十二魯十九正建子乙丑三甲子五癸亥七壬戌九辛酉十一庚申十二己未朔閏十一十一戊子霜降十二己未小雪杜氐長術正丙寅二乙未四甲午六癸巳八壬辰十辛卯十二庚寅朔己卯二十三魯二十正建子己丑三戊子五丁亥七丙戌九乙酉十一甲申朔杜氏長術正庚申二己丑四戊子八丁亥九丙戌十一乙酉朔閏八按四五六月連三大當有譌外紀目錄閏八乙巳朔乃刊本之譌庚辰二十四魯二十一正建子癸未三壬午五辛巳八庚戌十己酉十二戊申朔杜氏長術正甲申三癸未五壬午八辛亥十庚戊十二己酉朔按外紀目錄十二己酉作十一己酉乃刊本之譌辛巳二十五魯二十二正建子戊寅二丁未四丙午六乙巳八甲辰十癸酉十二壬申朔閏九九癸卯處暑十癸酉秋分杜氏長術正己卯二戊申四丁未六丙午八乙巳十甲辰十二癸卯朔閏十二
