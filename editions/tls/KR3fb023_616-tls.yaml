body:
  text: 朔並不合今推九庚子朔與北盟會編合金同辛亥宋紹興元金九宋正己亥二戊辰四丁卯五丙申七乙未九甲午朔按紀五丙辰朔不合四史朔閏攷十二己巳乃誤系上年之朔今推十二甲子朔與系年要錄合金同壬子宋二金十宋正癸巳三壬辰閏四辛卯五庚申七己未八戊子十二丁亥朔四庚寅小滿五庚申夏至按四史朔閏攷錢侗曰聞見錄序十一月十五日甲子誤金同癸丑宋三金十一宋正丁巳三丙辰五乙卯六甲申八癸未九壬子十二辛巳朔金同甲寅宋四金十二宋正辛亥四庚辰六己卯七戊申九丁未十丙子十二乙亥朔金正辛亥四庚辰六己卯七戊申九丁未十丙子朔乙卯宋五金十三宋正乙巳三甲戌六癸卯七壬申九辛未十庚子十二己亥朔閏二二甲辰春分三乙亥穀雨金同按紀正丙午朔又二月有己巳不合丙辰宋六金熙宗天會十四宋初用統元術上元甲子以來九千四百二十五萬一千五百九十三年正己巳三戊辰六丁酉八丙申十乙未十二甲午朔按宋史志裴伯壽謂當時暗用紀元術推步而用統元術之名今每年仍並
