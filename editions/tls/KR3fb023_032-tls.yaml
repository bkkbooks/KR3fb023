body:
  text: 甲戌朔超辰率是年太歲超庚辰入辛巳太陰超戊午入己未歲星超大梁入實沈丁亥十四正建子甲辰二癸酉四壬申六辛未八庚午十己巳十二戊辰朔戊子十五正建子戊戌二丁卯五丙申七乙未八甲午十癸已十二壬辰朔閏七七甲子夏至八甲午大暑己丑十六正建子壬戌二辛卯四庚寅六己丑九戊午十一丁巳朔庚寅十七正建子丙辰三乙卯五甲寅七癸丑九壬子十二辛巳朔辛卯十八正建子辛亥二庚辰四己卯五戊寅七丁丑九丙子十一乙亥朔閏四四戊申春分五己卯淸明壬辰十九正建子甲戌四癸卯六壬寅八辛丑十庚子十二己亥朔癸巳二十正建子己巳二戊戌四丁酉七丙寅九乙丑十一甲子閏十二癸亥朔十二壬戌小雪甲午二十一正建子癸巳二壬戌四辛酉六庚申八己未十一戊子朔正癸巳冬至乙未二十二正建子丁亥三丙戌五乙酉七甲申九癸未十一壬午朔
