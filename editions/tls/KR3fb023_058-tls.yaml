body:
  text: 乙亥十一甲戌朔閏正按外紀目錄四丁未作四乙未九乙亥作九丁亥並刊本之譌辛巳二十魯十二正建子壬寅三辛丑五庚子七己亥九戊戊十一丁酉朔杜氏長術正癸酉三壬申五辛未七庚午十己亥十二戊戌朔壬午二十一魯十三正建子丙申三乙未六甲子閏七癸亥九壬戌十一辛酉朔七壬戌夏至八癸巳大暑杜氏長術正戊辰閏正丁酉三丙申五乙未七甲午九癸巳十一壬辰朔癸未二十二魯十四正建子庚申三已未五戊午八丁亥十丙戌十二乙酉朔杜氏長術正壬辰二辛酉四庚申六己未八戊午十丁巳十二丙辰朔按外紀目錄十二丙辰作十一丙辰乃刊本之譌甲申二十三魯十五正建子乙卯二甲申四癸未六壬午八辛巳十庚辰朔杜氏長術正丙戌二乙卯五甲申七癸未九壬午十一辛巳朔乙酉莊王元魯十六正建子己酉三戊申四丁未六丙午八乙巳十甲辰十二癸卯朔閏三三丙子驚蟄四丁未春分杜氏長術正庚辰三己卯五戊寅七丁未九丙午十一乙巳朔閏六按外紀目錄五戊寅作五甲申七丁未作七癸未九丙午作九壬午十一乙巳作十一辛巳並刊本之譌
