body:
  text: 閏八不合遼同戊子宋二遼八宋正壬子三辛亥五庚戌七己酉八戊寅十丁丑十二丙子朔遼同己丑宋三遼九宋正丙午三乙巳六甲戌八癸酉九壬寅十一辛丑朔遼同庚寅宋四遼十宋正庚子三己亥六戊辰八丁卯九丙寅十一乙丑朔閏八八丙申秋分九丙寅霜降按十朝綱要九甲寅朔不合遼同按閏攷儼大任閏七不合辛卯宋政和元遼天慶元宋正甲子三癸亥五壬戌八辛卯十庚寅十二己丑朔遼同壬辰宋二遼二宋正己未二戊子四丁亥六丙戌八乙酉十一甲寅朔遼同癸巳宋三遼三宋正甲寅二癸未三壬子閏四辛亥五庚辰七己卯十戊申朔四庚戌小滿五庚辰夏至按遼閏攷宋閏五不合遼正甲寅二癸未三壬子閏四辛亥五庚辰七己卯十一戊寅朔四庚戌小滿五庚辰夏至按閏攷儼大任閏五不合甲午宋四遼四宋正戊寅二丁未三丙子五乙亥六甲辰八癸卯十壬寅朔遼同乙未宋五遼五宋正壬申二辛丑四庚子六己亥七戊辰九丁卯十一丙寅朔遼同
