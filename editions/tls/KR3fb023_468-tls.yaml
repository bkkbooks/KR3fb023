body:
  text: 戊子朔四庚申小滿五辛卯夏至按舊志新紀通鑑九庚寅朔不合甲辰周四正丁亥二丙辰五乙酉七甲申十癸丑十二壬子朔乙巳唐中宗神龍元正壬午二辛亥三庚辰五己卯七戊寅十丁未朔按此年復國號唐丙午二正丙子二乙亥三甲辰五癸卯七壬寅十辛未朔閏正正乙巳啟蟄二乙亥春分按通鑑目錄十辛未作九辛丑不合丁未景龍元正庚子三己亥四戊辰六丁卯七丙申十乙丑朔按宋之問爲宗尙書祭梁宣王文十乙未朔不合戊申二正乙未二甲子四癸亥五壬辰七辛卯八庚申十己丑朔閏九九己未霜降十己丑小雪按乙速孤行儼碑景龍二年歲次景申二月辛卯朔不合今推甲子朔與岱岳觀碑合己酉三正己未二戊子四丁亥五丙辰七乙卯九甲寅十癸未朔按通鑑目錄二戊子作正戊午不合今推正己未朔與尼法琬碑合鄧村經幢五月丁巳朔李邕王行果碑十一月庚寅朔並不合庚戌睿宗景雲元正癸丑二壬午五辛亥七庚戌八己卯十戊寅十二丁丑朔按通鑑目錄二壬午作正壬子五辛
