body:
  text: 壬申朔丁丑四正建子壬寅二辛未四庚午六己巳八戊辰十丁酉十二丙申朔閏九九丁卯處暑十丁酉秋分戊寅五正建子丙寅二乙未四甲午六癸巳八壬辰十辛卯十二庚寅朔己卯六正建子庚申三己未五戊午七丁巳九丙辰十一乙卯朔庚辰七正建子甲寅三癸丑六壬午七辛巳九庚辰十一己卯朔閏六六辛亥小滿七壬午夏至辛巳八正建子戊寅三丁丑五丙子七乙亥十甲辰十二癸卯朔壬午九正建子癸酉二壬寅四辛丑六庚子八己亥十戊戌十二丁酉朔癸未十正建子丁卯閏二丙寅四乙丑六甲子八癸亥十壬戌十二辛酉朔二乙丑大寒三丙申驚蟄甲申十一正建子辛卯二庚申五己丑七戊子九丁亥十一丙戌朔乙酉十二正建子乙酉三甲申五癸未七壬午十辛亥十一庚戌朔閏十十己卯秋分十一庚戌霜降丙戌十三正建子己酉三戊申五丁未七丙午九乙巳十二
