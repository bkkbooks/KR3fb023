body:
  text: 丙辰四十六正建子丁酉三丙申五乙未七甲午九癸巳十一壬辰朔丁巳四十七正建子辛卯三庚寅六己未八戊午十丁巳十二丙辰朔戊午四十八正建子丙戌二乙卯三甲寅五癸丑七壬子十辛巳十二庚辰朔閏二二甲申大寒三乙卯驚蟄己未四十九魯隱公元正建子庚戌二己卯四戊寅六丁丑八丙子十乙亥朔杜氏長術正辛巳二庚戌四己酉六戊申八丁未十丙午朔按杜氏春秋釋例長術起此年其朔閏俱以意排定與推算不符今從劉氏通鑑外紀目錄之例附錄備攷庚申五十魯二正建子甲辰三癸卯五壬寅七辛丑九庚子閏十己亥十二戊戌朔十戊戌秋分十一己巳霜降杜氏長術正乙亥三甲戌五癸酉七壬申九辛未十一庚午閏十二己巳朔辛酉五十一魯三正建子戊辰二丁酉五丙寅七乙丑九甲子十一癸亥朔杜氏長術正己亥三戊戌五丁酉七丙申九乙未十一甲午朔壬戌桓王元魯四正建子壬戌三辛酉五庚申八己丑十戊子十二丁亥朔杜氏長術正癸巳三壬辰五辛卯八庚申
