body:
  text: 壬辰三辛卯五庚寅七己丑九戊子十二丁巳朔丙寅元王元魯二十正建子丙戌三乙酉六甲寅八癸丑十壬子十二辛亥朔杜氏長術正丁亥二丙辰四乙卯六甲寅八癸丑十壬子十二辛亥朔丁卯二魯二十一正建子辛巳二庚戌四己酉六戊申九丁丑十一丙子十二乙亥朔閏十一十一乙巳霜降十二丙子小雪杜氏長術正辛巳三庚辰五己卯七戊寅九丁丑十丙子十二乙亥朔閏九戊辰三魯二十二正建子乙巳二甲戌四癸酉六壬申八辛未十庚午朔杜氏長術正乙巳二甲戌五癸卯七壬寅九辛丑十一庚子朔己巳四魯二十三正建子己亥三戊戌五丁酉七丙申九乙未十一甲午朔杜氏長術正己亥三戊戌五丁酉八丙寅十乙丑十二甲子朔庚午五魯二十四正建子癸巳三壬辰六辛酉閏七庚申九己未十一戊午朔七己未夏至八庚寅大暑杜氏長術正甲午二癸亥四壬戌六辛酉八庚申閏十己丑十二戊子朔辛未六魯二十五正建子丁巳三丙辰五乙卯八甲申十癸未十二壬午朔杜氏長術正戊午二丁亥四丙戌六乙酉八甲申十癸未朔
