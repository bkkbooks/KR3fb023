body:
  text: 丙子十二乙巳朔周正庚辰四己酉六戊申八丁未十丙午十二乙巳朔齊與陳同丁酉陳九周六齊幼主承光元陳正乙亥二甲辰四癸卯六壬寅八辛丑十庚子十二己亥朔周正乙亥二甲辰四癸卯六壬寅九辛未十一庚午朔齊與陳同戊戌陳太建十周宣政元陳仍用大明術正己巳二戊戌五丁卯六丙寅八乙丑十甲子十二癸亥朔閏五五丙申夏至六丙寅大暑按南史通鑑閏六不合通鑑目錄六月二日大暑與今推一日丙寅大暑不合周仍用天和術正己巳三戊辰五丁卯閏六丙寅八乙丑十一甲午朔六乙丑大暑七丙申處暑按通鑑目錄十一甲午作十甲子不合己亥陳十一周靜帝大象元陳仍用大明術正癸巳二壬戌四辛酉六庚申九己丑十一戊子朔周初用馬顯丙寅元術入元四萬一千五百五十四年正癸巳三壬辰五辛卯七庚寅九己丑十二戊午朔按通鑑目錄九己丑作十己未不合庚子陳十二周二陳正丁亥三丙戌五乙酉七甲申九癸未十二壬子朔按通鑑目錄十二壬子作十一壬午不合周正戊子二丁巳四丙辰六乙卯八甲寅十癸丑十二壬子朔按本紀及北史正月有丁亥不合
