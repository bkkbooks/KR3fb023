body:
  text: 九甲午十一癸巳朔丁亥十二魯十七正建子辛卯三庚寅五己丑六戊子八丁亥十丙戌朔閏五五戊午淸明六戊子小滿杜氏長術正壬辰三辛卯五庚寅七己丑九戊子十一丁亥閏十二丙戌朔戊子十三魯十八正建子乙卯三甲寅五癸丑七壬子九辛亥十一庚戌朔杜氏長術正丙辰二乙酉五甲寅七癸丑九壬子十一辛亥朔己丑十四魯襄公元正建子己酉三戊申六丁丑八丙子十乙亥十二甲戌朔杜氏辰術正庚戌三己酉六戊寅八丁丑十丙子十二乙亥朔按外紀目錄六戊寅作六戊戌乃刊本之譌又脫十月以下兩朔庚寅靈王元魯二正建子甲辰二癸酉三壬申五辛未七庚午十己亥十二戊戌朔閏二二壬寅大寒三癸酉驚蟄杜氏長術正乙巳二甲戌四癸酉五壬申八辛丑十庚子十二己亥朔閏四辛卯二魯三正建子戊辰二丁酉四丙申六乙未八甲午十癸巳朔杜氏長術正己巳二戊戌四丁酉七丙寅九乙丑十一甲子朔壬辰三魯四正建子壬戌三辛酉五庚申七己未九戊午閏十丁巳十二丙辰朔十丙辰秋分十一丁亥霜降杜氏長術正癸亥
