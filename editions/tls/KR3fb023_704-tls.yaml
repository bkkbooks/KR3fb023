body:
  text: 乙亥六正丁未三丙午五乙巳七甲戌九癸酉十一壬申閏六六甲辰大暑七甲戌處暑丙子七正辛未二庚子五己巳七戊辰十丁酉十二丙申朔丁丑英宗天順元正丙寅二乙未三甲子五癸亥七壬戌十辛卯朔按實錄正壬午朔譌戊寅二正庚申閏二己未三戊子五丁亥七丙戌九乙酉朔二戊午春分三戊子穀雨己卯三正甲申三癸未四壬子六辛亥七庚辰十己酉朔庚辰四正己卯二戊申四丁未五丙子七乙亥八甲辰十癸卯朔閏十一十一壬寅冬至十二癸酉大寒辛巳五正壬寅四辛未五庚子七己亥八戊辰十丁卯朔壬午六正丙申五乙未六甲子八癸亥九壬辰十二辛酉朔癸未七正辛卯二庚申五己丑七戊子八丁亥十丙戌十一乙卯朔閏七七丙辰處暑八丁亥秋分甲申八正甲寅四癸未七壬子九辛亥十一庚戌朔乙酉憲宗成化元正己酉二戊寅四丁丑七丙午九乙巳十
