body:
  text: 甲申二正癸酉三壬申五辛未八庚子十已亥十二戊戌朔按建康實錄正丁丑朔紀七壬申朔並不合乙酉三正戊辰二丁酉四丙申六乙未八甲午九癸巳十二壬戌朔閏八八癸亥秋分九癸巳霜降丙戌成帝咸和元正壬辰二辛酉四庚申六己未八戊午十丁巳十二丙辰朔按建康實錄正丁亥朔不合丁亥二正丙戌三乙酉五甲申七癸未九壬午十一辛巳朔戊子三正庚辰三己卯五戊寅七丁未九丙午十一乙已朔閏五五丁未夏至六戊寅大暑按志九月二日壬午立冬與今推十九日甲子立冬不合已丑四正甲辰三癸卯五壬寅七辛丑九庚子十二已巳朔庚寅五正已亥二戊辰四丁卯六丙寅八乙丑十甲子十二癸亥朔辛卯六正癸巳二壬辰四辛卯六庚寅八己丑十戊子十二丁亥朔閏正正辛酉雨水二壬辰春分壬辰七正丁巳二丙戌四乙酉七甲寅九癸丑十一壬子朔癸巳八正辛亥三庚戌五己酉七戊申九丁未十一丙
