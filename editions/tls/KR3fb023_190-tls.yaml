body:
  text: 甲寅三十甲寅十二癸丑二壬子五辛巳七庚辰九己卯朔乙卯始皇元十己酉十一戊寅正丁丑三丙子五乙亥七甲戌後九癸卯朔九壬寅霜降丙辰二十癸酉十一壬寅正辛丑三庚子五己亥七戊戌九丁酉朔十癸酉小雪丁巳三十丁卯十一丙申二乙丑四甲子六癸亥八壬戌朔戊午四十辛酉十二庚申二己未五戊子七丁亥九丙戌朔後九五丙辰夏至七丁亥大暑應閏五己未五十乙酉十二甲申二癸未四壬午六辛巳九庚戌朔庚申六十庚辰十一己酉正戊申三丁未五丙午七乙巳九甲辰朔辛酉七十甲戌十二癸酉二壬申四辛未六庚午八己巳後九戊辰朔二辛丑春分四辛未淸明應閏二壬戌八十戊戌十一丁卯正丙寅四乙未六甲午八癸巳朔按呂氏春秋序意篇維秦八年歲在涒灘秋甲子朔當在是年七月超辰率是年太歲超庚申入辛酉太陰超戊戌入己亥歲星超鶉尾入壽星
