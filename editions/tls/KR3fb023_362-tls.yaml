body:
  text: 戊寅三正庚申二已丑四戊子六丁亥八丙戌十一乙卯朔已卯四正甲寅三癸丑五壬子七辛亥九庚戌十一己酉朔閏十二十二戊申大寒按紀及元經建康實錄十二已酉朔不合今推閏十二己酉朔與志合庚辰五正戊寅三丁丑五丙子七乙亥九甲戌十一癸酉朔正戊寅雨水辛巳六正壬申三辛未六庚子八已亥十戊戌十二丁酉朔壬午七正丁卯二丙申四乙未六甲午八癸巳十壬戌十二辛酉朔閏九九壬辰霜降十癸亥小雪癸未八正辛卯二庚申四已未六戊午八丁巳十丙辰朔甲申晉太元九後秦武昭帝姚萇白雀元晉仍用景初術正乙酉三甲申五癸未七壬午九辛巳十一庚辰朔後秦姜岌造三紀甲子元術上元甲子以來八萬三千八百四十一年朔與晉同按通鑑目錄不載後秦術今補乙酉晉十秦二晉正已卯三戊寅閏五丁未七丙午九乙已十一甲辰朔五丙午夏至六丁丑大暑秦同丙戌晉十一秦建初元晉正癸卯三壬寅五辛丑七庚子十己
