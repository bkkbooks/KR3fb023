body:
  text: 後改定爲大業術原法無攷今依大業術推之通鑑目錄十二癸卯作十二癸酉宋本不譌戊午十八正癸酉二壬寅四辛丑六庚子八己亥十戊戌十二丁酉朔己未十九正丁卯二丙申五乙丑七甲子九癸亥十一壬戌朔庚申二十正辛酉二庚申四己未六戊午九丁亥十一丙戌朔閏正正己丑雨水二庚申春分辛酉仁壽元正乙酉三甲申五癸未七壬午九辛巳十二庚戌朔壬戌二正庚辰二己酉四戊申六丁未八丙午十乙巳十一甲辰朔閏十十甲戌小雪十一甲辰冬至按通鑑目錄十一月二日冬至與今推一日甲辰冬至不合宋本作一日不譌癸亥三正癸卯四壬申六辛未八庚午十己巳十二戊辰朔甲子四正戊戌二丁卯四丙寅六乙丑九甲午十一癸巳朔乙丑煬帝大業元正壬辰三辛卯五庚寅七己丑八戊子十一丁巳朔閏七七戊午處暑八己丑秋分
