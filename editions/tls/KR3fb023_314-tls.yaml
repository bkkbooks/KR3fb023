body:
  text: 丁酉二十二正乙未二甲午五癸亥七壬戌九辛酉十一庚申朔閏正正甲子雨水二甲午春分按曹植王仲宣誄正月二十四日戊申不合戊戌二十三正己未三戊午五丁白七丙辰十乙酉十二甲申朔己亥二十四正甲寅二癸未四壬午六辛巳八庚辰十己卯十二戊申朔閏十十戊申小雪十一已卯冬至按袁紀三壬子晦不合今推二壬子晦與紀志合庚子海延康元魏文帝黃初元魏仍用四分術已卯蔀首正戊寅二丁未四丙午六乙巳八甲辰十癸卯十二壬寅朔按魏大饗碑八月旬有八日辛未不合辛丑蜀漢昭烈帝章武元魏黃初二蜀漢與魏同用四分術正壬申二辛丑五庚午七已巳九戊辰十一丁卯朔按魏紀注引魏書十己亥朔晉律曆志六月二十七日戊辰十月八日戊辰十一月二十五日壬辰二十八日丁亥並不合壬寅漢章武二魏黃初三吳大帝黃武元漢魏吳同用四分術正丙寅三乙丑五甲子閏六癸亥九壬辰十一辛卯朔六壬戌大暑七癸已處暑按晉律曆志十月十五日乙巳十一月二十九日庚寅並不合
