body:
  text: 癸卯朔並不合朔攷儼十壬寅大任癸卯異己丑四正壬申二辛丑四庚子五己巳六戊戌八丁酉十丙申朔按遼朔攷儼八丁丑不合庚寅長興元正丙寅二乙未四甲午六癸巳七壬戌九辛酉十一庚申朔辛卯二正庚申二己丑五戊午六丁巳七丙戌九乙酉十一甲申朔閏五五丙戌夏至六丁巳大暑按冊府元龜正庚寅朔不合十國春秋後蜀閏四亦不合是時後蜀高祖孟知祥尙未稱帝改元閏當與唐同壬辰三正癸未五壬午七辛巳八庚戌十己酉十二戊申朔按石窟寺經幢八己酉朔不合此年爲吳睿皇楊溥大和四年吳陸元浩仙居洞永安禪院記八月己酉朔六日庚戌尤不合癸巳四正戊寅二丁未五丙子七乙亥九甲戌十一癸酉朔按舊紀二癸丑朔五代春秋十二癸亥朔並不合遼朔攷大任十二己巳尤不合甲午潞王淸泰元正壬申二辛未四庚午七己亥九戊戌十一丁酉朔閏正正庚子雨水二辛未春分按夢溪筆談四月九日己卯通鑑攷異引實錄有三月三十日並不合今推四庚午朔與舊紀新劉延朗傳遼朔攷及李愚末帝卽位冊
  hash: sha256:a63ce3ecf42c8e029d8bb0e4b230029fd4d199eab0551132bbbe33e94a538c9f
