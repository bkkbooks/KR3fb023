body:
  text: 與閏三相合丁酉宋二遼三宋正戊寅二丁未五丙子七乙亥九甲戌十一癸酉朔按遼朔攷宋四丙午不合遼同戊戌宋三遼四宋正壬申三辛未五庚午七己巳十戊戌十二丁酉朔閏十二十二丙寅大寒按九朝編年備要八乙亥朔不合遼同己亥宋四遼五宋正丙申三乙未五甲午六癸亥十壬戌朔正丙申雨水按十二月本辛酉朔當時不應進而進十朝綱要正甲申朔不合遼正丙申三乙未四甲子七癸巳十𡈼戌十二辛酉朔正丙申雨水按紀十壬子朔朔攷云𡈼子誤嘉祐雜志己亥曆日十一月大盡契丹曆此月小據此知十二月朔宋進遼不進庚子宋五遼六宋正辛卯二庚申四己未五戊子七丁亥十丙辰朔遼同辛丑宋六遼七宋正乙酉三甲申五癸未六𡈼子八辛亥九庚戌朔閏八八庚辰秋分九庚戌霜降遼朔閏同八己卯秋分九庚戌霜降按朔攷云儼六壬午誤壬寅宋七遼八宋正己酉三戊申五丁未六丙子八乙亥十甲戌朔按四史朔閏攷云八乙亥紀誤己亥今攷成化本宋史不誤遼同按朔攷云儼六甲子誤
  hash: sha256:45b55d9f68152faba2ea46a541f9e64a88ad8da53de97a4c5a7e1ab23eca8ad3
