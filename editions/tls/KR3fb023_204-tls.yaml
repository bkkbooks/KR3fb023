body:
  text: 七辛酉九庚申朔庚戌四殷十庚寅十二己丑二戊子四丁亥六丙戌八乙酉後九甲申朔十二戊午大寒二戊子驚蟄應閏十二顓十庚寅十一己未正戊午三丁巳五丙辰七乙卯後九甲申朔正丁亥驚蟄三戊午春分應閏正辛亥五殷十甲寅十一癸未正壬午四辛亥六庚戌八己酉朔顓十甲寅十一癸未正壬午三辛巳五庚辰七己卯九戊寅朔壬子六殷十戊申十二丁未二丙午四乙巳七甲戌九癸酉朔後九九壬寅霜降顓十戊申十一丁丑二丙午四乙巳六甲辰八癸卯後九壬寅朔九辛丑霜降癸丑七殷十壬申十二辛未二庚午四己巳六戊辰八丁卯朔十癸酉小雪顓十壬申十一辛丑正庚子三己亥六戊辰八丁卯朔十壬申小雪按漢本紀正辛丑朔與殷合荀氏漢紀正辛酉朔漢五行志五丁卯先晦一日並不合甲寅高后元殷十丁卯十一丙申正乙未三甲午五癸巳七壬辰九辛卯朔顓十丙寅十二乙丑二甲子四癸亥六壬戌九辛卯朔按荀紀二乙卯晦不合乙卯二殷十辛酉十一庚寅正己丑四戊午六丁巳八
