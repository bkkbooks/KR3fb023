body:
  text: 十一癸巳作十一癸酉乃刊本之譌辛酉七魯九正建子壬辰二辛酉四庚申六己未八戊午十一丁亥朔杜氏長術正壬辰三辛卯五庚寅八己未十戊午十二丁巳朔壬戌八魯十正建子丙戌三乙酉五甲申七癸未九壬午十一辛巳十二庚辰朔閏十一十一己酉霜降十二庚辰小雪杜氏長術正丁亥二丙辰五乙酉六甲申八癸未十壬午十二辛巳朔閏五癸亥九魯十一正建子庚戌三己酉五戊申七丁未九丙午十一乙巳朔杜氏長術正辛亥二庚辰四己卯六戊寅八丁丑十丙子十二乙亥朔甲子十魯十二正建子甲辰三癸卯五壬寅八辛未十庚午十二己巳朔杜氏長術正乙巳二甲戌四癸酉閏五壬申八辛丑十庚子十二己亥朔乙丑十一魯十三正建子己亥二戊辰四丁卯六丙寅八乙丑十甲午十二癸巳朔閏九九甲子處暑十甲午秋分杜氏長術正己巳二戊戌四丁酉六丙申八乙未十甲午十二癸巳朔丙寅十二魯十四正建子癸亥二壬辰四辛卯六庚寅八己丑十戊子十二丁亥朔杜氏長術正癸亥二壬辰四辛卯六庚寅九己未十一戊午朔
