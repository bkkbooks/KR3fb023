body:
  text: 十戊寅十一丁未朔閏七七己酉處暑八己卯秋分按此年爲南漢乾和十六年南漢感報寺銅鐘款閏六庚辰朔與周異遼正癸未三壬午五辛巳七庚辰八己卯九戊申十一丁未朔閏七七己酉處暑八己卯秋分己未周六遼九周正丁未二丙子五乙巳七甲辰九癸卯十一壬寅朔按通鑑目錄載劉氏長術止此年遼正丁未二丙子五乙巳七甲辰九癸卯十一壬寅十二辛未朔庚申周恭帝顯德七宋太祖建隆元遼應曆十宋仍用欽天術正辛丑三庚子五己亥八戊辰十丁卯十二丙寅朔按遼朔攷宋十丁亥不合遼仍用調元術同辛酉宋建隆二遼十一宋正丙申二乙丑閏三甲子四癸巳七壬戌十辛卯十二庚寅朔三癸亥穀雨四癸巳小滿按此年爲南漢恩赦侯劉鋹大寶四年南漢銅鐘款九月辛酉朔與欽天術不合遼正丙申二乙丑三甲午四癸巳七壬戌十辛卯十二庚寅朔閏三三癸亥穀雨四癸巳小滿壬戌宋三遼十二宋正庚申二己丑三戊午五丁巳七丙辰十乙酉朔按遼朔攷宋五戊午不合今推丁巳朔與李氏續通鑑長編合遼同癸亥宋乾德元遼十三宋正甲寅三癸丑四壬午六辛巳八庚
