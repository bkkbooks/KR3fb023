body:
  text: 九壬子十二辛巳朔閏四四乙酉小滿五乙卯夏至按統天術同元朔閏同四乙酉小滿五丙辰夏至戊午宋六元八宋正辛亥四庚辰六己卯七戊申九丁未十丙子朔按統天術正辛亥四庚辰六己卯七戊申九丁未十丙子十二乙亥朔元正辛亥四庚辰六己卯七戊申八丁丑十丙子十二乙亥朔己未宋開慶元元九宋正乙巳四甲戌六癸酉八壬申十辛未十一庚子十二己亥朔閏十一十一戊辰冬至十二己亥大寒按統天術同輟耕錄七月二十七日癸亥畢鑑十丁未朔並不合元朔閏同十一己巳冬至十二己亥大寒庚申宋景定元元世祖中統元宋正己巳三戊辰六丁酉八丙申十乙未十一甲子朔按統天術同元同辛酉宋二元二宋正癸亥三壬戌六辛卯九庚申十一己未朔按統天術同癸辛雜識續集閏十一不合四史朔閏攷云中堂事記四壬辰朔紀誤癸巳元同壬戌宋三元三宋正戊午二丁亥四丙戌六乙酉九甲寅十一癸未朔閏九九癸未霜降十甲寅小雪按統天術同紀及畢鑑正戊子朔不合成化本宋史正戊午朔不誤元同癸亥宋四元四宋正壬午二辛亥四庚戌六己酉八戊申十丁未朔按統天術正壬午三辛巳四庚戌六己酉八
