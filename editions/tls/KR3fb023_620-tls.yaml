body:
  text: 癸亥宋十三金三宋正己丑三戊子五丁巳六丙戌八乙酉九甲寅十一癸丑朔閏四四丁亥小滿五戊午夏至按紀元術同玉海正月十一日戊戌不合金同按大金集禮二月十一日乙卯不合甲子宋十四金四宋正癸丑二壬午五辛亥七庚戌九己酉十戊寅十二丁丑朔按紀元術同四史朔閏攷四癸未九己卯朔並不合金同按交聘表正癸卯朔三見不合乙丑宋十五金五宋正丁未三丙午六乙亥八甲戌十癸酉十一壬寅十二辛丑朔閏十一十一辛未冬至十二辛丑大寒按紀元術同系年要錄十一癸卯朔不合金正丁未三丙午六乙亥八甲戌十癸酉閏十一壬申十二辛丑朔十一辛未冬至十二辛丑大寒丙寅宋十六金六宋正辛未二庚子五己巳七戊辰十丁酉十二丙申朔按紀元術同畢氏續通鑑三庚子朔不合金同丁卯宋十七金七宋正乙丑三甲子五癸亥七壬戌十辛卯朔按紀元術同天文志十庚寅晦續宋編年通鑑兩朝編年十一辛卯朔並不合金正乙丑四甲午五癸亥八壬辰十辛卯朔
