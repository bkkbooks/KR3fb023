body:
  text: 十丙申十二乙未朔魏同丙子齊三魏二十齊正乙丑二甲午五癸亥七壬戌九辛酉十一庚申閏十二己未朔十二戊午大寒魏正乙丑二甲午五癸亥七壬戌九辛酉十一庚申十二己未朔閏十一十一己丑冬至十二己未大寒丁丑齊四魏二十一齊正己丑二戊午四丁巳六丙辰九乙酉十一甲申朔正己丑雨水魏朔同戊寅齊永泰元魏二十二齊正癸未三壬午五辛巳七庚辰九己卯十一戊寅朔魏同己卯齊東昏侯永元元魏二十三齊正戊寅二丁未四丙午六乙巳八甲辰九癸卯十一壬寅朔閏八八壬申秋分九癸卯霜降魏朔閏同八癸酉秋分九甲辰霜降庚辰齊二魏宣武帝景明元齊正辛丑四庚午六己巳八戊辰十丁卯十二丙寅朔魏同辛巳齊和帝中興元魏二齊正丙申二乙丑四甲子六癸亥九壬辰十一辛卯朔魏同壬午齊中興二梁武帝天監元魏景明三梁仍用元嘉術正庚寅三己丑五戊子六丁亥八丙戌十乙酉朔閏五五丁巳夏至六丁亥大暑按本紀南史通鑑閏四通鑑目錄六丁亥作閏六丁亥並不合魏仍用元始術正庚寅三已丑閏四戊子六
