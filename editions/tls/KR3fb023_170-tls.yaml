body:
  text: 七庚申處暑九辛卯秋分應閏七辛亥五秦武王元周正建子己未二戊子四丁亥七丙辰九乙卯十一甲寅朔秦十庚寅十一己未正戊午三丁巳六丙戌八乙酉朔壬子六秦二周正建子癸丑三壬子五辛亥七庚戌十己卯十二戊寅朔秦十甲申十二癸未二壬午四辛巳六庚辰八己卯朔癸丑七秦三周正建子戊申二丁丑四丙子閏五乙亥七甲戌九癸酉十一壬申朔五甲戌淸明六乙巳小滿秦十已卯十一戊申正丁未三丙午五乙巳七甲辰九癸卯朔後九三甲戌淸明五乙巳小滿應閏三甲寅八秦四周正建子壬申二辛丑四庚子六己亥八戊戌十丁酉十二丙申朔秦十壬寅十二辛丑三庚午五己巳七戊辰九丁卯朔乙卯九秦昭襄王元周正建子丙寅二乙未四甲午七癸亥九壬戌十一辛酉朔秦十丁酉十一丙寅正乙丑三甲子六癸巳八壬辰朔丙辰十秦二周正建子庚申二己未四戊午六丁巳九丙戌十一乙酉朔閏正正戊子冬至二己未大寒秦十辛卯十二庚寅二己丑四戊子六丁亥八丙戌朔後九十二己未大寒二己丑驚蟄應
