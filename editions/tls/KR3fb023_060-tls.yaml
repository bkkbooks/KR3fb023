body:
  text: 丙戌二魯十七正建子癸酉三壬申五辛未七庚午九己巳十一戊辰朔杜氏長術正甲辰三癸卯五壬寅七辛丑十庚午十二己巳朔丁亥三魯十八正建子丁卯三丙寅五乙丑八甲午十癸巳十二壬辰朔閏十二十二辛酉小雪杜氏長術正己亥二戊辰四丁卯六丙寅八乙丑十甲子朔戊子四魯莊公元正建子辛卯三庚寅五己丑七戊子九丁亥十二丙辰朔正辛卯冬至杜氏長術正癸巳三壬辰五辛卯七庚寅九己丑閏十戊子十二丁亥朔己丑五魯二正建子丙戌二乙卯四甲寅六癸丑八壬子十辛亥十二庚戌朔杜氏長術正丁巳三丙辰五乙卯七甲寅九癸丑十一壬子朔庚寅六魯三正建子庚辰三己卯五戊寅七丁丑九丙子十乙亥十二甲戌朔閏九九乙巳處暑十丙子秋分杜氏長術正辛亥三庚戌五己酉八戊寅十丁丑十二丙子朔辛卯七魯四正建子甲辰二癸酉四壬申七辛丑九庚子十一己亥朔杜氏長術正丙午二乙亥四甲戌五癸酉七壬申九辛未十二庚子朔閏四壬辰八魯五正建子戊戌三丁酉五丙申七乙未十甲子十二癸亥朔杜氏長術正庚午二己亥四戊戌六丁酉八
