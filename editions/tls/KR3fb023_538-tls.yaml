body:
  text: 壬戌並不合丁丑梁三唐十四正辛亥二庚辰四己卯六戊寅九丁未十一丙子朔閏十十乙巳小雪十一丙子冬至按鄭義造幢銘十一月壬子朔二十六日辛丑壬子亦月建也戊寅梁四唐十五正乙亥二甲辰四癸卯六壬寅八辛丑十一庚午朔按通鑑目錄四癸卯作三癸酉不合今推三甲戌朔與遼攷合己卯梁五唐十六正庚午二己亥四戊戌五丁卯六丙申八乙未十二甲子朔庚辰梁六唐十七正甲子三癸亥五壬戌六辛卯閏六庚申八己未十一戊子朔六己未大暑七庚寅處暑按遼朔攷云三癸亥當作癸巳五壬戌當作壬辰皆以不誤爲誤又云六辛亥當作辛酉亦不合辛巳梁龍德元唐十八正戊子三丁亥五丙戌六乙卯七甲申九癸未十一壬午朔按遼朔攷云三丁亥當作丁巳五丙戌當作丙辰皆以不誤爲誤又云四丁卯儼誤作丁亥又云耶律儼陳大任六己卯亦並不合壬午梁二唐十九正壬午三辛巳五庚辰七己卯八戊申十丁未十二丙午朔癸未梁龍德三唐莊宗同光元後唐仍用崇元術正丙子三乙亥
