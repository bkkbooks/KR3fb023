body:
  text: 正壬子四辛巳六庚辰八己卯後九戊寅朔七戊寅處暑九己酉秋分應閏七癸未六殷十戊申十二丁未二丙午四乙巳六甲辰八癸卯朔顓十戊申十一丁丑正丙子三乙亥六甲辰八癸卯朔甲申七殷十壬寅正辛未三庚午五己巳十戊辰九丁卯朔顓十壬寅十二辛丑二庚子四己亥六戊戌八丁酉朔乙酉景帝元殷十丁酉十一丙寅正乙丑四甲午六癸巳八壬辰後九辛卯朔四癸亥小滿六甲午夏至應閏四顓十丁酉十一丙寅正乙丑三甲子五癸亥七壬戌九辛酉朔後九三壬辰淸明五癸亥小滿應閏三丙戌二殷十辛酉十一庚寅正己丑三戊子五丁亥八丙辰朔顓十庚申十二己未三戊子五丁亥七丙戌九乙酉朔丁亥三殷十乙卯十二甲寅二癸丑四壬子六辛亥八庚戌朔顓十乙卯十一甲申正癸未三壬午六辛亥八庚戌朔按漢本紀二壬子晦荀紀二辛巳朔並不合五行志二壬午晦與殷合戊子四殷十己酉正戊寅三丁丑五丙子七乙亥九甲
