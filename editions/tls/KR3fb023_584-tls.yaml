body:
  text: 壬午宋二遼十宋正丙午二乙亥三甲辰五癸卯六壬申九辛丑十一庚午朔閏九九庚午霜降十辛丑小雪按天文志及遼朔攷宋六癸酉朔日食不合今推日食實在壬申朔遼同按趙知微術閏十十庚子小雪十一辛未冬至今進爲辛丑小雪使與閏九相合癸未宋三遼十二宋正庚午二己亥三戊辰五丁卯六丙申八乙未十二甲午朔按東都事略五乙卯朔不合遼同按朔攷云儼九壬申誤甲申宋四遼十三宋正甲子三癸亥四壬辰六辛卯七庚申九己未十一戊午朔按遼朔攷宋七辛酉不合遼正甲子三癸亥四壬辰六辛卯七庚申九己未十二戊子朔乙酉宋五遼十四宋正戊午三丁巳五丙辰六乙卯七甲申九癸未十一壬午朔閏五五甲申夏至六乙卯大暑按宋大詔令十癸亥朔不合遼正戊午四丁亥五丙辰六乙卯七甲申九癸未十一壬午朔閏五五甲申夏至六乙卯大暑按趙知微術閏六六甲寅大暑七乙酉處暑今進爲乙卯大暑使與閏五相合丙戌宋六遼十五宋正壬午三辛巳五庚辰七己卯八戊申十丁未十二丙午朔遼同
