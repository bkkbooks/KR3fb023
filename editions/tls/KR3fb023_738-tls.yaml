body:
  text: 二壬戌朔八年癸亥明三正壬辰二辛酉四庚申七己丑九戊子閏十丁亥十二丙戌朔十丙戌小雪十一丁巳冬至九年甲子明四時憲術正丙辰二乙酉四甲申六癸未九壬子十一辛亥朔大統術同按欽天監頒行萬年書起此年並用定氣與大統恒氣不同蓋時憲術旣行之後以新法氣朔追定之非當時已用新法也自天命十年乙丑至順治元年甲申並仿此今自康熙八年己酉以前並以大統術參校十年乙丑明五正庚戌三己酉四戊寅六丁丑九丙午十二乙亥朔大統術同十一年丙寅明六正乙巳二甲戌四癸酉五壬寅六辛丑八庚子十二己亥朔閏五五己巳夏至六辛丑大暑大統術正乙巳二甲戌四癸酉五壬寅閏六辛丑八庚子十二己亥朔六庚子大暑七辛未處暑按明五行志閏五不合今推閏六與紀合又五行志再見亦作閏六太宗文皇帝天聰元年丁卯明七正己巳二戊戌四丁酉五丙寅七乙丑八甲午朔大統術同二年戊辰明愍帝崇禎元正癸亥三壬戌五辛酉六庚寅八己丑九戊午午十二丁亥朔大統術同
