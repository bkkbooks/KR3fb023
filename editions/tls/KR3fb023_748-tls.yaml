body:
  text: 十六年己亥正癸巳二壬戌閏三辛酉六庚寅八己丑十戊子十二丁亥朔三庚申穀雨四辛卯小滿大統術正癸巳閏正壬戌三辛酉六庚寅八己丑十戊子十二丁亥朔正辛酉雨水二壬辰春分十七年庚子正丁巳二丙戌四乙酉六甲申九癸丑十一壬子朔大統術同十八年辛丑正辛亥三庚戌五己酉六戊寅八丁未十一丙子朔閏七七丙子處暑八丁未秋分大統術正辛亥三庚戌五己酉六戊寅九丁未十一丙子朔閏十十丙午小雪十十丙子冬至聖祖仁皇帝康熙元年壬寅正乙亥三甲戌五癸酉六壬寅八辛丑十二庚子朔大統術正丙子二乙巳三甲戌五癸酉六壬寅八辛丑十二庚子朔二年癸卯正庚午三己巳四戊戌六丁酉七丙寅九乙丑十二甲午朔大統術同三年甲辰正甲子三癸亥五壬戌閏六辛酉七庚寅九己丑十一戊子朔六庚申大暑七壬辰處暑大統術朔閏同六己未大暑七庚寅處暑四年乙巳正戊子三丁亥五丙戌七乙酉八甲寅十癸丑十二壬子朔大統術同五年丙午正壬午三辛巳六庚戌八己酉九戊寅十一
