body:
  text: 九辛卯十一庚寅朔按遼朔攷宋九壬辰十一辛卯並不合今推十一庚寅朔己酉冬至與太常因革禮二十日冬至合遼同按朔攷儼十庚申不合癸巳宋四遼十一宋正庚寅二己未五戊子七丁亥八丙辰十乙卯十一甲寅朔閏十十甲申小雪十一甲寅冬至按遼朔攷宋閏十甲申不合遼同按紀十甲申朔朔攷云儼十甲申誤甲午宋五遼十二宋正甲寅二癸未四壬午七辛亥八庚辰十己卯十二戊寅朔按長編二甲申朔遼朔攷宋十一戊申並不合遼正癸丑四壬午七辛亥八庚辰十己卯十二戊寅朔按紀及朔攷六辛巳十一戊申並不合乙未宋至道元遼十三宋仍用乾元術正戊申二丁丑五丙午七乙巳九甲辰十一癸卯朔按遼朔攷宋四丙子七己巳並不合四史朔閏攷錢侗曰四月二十八日甲辰開寶皇后宋氏崩推得丁丑朔與今所推合遼初用賈俊大明術同按此術無攷今借趙知微重修大明術推之但依史文移置閏月朔攷儼大任七己巳不合丙申宋二遼十四宋正壬寅三辛丑五庚子七己亥九戊辰十一丁卯朔閏七七戊辰處暑八己亥秋分按遼朔攷宋五辛丑不合遼同按趙知微術閏八八戊戌秋分九己巳霜降
