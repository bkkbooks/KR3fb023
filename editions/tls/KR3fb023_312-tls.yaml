body:
  text: 丁亥十二正癸亥三壬戌五辛酉七庚申九己未十一戊午朔戊子十三正丁巳四丙戌六乙酉八甲申十癸未十二壬午朔閏十二十二辛亥大寒已丑十四正辛巳三庚辰五已卯八戊申十丁未十二丙午朔正壬午雨水按通鑑目錄五已卯作六己酉不合庚寅十五正丙子二乙巳四甲辰六癸卯八壬寅十一辛未朔按通鑑目錄十一辛未作十辛丑宋本不譌辛卯十六正庚午三己巳五戊辰七丁卯閏八丙寅十乙丑十二甲子朔八乙丑秋分九丙申霜降壬辰十七正甲午三癸巳五壬辰七辛卯九庚寅十一已丑朔癸巳十八正戊子三丁亥六丙辰八乙卯十甲寅十二癸丑朔甲午十九正癸未二壬子四辛亥五庚戌七己酉十戊寅十二丁丑朔閏四四己卯小滿五庚戌夏至乙未二十正丁未二丙子四乙亥六甲戌八癸酉十壬申十二辛未朔丙申二十一正辛丑三庚子五己亥七戊戌九丁酉十一丙申朔
