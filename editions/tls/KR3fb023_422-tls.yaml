body:
  text: 之但依史文移置閏月今從其例增節氣小餘十分之四乃與當時置閏相符是年正光術六丙戌大暑通鑑目錄六月一日大暑與今推二日丁亥大暑不合乃據正光術也齊仍用天保術正己丑三戊子閏四丁亥六丙戌八乙酉十一甲寅朔四丙戌小滿五丁巳夏至庚辰陳文帝天嘉元周二齊孝昭帝皇建元陳正癸丑三壬子五辛亥七庚戌九己酉十一戊申朔周同齊亦同辛巳陳二周武帝保定元齊武成帝太甯元陳正戊申二丁丑四丙子六乙亥八甲戌十癸酉十二壬申朔周同按北史通鑑甲十戌朔不合今推十月癸酉朔與周紀隋志甲戌不書朔合齊正戊申二丁丑四丙子六乙亥八甲戌十癸酉十二壬申朔閏十二十二庚子大寒壬午陳三周二齊河淸元陳正壬寅二辛未三庚午六己亥八戊戌十丁酉十二丙申朔閏二二庚子春分三辛未穀雨周正壬寅閏正辛未三庚午六己亥八戊戌十丁酉十二丙申朔正寅午雨水二辛丑春分按正光術朔閏中氣並與陳同齊正辛未三庚午六己亥八戊戌十丁酉十二丙申朔正辛未雨水按隋志四丙子日食不合今推在上年與周紀通鑑目錄合癸未陳四周三齊二陳正丙寅二乙未四甲午六癸巳八壬
