body:
  text: 庚寅朔丙申二正己丑三戊子五丁亥七丙戌九乙酉十一甲申朔丁酉三正癸未四壬子閏五辛亥七庚戌九己酉十一戊申朔五庚戌夏至六辛巳大暑戊戌延熹元正丁未三丙午六乙亥八甲戌十癸酉十二壬申朔按通鑑五甲辰晦日食不合今推甲戌晦與紀志及通鑑目錄合己亥二正壬寅二辛未四庚午六己巳八戊辰十一丁酉朔庚子三正丙申二乙未四甲午六癸巳八壬辰十辛卯朔閏正正甲子雨水二乙未春分辛丑四正庚申三己未五戊午七丁巳九丙辰十一乙卯朔壬寅五正甲寅三癸丑六壬午八辛巳十庚辰十一己卯朔閏十十己酉小雪十一己卯冬至癸卯六正戊寅三丁丑五丙子七乙亥十甲辰十二癸卯朔甲辰七正癸酉二壬寅四辛丑六庚子八己亥十戊戌朔
