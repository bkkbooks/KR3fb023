body:
  text: 亥並不合乙卯二正丁巳三丙辰五乙卯七甲寅九癸丑十一壬子朔丙辰三正辛亥三庚戌五已酉八戊寅九丁丑十一丙子朔閏八八丙午秋分九丁丑霜降丁巳四正乙亥三甲戌五癸酉七壬申十辛丑十二庚子朔按五行志二乙亥朔十月八日壬戌並不合戊午五正庚午二已亥四戊戌六丁酉八丙申十乙未十二甲午朔已未六正甲子三癸亥五壬戌六辛酉八庚申十已未十二戊午朔閏五五辛卯夏至六辛酉大暑按袁紀十二戊子朔不合今推戊午朔與紀志合庚申永甯元正戊子二丁巳四丙辰七乙酉九甲申十一癸未朔按袁紀七乙丑朔不合今推乙酉朔與紀志合辛酉建光元正壬午三辛巳五庚辰七己卯十戊申十二丁未朔按許沖上説文解字書九月已亥朔不合壬戌延光元正丁丑二丙午三乙巳五甲辰七癸卯九壬寅十一辛丑朔閏二二乙亥春分三丙午穀雨癸亥二正辛丑二庚午四己巳六戊辰八丁卯十丙寅十二乙丑朔
