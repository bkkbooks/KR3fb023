body:
  text: 卯十一戊寅朔閏六六己酉大暑七庚辰處暑魏正癸丑三壬子六辛巳閏七庚辰九己卯十一戊寅朔七己卯處暑八庚戌秋分按北史十乙酉朔不合今推己酉朔與天象志合庚戌梁二魏東海王建明元梁正丁丑三丙子五乙亥七甲戌十癸卯十二壬寅朔魏同辛亥梁三魏安定壬中興元梁正壬申二辛丑四庚子六己亥八戊戌十丁酉十二丙申朔魏正壬申二辛丑四庚子六己亥八戊戌十丁酉朔壬子梁四魏孝武帝永熙元梁正丙寅三乙丑四甲子六癸亥八壬戌十辛酉十二庚申朔閏三三甲午穀雨四甲子小滿魏朔閏同三癸巳穀雨四甲子小滿按通鑑目錄四甲子作閏四甲子不合魏術藝劉靈助傳北史本紀閏二亦不合今推閏三與北史劉靈助傳合癸丑梁五魏二梁正庚寅二己未五戊子七丁亥九丙戌十一乙酉朔魏同甲寅梁中大通六魏永熙三東魏孝靜帝天平元梁仍用大明術正甲申三癸未五壬午七辛巳十庚戌十二己酉朔閏十二十二戊寅大寒西魏東魏同用正光術同乙卯梁大同元西魏文帝大統元東魏二梁正戊申三丁未五丙午七乙巳九甲辰十一癸卯朔正戊申雨水魏正戊申三丁未
