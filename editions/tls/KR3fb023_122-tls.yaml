body:
  text: 十二丁巳朔杜氏長術正癸巳三壬辰五辛卯七庚寅九己丑十一戊子朔乙未十四魯四正建子丁亥二丙辰四乙卯五甲寅七癸丑九壬子十一辛亥朔閏四四甲申春分五乙卯淸明杜氏長術正丁亥四丙辰六乙卯八甲寅十癸丑十一壬子朔閏十丙申十五魯五正建子庚戌四己卯六戊寅八丁丑十丙子十二乙亥朔杜氏長術正辛亥四庚辰六己卯八戊寅十丁丑十二丙子朔丁酉十六魯六正建子乙巳二甲戌四癸酉七壬寅九辛丑十一庚子閏十二己亥朔十二戊戌小雪杜氏長術正丙午二乙亥四甲戌六癸酉八壬申十一辛丑朔戊戌十七魯七正建子己巳二戊戌四丁酉六丙申八乙未十一甲子朔正己巳冬至杜氏長術正庚子三己亥五戊戌七丁酉九丙申十一乙未朔己亥十八魯八正建子癸亥三壬戌五辛酉七庚申九己未十一戊午朔杜氏長術正甲午三癸亥五壬戌七辛酉九庚申十一己未朔閏二庚子十九魯九正建子丁巳四丙戌六乙酉八甲申九癸未十一壬午朔閏八八壬子大暑九癸未處暑杜氏長術正戊午三丁巳五丙辰八乙酉十甲申十二癸未朔
