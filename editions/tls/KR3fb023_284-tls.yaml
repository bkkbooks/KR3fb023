body:
  text: 未朔辛卯三正丙午三乙巳五甲辰八癸酉十壬申十二辛未朔按通鑑目錄有閏三月五甲辰作四甲辰八癸酉作七癸酉十壬申作九壬申十二辛未作十一辛未又云四月一日小滿並不合今推四月十九日癸巳小滿無閏閏三當在明年壬辰四正辛丑二庚午閏三己巳五戊辰七丁卯九丙寅十二乙未朔三戊辰穀雨四己亥小滿按通鑑目錄無閏月二庚午作正庚午閏三已巳作三已巳並不合今推此年閏三月與紀合癸巳五正乙丑二甲午四癸巳六壬辰八辛卯十庚寅十二己丑朔甲午六正己未二戊子五丁巳七丙辰九乙卯十一甲寅十二癸丑朔閏十一十一壬午冬至十二癸丑大寒按通鑑目錄十二癸丑作閏十二癸丑不合乙未七正癸未二壬子四辛亥七庚辰九已卯十一戊寅朔丙申八正丁丑三丙子五乙亥七甲戌九癸酉十二壬寅朔丁酉九正壬申二辛丑四庚子六己亥八戊戌九丁酉
