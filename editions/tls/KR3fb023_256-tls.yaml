body:
  text: 辛丑鴻嘉元正乙酉三甲申五癸未七壬午九辛巳十一庚辰朔正乙酉驚蟄壬寅二正庚辰二己酉四戊申六丁未八丙午十乙巳十二甲辰朔按通鑑目錄二己酉作正己卯不合癸卯三正甲戌二癸卯四壬寅七辛未九庚午十己巳十二戊辰朔閏九九己亥霜降十庚午小雪按通鑑目錄十月一日小雪與今推二日庚午小雪不合甲辰四正戊戌二丁卯四丙寅六乙丑八甲子十一癸巳朔乙巳永始元正壬辰三辛卯五庚寅七己丑九戊子十一丁亥朔按荀紀九乙巳晦不合今推丁巳晦與五行志合丙午二正丁亥二丙辰四乙卯閏五甲寅七癸丑九壬子十一辛亥朔五癸丑夏至六甲申大暑按通鑑目錄二丙辰作正丙戌不合丁未三正庚戌三己酉六戊寅八丁丑十丙子十二乙亥朔按荀紀正乙卯晦不合今推己卯晦與紀志合戊申四正乙巳二甲戌四癸酉六壬申九辛丑十一庚子朔按通鑑目錄九辛丑作八辛未不合荀紀七辛未朔亦不合今推辛未晦與紀志合
