body:
  text: 烏程汪曰楨丁亥漢桓帝建和元正子亥四庚戌五己酉七戊申九丁未十二丙子朔戊子二正丙午二乙亥四甲戌六癸酉八壬申十辛未十二庚午朔已丑三正庚子二己巳四戊戌六丁酉八丙申十乙未十二甲午朔閏三三戊辰穀雨四戊戌小滿庚寅和平元正甲子二癸巳四壬辰六辛卯九庚申十一己未朔辛卯元嘉元正戊午三丁巳五丙辰七乙卯九甲寅十二癸未朔閏十二十二壬子大寒按熊氏補同姓王侯表閏十百官表閏十一並不合今推閏十二與紀合壬辰二正壬午三辛巳五庚辰七已卯九戊寅十一丁丑朔正壬午雨水癸巳永興元正丙子四乙巳六甲辰八癸卯十壬寅十二辛丑朔甲午二正辛未二庚子四己亥七戊辰九丁卯十丙寅十二乙丑朔閏九九丙申霜降十丁卯小雪乙未永壽元正乙未二甲子四癸亥六壬戌八辛酉十一
