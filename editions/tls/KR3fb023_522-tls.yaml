body:
  text: 戊戌五正丁酉四丙寅六乙丑八甲子九癸巳十一壬辰朔己亥六正辛卯四庚申七己丑八戊午十丁巳十一丙辰朔閏十十丙戌小雪十一丙辰冬至按李濬慧山寺家山記五月十六日甲辰不合庚子廣明元正乙卯三甲寅六癸未八壬午十辛巳十二庚辰朔辛丑中和元正庚戌二己卯四戊寅六丁丑九丙午十一乙巳朔按通鑑目錄四戊寅作三戊寅宋本不譌壬寅二正甲辰三癸卯五壬寅七辛丑八庚子十一己巳朔閏七七庚午處暑八辛丑秋分按通鑑目錄八月一日秋分與今推二日辛丑秋分不合癸卯三正戊辰三丁卯五丙寅六乙未八甲午十二癸巳朔甲辰四正癸亥二壬辰四辛卯六庚寅七己未九戊午十二丁亥朔乙巳光啟元正丁巳三丙辰四乙卯六甲寅七癸未九壬午十一辛巳朔閏三三甲申穀雨四乙卯小滿按通鑑目錄六甲寅作五甲申不合丙午二正辛巳三庚辰五己卯七戊寅八丁未十丙午
