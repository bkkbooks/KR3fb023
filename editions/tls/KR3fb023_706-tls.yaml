body:
  text: 二甲戌朔丙戌二正甲辰二癸酉三壬寅四辛丑六庚子九己巳十十二戊戌朔閏三三庚午穀雨四辛丑小滿丁亥三正戊辰二丁酉三丙寅五乙丑六甲午九癸亥朔戊子四正壬戌三辛酉四庚寅六己丑七戊午九丁巳朔己丑五正丙辰三乙酉四甲寅六癸丑七壬午九辛巳十二庚戌朔閏二二乙卯春分三丙戌穀雨按天文志九丙子朔不合庚寅六正庚辰四己酉五戊寅七丁丑八丙午十乙巳十十二甲辰朔辛卯七正甲戌四癸卯六壬寅八辛丑九庚午十己巳十十二戊辰朔閏九九己亥霜降十己巳小雪壬辰八正戊戌三丁酉六丙寅八乙丑九甲午十一癸巳朔癸巳九正壬辰三辛卯六庚申九己丑十一戊子十二丁巳朔甲午十正丁亥二丙辰四乙卯六甲寅八癸未十一壬子十朔閏六六癸未大暑七甲寅處暑
