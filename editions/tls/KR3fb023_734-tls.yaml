body:
  text: 甲辰三十二正壬子三辛亥六庚辰八己卯九戊申十丁未十二丙午朔閏九九丙子霜降十丁未小雪按國榷十二丁未朔不合乙巳三十三正丙子二乙巳五甲戌七癸酉九壬申十一辛未朔丙午三十四正庚午三己巳五戊辰八丁酉十丙申十二乙未朔丁未三十五正乙丑二甲午四癸巳六壬辰七辛卯十庚申十二己未朔閏六六辛酉大暑七辛卯處暑戊申三十六正己丑二戊午四丁巳五丙戊七乙酉十一甲申朔己酉三十七正癸未三壬午五辛巳六庚戌八己酉十一戊寅朔按國榷正甲申朔不合庚戌三十八正戊寅二丁未閏三丙午五乙巳六甲戌八癸酉十壬申朔三乙巳穀雨四丙子小滿辛亥三十九正壬寅二辛未四庚午六己巳七戊戌九丁酉十一丙申朔壬子四十正丙申三乙未五甲午七癸巳八壬戌十辛酉閏十一庚申朔十一己未冬至十二庚寅大寒癸丑四十一正己未五戊午七丁巳八丙戌十乙酉十二
