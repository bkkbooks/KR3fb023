body:
  text: 巳十二甲辰朔八乙巳秋分九丙子霜降按舊紀十一壬申十二戊午朔並不合戊戌乾元元年初用至德術正甲戌二癸卯四壬寅六辛丑八庚子十二己亥朔按此年復以載爲年至德術無攷今錄劉氏長術月朔仍以大衍術參校之其節氣卽借大衍術推之此年大衍十一己巳朔餘並同舊紀志十二月丙寅立春與大衍二十九日丁卯立春不合己亥二正己巳二戊戌三丁卯五丙寅六乙未八甲午十二癸巳朔按大衍術同庚子上元元正癸亥三壬戌四辛卯五庚寅六己未八戊午十一丁亥朔閏四四己未小滿五庚寅夏至按大衍術同辛丑二正丁亥二丙辰四乙卯六甲寅七癸未九壬午朔按大衍術同此年九月以十一月爲歲首月以斗所建辰爲名移今年十一月爲明年建子月故此年止于十月舊志閏四舊紀六癸丑朔並不合壬寅寶應元建子月壬午建丑月辛亥建辰月庚辰五己卯七戊寅八丁未十丙午十二乙巳朔按大衍術建子月辛巳朔餘並同此年建巳月仍改用寅正凡十四月爲一年舊紀七己卯八己酉朔並不合癸卯代宗廣德元初用五紀術上元甲子以來二十六萬九
