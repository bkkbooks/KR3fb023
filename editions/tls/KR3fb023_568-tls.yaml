body:
  text: 今進爲己亥秋分使與閏七相合丁酉宋三遼十五宋正丙寅三乙丑五甲子七癸亥十壬辰朔按遼朔攷宋六癸巳不合遼同戊戌宋眞宗咸平元遼十六宋正辛酉二庚寅四己丑五戊午七丁巳十丙戌朔遼同己亥宋二遼十七宋正乙卯三甲寅四癸丑五壬午七辛巳九庚辰朔閏三三壬午穀雨四癸丑小滿按五行志閏二遼朔攷宋正丙辰七辛丑並不合遼正乙卯三甲寅閏四癸丑五壬午七辛巳九庚辰朔四壬子小滿五癸未夏至庚子宋三遼十八宋正己卯三戊寅五丁丑六丙午八乙巳十甲辰朔按十朝綱要正己丑朔不合遼同辛丑宋四遼十九宋初用儀天術上元甲子以來七十一萬六千四百九十八年正甲戌二癸卯四壬寅六辛丑七庚午九己巳十一戊辰朔閏十二十二丁卯大寒按遼朔攷宋三壬申不合遼仍用賈俊大明術正癸酉四壬寅六辛丑七庚午九己巳十戊戌十二丁卯朔閏十一十一丙申冬至十二丁卯大寒按趙知微術閏十二十二丙寅大寒明年正丁酉雨水今進爲丁卯大寒使與閏十一相合壬寅宋五遼二十宋正丁酉四丙寅六乙丑七甲午九癸巳十一壬辰朔正丁酉雨水按十朝綱要七甲申朔不合遼
