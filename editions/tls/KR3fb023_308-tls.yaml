body:
  text: 閏十二壬申朔十二辛未大寒按通鑑四丙子朔不合今推丙午朔與紀志合庚午獻帝初平元正壬寅二辛未四庚午六已巳八戊辰十丁卯十二丙寅朔正壬寅雨水辛未二正丙申三乙未五甲午七癸巳九壬辰十一辛卯朔壬申三正庚寅三已丑五戊子八丁巳九丙辰十一乙卯朔閏八八乙酉秋分九丙辰霜降癸酉四正甲寅三癸丑五壬子七辛亥十庚辰十二已卯朔甲戌興平元正已酉二戊寅四丁丑六丙子八乙亥十甲戌十二癸酉朔乙亥二正癸卯三壬寅五辛丑六庚子八已亥十戊戌十二丁酉朔閏五五庚午夏至六庚子大暑丙子建安元正丁卯二丙申四乙未七甲子九癸亥十一壬戌朔丁丑二正辛酉三庚申五已未七戊午十丁亥十二丙戌朔按通鑑目錄十二丙戌作十一丙辰宋本不譌戊寅三正丙辰二乙酉三甲申五癸未七壬午九辛巳十一庚辰朔閏二二甲寅春分三乙酉穀雨按通鑑目錄三月一日
