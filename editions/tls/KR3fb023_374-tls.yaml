body:
  text: 寅春分三丙申穀雨己未晉恭帝元熙元涼八魏四晉魏正壬辰二辛酉四庚申六己未九戊子十一丁亥朔按通鑑目錄九戊子作八戊午宋本作八戊子並不合涼正壬辰二辛酉四庚申六己未八戊午十一丁亥朔歷代長術輯要卷五
