body:
  text: 丙子四正庚寅二已未四戊午六丁巳九丙戌十一乙酉朔按紀志十二甲申朔不合今推乙酉朔與宋志合丁丑元帝建武元正甲申三癸未五壬午七辛巳八庚辰十已卯朔閏七七庚戌處暑八辛巳秋分按紀五景子十景子志五景子十一景子並日食不合戊寅太興元正戊申三丁未五丙午七乙巳九甲辰十一癸卯朔已卯二正壬寅四辛未六庚午八己巳十戊辰十二丁卯朔庚辰三正丁酉二丙寅閏三乙丑五甲子八癸巳十壬辰十二辛卯朔三甲子穀雨四乙未小滿辛巳四正辛酉二庚寅四己丑六戊子八丁亥十丙戌朔壬午永昌兀正乙卯三甲寅五癸丑七壬子九辛亥十一庚戌十二已酉朔閏十一十一戊寅冬至十二已酉大寒按志及宋志閏十二通鑑目錄十二已酉作閏十二己卯宋本作閏十一己酉並不合癸未明帝太甯元正已卯三戊寅五丁丑七丙子九乙亥十一甲戌朔按宋志正己丑朔不合今推己卯朔與志合志七庚子朔亦不合今推丙子朔與紀及宋志合
