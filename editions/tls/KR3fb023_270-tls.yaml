body:
  text: 癸巳九正癸丑四壬午六辛巳八庚辰十己卯十二戊寅朔按五行志注引古今注七丁酉日食不合甲午十正戊申二丁丑四丙子七乙巳九甲辰十一癸卯朔按通鑑目錄七乙巳作六乙亥不合天文志注引古今注有閏月亦不合乙未十一正壬寅三辛丑四庚子六己亥八戊戌十一丁卯朔閏三三庚午淸明四庚子小滿按五行志注引古今注六癸丑十二辛亥日食並不合丙申十二正丙寅三乙丑五甲子七癸亥九壬戌十一辛酉朔丁酉十三正庚申四己丑六戊子八丁亥十丙戌十二乙酉朔閏十二十二甲寅大寒戊戌十四正甲申三癸未六壬子八辛亥十庚戌十二己酉朔正乙酉驚蟄按通鑑目錄六壬子作五壬午不合己亥十五正己卯二戊申四丁未六丙午八乙巳十一甲戌朔庚子十六正癸酉三壬申五辛未七庚午閏八己巳十戊辰朔八戊辰秋分九己亥霜降按通鑑目錄十二丁卯朔不合辛丑十七正丁酉三丙申五乙未七甲午九癸巳十一壬辰朔按通鑑目錄三丙申作二丙申宋本不譌本紀二
