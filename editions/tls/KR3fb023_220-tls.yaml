body:
  text: 甲午三殷十甲辰十二癸卯二壬寅四辛丑七庚午九己巳朔顓十甲辰十二癸卯二壬寅四辛丑六庚子八己亥朔按漢本紀五行志九戊戌晦與殷合乙未四殷十己亥十一戊辰正丁卯三丙寅五乙丑七甲子朔顓十戊戌十二丁酉二丙申五乙丑七丙子九癸亥朔按漢本紀十戊午日蝕不合丙申五殷十癸巳十二壬辰二辛卯四庚寅六己丑八戊子後九丁亥朔二庚申春分四辛卯淸明應閏二顓十癸巳十一壬戌正辛酉三庚申五己未八戊子後九丁亥朔二己未春分四庚寅淸明應閏二丁酉六殷十丁巳十一丙戌二乙卯四甲寅六癸丑八壬子朔顓十丁巳十一丙戌正乙酉三甲申五癸未七壬午九辛巳朔戊戌後元殷十辛亥十二庚戌二己酉五戊寅七丁丑九丙子朔顓十辛亥十二庚戌二己酉四戊申六丁未八丙午朔按漢本紀七乙巳晦與顓合五行志荀紀七乙巳先晦一曰與殷合己亥二殷十丙午十一乙亥正甲戌三癸酉五壬申七辛未後九庚子朔十甲戌小雪十二乙巳冬至應閏十顓十乙巳十二甲辰二癸卯五壬申七辛未九庚午朔後九十癸酉小雪十二甲
