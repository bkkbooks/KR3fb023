body:
  text: 八戊午十丁巳朔閏正正庚寅雨水二辛酉春分西魏正壬戌二辛酉四庚申六己未八戊午十一丁亥朔閏正正庚寅雨水二辛酉春分按通鑑目錄脫閏正二字乃刊本之譌東魏與西魏同甲子梁十魏十東魏二梁正丙戌三乙酉五甲申七癸未九壬午十一辛巳朔西魏同東魏亦同乙丑梁十一魏十一東魏三梁正庚辰四己酉六戊申八丁未十丙午十一乙巳朔閏十十乙亥小雪十一乙巳冬至西魏同東魏亦同丙寅梁中大同元魏十二東魏四梁正甲辰三癸卯五壬寅八辛未十庚午十二己巳朔西魏同東魏亦同丁卯梁太淸元魏十三東魏五梁正己亥二戊辰四丁卯六丙寅八乙丑十甲子朔西魏正己亥二戊辰四丁卯六丙寅八乙丑十一甲午朔東魏與西魏同戊辰梁二魏十四東魏六梁正癸巳三壬辰五辛卯七庚寅八己丑十戊子十二丁亥朔閏七七己未處暑八庚寅秋分西魏朔閏同七己未處暑八己丑秋分東魏與梁同己巳梁三魏十五東魏七梁正丁巳三丙辰五乙卯七甲寅九癸丑十一壬子朔西魏同東魏亦同庚午梁簡文帝大寶元魏大統十六東魏武定八北齊文宣帝天保元梁仍用大明
