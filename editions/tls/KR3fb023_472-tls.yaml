body:
  text: 乙卯三正甲申二癸丑四壬子五辛巳七庚辰九己卯朔按通鑑目錄四壬子作三壬午不合醴泉寺誌公碑二月己酉朔不合今推己酉乃十月朔與胡佺墓志合丙辰四正戊寅三丁丑五丙子六乙巳八甲辰十癸卯朔閏十二十二壬申大寒按通鑑目錄八甲辰作七甲戌十癸卯作九癸酉又云閏十二壬申朔並不合丁巳五正壬寅三辛丑四庚午六己巳七戊戌九丁酉十二丙寅朔正癸卯啟蟄按通鑑目錄正月一日雨水與今推二日癸卯啟蟄十七日戊午雨水不合滕王湛然竇希瑊神道碑十月丁巳朔亦不合戊午六正丙申四乙丑五甲午七癸巳九壬辰十辛酉朔按通鑑目錄七癸巳作八癸亥不合今推七癸巳朔與正覺浮圖銘合舊紀正丙辰朔舊志五乙丑朔並不合己未七正辛卯二庚申四己未六戊午閏七丁巳八丙戌十乙酉十二甲申朔七丙辰處暑八丙戌秋分按崔逸鬱林觀記正月庚寅朔王仁皎碑十一月乙丑朔並不合庚申八正甲寅三癸丑六壬午八辛巳九庚戌十一己酉朔按舊紀正甲子朔通鑑攷異引唐曆正月二十八日辛卯並不合
