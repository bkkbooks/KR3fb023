body:
  text: 戊申五丁丑七丙子九乙亥十一甲戌朔癸未十四魯二十二正建子壬申三辛未五庚午七己巳九戊辰十二丁酉朔杜氏長術正癸酉三壬申五辛未七庚午九己巳十二戊戌朔甲申十五魯二十三正建子丁卯二丙申四乙未六甲午八癸巳十壬辰十二辛卯朔閏十二十二庚申小雪杜氏長術正戊辰二丁酉四丙申六乙未八甲午十癸巳十二壬辰朔乙酉十六魯二十四周術辛卯蔀首正建子辛卯二庚申四己未六戊午八丁巳十丙辰十二乙卯朔正辛卯冬至杜氏長術正壬戊二辛卯四庚寅五已丑七戊子九丁亥十一丙戌朔閏四丙戌十七魯二十五正建子乙酉二甲寅四癸丑七壬午九辛巳十一庚辰朔杜氏長術正丙戌二乙卯四甲寅六癸丑八壬子十辛亥十二庚戌朔閏十二丁亥十八魯二十六正建子己卯三戊寅五丁丑七丙子閏八乙亥十一甲辰朔八甲寅大暑九乙巳處暑杜氏長術正己酉三戊申五丁未七丙午九乙巳十一甲辰朔戊子十九魯二十七正建子癸卯三壬寅五辛丑七庚子九己亥十一戊戌朔杜氏長術正癸卯四壬申六辛未八庚午十己巳十二戊辰朔
