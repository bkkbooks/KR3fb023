body:
  text: 二月辛酉朔又祭廬山文二月二十五日乙酉通鑑攷異十戊午朔並不合戊戌十三正乙酉三甲申六癸丑八壬子十辛亥十二庚戌朔按正元術同舊志閏五會要六壬子朔並不合己亥十四正庚辰二己酉四戊申六丁未九丙子十一乙亥朔按正元術同庚子十五正甲戌二癸酉四壬申六辛未八庚午十一己亥朔閏正正癸卯雨水二癸酉春分按正元術同舊紀十一乙亥朔劉禹錫祭柳員外文正戊戌朔並不合辛丑穆宗長慶元正戊戌三丁酉五丙申六乙丑八甲子十
