body:
  text: 午朔甲子晉王泰定元正戊子二丁巳四丙辰五乙酉八甲寅十一癸未朔乙丑二正壬午二辛巳四庚辰五己酉七戊申十一丁未朔閏正正庚戌雨水二辛巳春分丙寅三正丙午三乙巳五甲辰六癸酉八壬申十辛未朔按紀五甲戌朔不合丁卯四正辛丑二庚午四己巳六戊辰七丁酉九丙申十乙未朔閏九九甲子霜降十乙未小雪戊辰致和元文宗天曆元正乙丑二甲午四癸巳六壬辰七辛酉九庚申十己丑朔己巳明宗天曆二正己未二戊子五丁巳七丙辰八乙酉十甲申十一癸丑朔庚午文宗至順元正癸丑二壬午五辛亥七庚戌八己酉十戊申十一丁丑朔閏七七己卯處暑八己酉秋分辛未二正丁丑二丙午五乙亥七甲戌九癸酉十一壬申朔壬申三正辛未三庚午五己巳七戊辰十丁酉十二丙申朔癸酉順帝元統元正丙寅二乙未閏三甲午四癸亥六壬戌
