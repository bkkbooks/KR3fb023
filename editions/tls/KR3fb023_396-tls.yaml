body:
  text: 戊午宋二魏二宋正己酉三戊申五丁未七丙午九乙巳十一甲辰朔正己酉雨水按南史三已丑朔建康實錄九乙卯朔並不合今推九乙巳朔與宋紀合魏同按通鑑目錄此年脫魏朔乃刊本之譌天象志北史二乙酉晦通鑑目錄二已酉晦並不合己未宋昇明三齊高帝建元元魏太和三齊仍用元嘉術更名建元術正癸卯四壬申六辛未八庚午十已巳十二戊辰朔魏仍用元始術同庚申齊建元二魏四齊正戊戌二丁卯四丙寅七乙未九甲午十癸巳十二壬辰朔閏九九癸亥霜降十甲午小雪按天文志閏正五行志閏六並不合魏正戊戌二丁卯四丙寅七乙未八甲午十癸巳十二壬辰朔閏七七癸亥處暑八甲午秋分按通鑑目錄八甲午作閏八甲午不合辛酉齊三魏五齊正壬戌二辛卯四庚寅六已丑八戊子十一丁巳朔魏同按通鑑二丁卯朔天象志北史七庚申朔並不合今推二辛卯朔與魏紀北史合七已未朔與南齊志南史合壬戌齊四魏六齊正丙辰三乙卯五甲寅七癸丑九壬子十一辛亥朔按五行志五戊午朔不合魏同癸亥齊武帝永明元魏七齊正庚戌四己卯閏五戊寅七丁丑
