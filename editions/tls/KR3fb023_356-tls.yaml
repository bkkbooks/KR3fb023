body:
  text: 十二辛酉朔壬子八正辛卯二庚申五己丑七戊子九丁亥閏十丙戌十二乙酉朔十乙酉小雪十一丙辰冬至按通鑑目錄十二乙酉作十一乙酉宋本不譌癸丑九正乙卯二甲申四癸未六壬午九辛亥十一庚戌朔甲寅十正己酉三戊申五丁未七丙午九乙巳十二甲戌朔乙卯十一正甲辰二癸酉四壬申六辛未七庚午九已巳十一戊辰朔閏六六己亥大暑七庚午處暑丙辰十二正丁卯四丙申六乙卯八甲午十癸巳十二壬辰朔丁巳升平元正壬戌二辛卯四庚寅六己丑九戊午十一丁巳朔戊午二正丙辰三乙卯四甲寅六癸丑八壬子十一辛巳朔閏三三甲申穀雨四甲寅小滿已未三正庚辰三已卯五戊寅七丁丑九丙子十一乙亥朔庚申四正甲戌四癸卯六壬寅八辛丑十庚子十二已亥朔閏十二十二戊辰大寒
