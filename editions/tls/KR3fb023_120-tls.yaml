body:
  text: 戊子七魯二十九正建子丁卯二丙申五乙丑七甲子九癸亥十一壬戌朔杜氏長術正戊辰二丁酉四丙申七乙丑九甲子十一癸亥朔己丑八魯三十正建子辛酉三庚申五己未七戊午十丁亥十一丙戌朔閏十十乙卯秋分十一丙戌霜降杜氏長術正壬戌三辛酉五庚申六己未八戊午十一丁亥朔閏五庚寅九魯三十一正建子乙酉三甲申五癸未七壬午九辛巳十二庚戌朔杜氏長術正丙戌三乙酉五甲申七癸未九壬午十一辛巳朔辛卯十魯三十二正建子庚辰二己酉四戊申六丁未八丙午十乙巳十二甲辰朔杜氏長術正庚辰四己酉六戊申八丁未十丙午十二乙巳朔按外紀目錄十二乙巳作十一乙巳乃刊本之譌壬辰十一魯定公元正建子甲戌二癸卯五壬申七辛未八庚午十己巳十二戊辰朔閏七七庚子夏至八庚午大暑杜氏長術正乙亥二甲辰四癸卯六壬寅九辛未十一庚午朔癸巳十二魯二正建子戊戌二丁卯四丙寅六乙丑九甲午十一癸巳朔杜氏長術正己巳三戊辰五丁卯六丙寅八乙丑十一甲午朔閏五甲午十三魯三正建子壬辰三辛卯五庚寅七己丑九戊子
