body:
  text: 壬戌十一辛酉朔魏正乙丑四甲午六癸巳八壬辰十辛卯十二庚寅朔吳正丙寅二乙未四甲午六癸巳八壬辰十辛卯十二庚寅朔按通鑑目録二乙未作一乙未乃刊本之訛甲戌漢十七魏高貴鄉公正元元吳五鳳元漢正辛酉二庚寅四巳丑六戊子八丁亥十丙戌十二乙酉朔魏正庚申二已丑四戊子六丁亥九丙辰十一乙卯朔吳正庚申二已丑四戊子七丁巳九丙辰十一乙卯朔乙亥漢十八魏二吳二漢正乙卯閏正甲申三癸未六壬子八辛亥十庚戌十二已酉朔正癸未雨水二甲寅春分魏正甲寅二癸丑四壬子六辛亥八庚戌十一已卯朔閏正正壬午雨水二癸丑春分吳正甲寅二癸丑四壬子六辛亥九庚辰十一已卯朔閏正正癸未雨水二癸丑春分丙子漢十九魏甘露元吳太平元漢正已卯二戊申四丁未六丙午九乙亥十一甲戌朔魏正戊寅三丁丑五丙子七乙亥九甲戌十一癸酉朔吳與魏同丁丑漢二十魏二吳二漢正癸酉三壬申五辛未七庚午九已巳十戊辰朔閏九九丁酉霜降十戊辰小雪按通鑑目録十戊辰作閏十戊辰不合魏正壬申四辛丑六庚子八已亥十戊戌十一丁酉朔閏十十丁卯小雪十一丁酉冬至吳正癸酉
