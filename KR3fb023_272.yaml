body:
  text: 乙亥晦不合今推乙未晦與五行志袁紀合壬寅十八正辛卯三庚寅六己未八戊午十丁巳十二丙辰朔癸卯十九正丙戌二乙卯四甲寅五癸丑七壬子十辛巳十二庚辰朔閏四四壬午小滿五癸丑夏至甲辰二十正庚戌二己卯四戊寅六丁丑八丙子十乙亥朔按通鑑目録十二甲戌朔不合乙巳二十一正甲辰三癸卯五壬寅七辛五九庚子十一己亥朔丙午二十二正戊戌二丁酉五丙寅七乙丑九甲子十一癸亥朔閏正正丁卯驚蟄二丁酉春分丁未二十三正壬戌三辛酉五庚申八已丑十戊子十二丁亥朔按通鑑目録八已丑作七己未不合戊申二十四正丁巳二丙戌四乙酉六甲申八癸未十壬午十二辛亥朔閏十十辛亥小雪十一壬午冬至己酉二十五正辛巳二庚戌四己酉六戊申八丁未十丙午十二乙巳朔庚戌二十六正乙亥二甲辰五癸酉七壬申九辛未十一庚午朔按通鑑目録二甲辰作三甲辰乃刊本之訛五行志注引古今注二戊子日食不合超辰率是年太歲
