body:
  text: 壬辰四正戊寅二丁未四丙午六乙巳八甲辰十癸卯十二壬申朔閏十十壬申小雪十一癸卯冬至癸巳河平元正壬寅二辛未四庚午六己巳八戊辰十丁卯十二丙寅朔按荀紀四乙亥晦不合今推己亥晦與紀志合甲午二正丙申三乙未五甲午七癸巳九壬辰十一辛卯朔乙未三正庚寅三己丑五戊子七丁巳九丙辰十一乙卯朔閏六六丙戌大暑七丁巳處暑按通鑑目録七丁巳作閏六丁亥不合丙申四正甲寅三癸丑五壬子七辛亥九庚戌十二己卯朔丁酉陽朔元正己酉二戊寅四丁丑六庚子八己亥十甲戌十二癸酉朔戊戌二正癸卯二壬申四辛丑六庚子八己亥十戊戌十二丁酉朔閏三三辛未淸明四辛丑小滿己亥三正丁卯二丙申四乙未七甲子九癸亥十一壬戌朔按通鑑目録七甲子作六甲午不合庚子四正辛酉三庚申五己未七戊午九丁巳十二丙戌朔閏十二十二乙卯大寒
