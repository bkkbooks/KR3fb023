body:
  text: 順宗哀冊文七壬申朔舊紀閏六壬子十二丙申朔並不合丁亥二初用觀象術正己丑四戊午六丁巳七丙戌九乙酉十一甲申朔按此術無攷今錄劉氏長術月朔仍以正元術參校之其節氣卽借正元術推之此年正元術同戊子三正癸未五壬午七辛巳九庚辰十己酉十二戊申朔按正元術同舊志會要七癸巳日蝕不合己丑四正戊寅二丁未四丙子六乙亥八甲戌十癸酉十二壬申朔閏三三丙午穀雨四丙子小滿按正元術同會要閏二李翶來南錄二丁未朔三丁未朔亦閏二不合今以正元術推得閏三與舊志及韓愈薛公達墓誌合又韓愈祭薛助敎文後三月二十一日景寅不合僧維新經幢八月癸酉朔乃月建也庚寅五正壬寅二辛未四庚午七己亥九戊戌十二丁卯朔按正元術十一丁酉朔餘同辛卯六正丙申三乙未五甲午七癸巳十壬戌閏十二辛卯朔十二庚寅大寒按正元術同舊紀正丙寅十二癸亥朔並不合壬辰七正辛酉二庚寅三己未四戊子六丁亥九丙辰
