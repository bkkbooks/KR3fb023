body:
  text: 丁亥八丙戌十乙酉朔四丁亥小滿五戊午夏至按通鑑目録魏閏五月閏四戊子作五戊子不合孫秋生造像記五戊子朔亦不合今推閏四與蕭寶夤傳及北史合癸未梁天監二魏四梁正甲寅三癸丑五壬子七辛亥九庚戌十一己酉朔按徐免永陽王太妃墓志六甲午朔不合魏同甲申梁三魏正始元梁正戊申四丁丑六丙子八乙亥十甲戌十二癸酉朔魏正戊申四丁丑六丙子八乙亥十甲戌十二癸酉朔閏十二十二辛丑大寒乙酉梁四魏二梁正癸卯二壬申三辛未五庚午八己亥十戊戌十二丁酉朔閏二二辛丑春分三壬申穀雨魏正壬申三辛未五庚午八己亥十戊戌十二丁酉朔正壬申雨水丙戌梁五魏三梁正丁卯二丙申四乙未六甲午八癸巳十壬辰朔魏同丁亥梁六魏四梁正辛酉三庚申五己未七戊午九丁巳閏十丙辰十二乙卯朔十乙卯小雪十一丙戌冬至魏正辛酉三庚申五己未七戊午九丁巳十丙辰十二乙卯朔閏九九丙戌霜降十丙辰小雪戊子梁七魏永平元梁正乙酉三甲申五癸未七壬午九辛巳十一庚辰朔魏同
