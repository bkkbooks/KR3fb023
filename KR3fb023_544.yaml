body:
  text: 文合此年為後蜀高祖明德元年錦里耆舊傳亦作四月庚午朔又遼紀六己巳朔不合乙未二正丙申三乙未五甲午七癸巳十壬戌朔按吳越釋彙征上天竺寺經幢記乙未歲十二月壬寅朔不合丙申唐淸泰三後晉高祖天福元後晉仍用崇元術正辛卯二庚申四己未六戊午七丁亥十丙辰十二乙酉朔閏十一十一乙卯冬至十二丙戌大寒按十二月本當進為丙戌朔當時避明年正旦日食故不進通鑑目録閏十會要閏十二並不合舊紀閏十一月丙辰日南至通鑑目録十一月一日冬至與今推十一月三十日乙卯冬至俱不合通鑑十二辛酉朔亦不合宋本目録閏十一一日冬至十二二日大寒亦有訛丁酉晉天福二正甲寅四癸未五壬子七辛亥九庚戌十二己卯朔按正月本當進為乙卯朔十二月本當進為庚辰朔當時避比年正旦日食故皆不進新司天考五代春秋正乙卯朔遼朔考大任正乙卯乃依推步本法也此年為後蜀明德四年南唐烈祖李忭升元元年通鑑目録云蜀正乙卯朔南唐十二庚辰朔後蜀南唐所用術並無考
