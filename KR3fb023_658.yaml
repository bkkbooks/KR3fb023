body:
  text: 己丑九戊子朔是年所頒會天術至今尚有傳本正月一日癸巳申正初刻立春十六日戊申亥初一刻雨水二月二日甲子丑正二刻驚蟄十七日己卯辰初三刻春分三月三日甲午未初初刻淸明十八日己酉酉正一刻穀雨四月三日甲子其夜子初二刻立夏十九日庚辰寅正三刻小滿五月五日乙未已正初刻芒種二十日庚戌刻夏至按今推申初一刻六月六日乙丑戌正二刻小暑二十二日辛巳初三刻大暑按今推丑初三刻七月七日丙申辰初初刻立秋二十二日辛亥午正一刻處暑八月八日丙寅酉初二刻白露按卷首如此卷中又作七日乙丑白露訛八月下仍作八日丙寅二十三日辛巳亥正三刻秋分九月十日丁酉寅初四刻寒露二十五日壬子巳初初刻霜降十月十日丁卯未正一刻立冬二十五日壬午戌初二刻小雪十一月十一日戊戌子正四刻大雪二十六日癸丑卯正初刻冬至十二月十一日戊辰午初一刻小寒二十六日癸未申正二刻大寒與今所推月朔及節氣時刻並合癸辛雜識續集四月四日立夏九月九日寒露十二月十二日小寒並不合理數日抄九月十七日癸亥亦不合元與統天術同丁巳宋五元七宋正丁亥四丙辰五乙卯六甲申八癸未
