body:
  text: 己亥十魯十一正建子辛亥三庚戌五己酉七戊申九丁未十二丙子朔杜氏長術正癸丑二壬午四辛巳六庚辰八己卯十戊寅朔庚子十一魯十二正建子丙午二乙亥四甲戌六癸酉八壬申十辛未十二庚午朔閏十二十二己亥小雪杜氏長術正丁未三丙午五乙巳七甲辰九癸卯十一壬寅朔辛丑十二魯十三周術庚午蔀首正建子庚午二己亥四戊戌六丁酉八丙申十乙未十二甲午朔正庚午冬至杜氏長術正辛丑四庚午六己巳八戊辰九丁卯十一丙寅朔閏八壬寅十三魯十四正建子甲子二癸巳四壬辰七辛酉九庚申十一己未朔杜氏長術正乙丑三甲子五癸亥八壬辰十辛卯十二庚寅朔癸卯十四魯十五正建子戊午三丁巳五丙辰七乙卯閏八甲寅十一癸未朔八癸丑大暑九甲申處暑杜氏長術正庚申二己丑四戊子六丁亥九丙辰十一乙卯朔甲辰十五魯十六正建子壬午三辛巳五庚辰七己卯九戊寅十一丁丑朔杜氏長術正甲寅三癸丑五壬子七辛亥九庚戌閏十己酉十二戊申朔按外紀目録十二戊申作十一戊申乃刊本之訛
