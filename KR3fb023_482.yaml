body:
  text: 申朔癸未二正辛丑四庚午五己亥七戊戌八丁卯十丙寅朔按張探元碑六月己酉朔不合甲申三載正丙申二乙丑四甲午五癸亥七壬戌八辛卯十庚寅朔閏二二甲午春分三乙丑穀雨按此年更名年曰載通鑑目録十庚寅作十一庚申不合舊紀正丙辰朔亦不合乙酉四載正己未四戊子六丁亥八丙戌九乙卯十一甲寅朔丙戌五載正癸丑五壬子七辛亥九庚戌十己卯十一戊寅朔閏十十戊申小雪十一己卯冬至丁亥六載正丁丑四丙午六乙巳八甲辰十癸卯十二壬寅朔按舊紀正辛巳朔不合戊子七載正壬申二辛丑四庚子七己巳九戊辰十一丁卯朔己丑八載正丙寅三乙丑五甲子閏六癸亥八壬戌十一辛卯朔六壬戌大暑七癸巳處暑按通鑑目録八壬戌作七壬辰不合今推七月一日癸巳處暑通鑑目録既以七月為壬辰朔又云七月一日處暑亦不合庚寅九載正庚寅三己丑五戊子六丁巳九丙戌朔辛卯十載正乙酉三甲申四癸丑六壬子七辛巳九庚辰
