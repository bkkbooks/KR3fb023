body:
  text: 不合今推七甲戌晦與宋五行志南史合癸未宋二十魏四正壬寅三辛丑六庚午八已巳十戊辰十二丁卯朔按通鑑目錄十一月十日冬至與今推十六日癸丑冬至不合甲申宋二十一魏五正丁酉二丙寅四乙丑六甲子八癸亥十一壬辰朔乙酉宋二十二魏五宋初用元嘉術甲午紀二百三十四年正辛卯三庚寅五已丑六戊子八丁亥十丙戌十二乙酉朔閏五五戊午夏至六戊子大暑按建康實錄正辛酉朔不合今推辛卯朔與南史合魏仍用景初術正辛卯二庚寅四已丑六戊子八丁亥十丙戌十二乙酉朔閏正正已未雨水二庚寅春分丙戌宋二十三魏七宋正乙卯三甲寅五癸丑七壬子九辛亥十一庚戌朔魏同丁亥宋二十四魏八宋正已酉三戊申六丁丑八丙子十乙亥十二甲戌朔魏正已酉三戊申六丁丑八丙子十乙亥十二甲戌朔閏十十甲辰小雪十一甲戌冬至按通鑑目錄十一月二日冬至與今推一日甲戌冬至不合宋本作一日不譌戊子宋二十五魏九宋正甲辰二癸酉三壬申五辛未七庚
