body:
  text: 辛丑陳太建十三周大定元隋文帝開皇元陳仍用大明術正壬午二辛亥三庚戌五己酉七戊申九丁未十一丙午朔閏二二庚辰春分三庚戌穀雨隋仍用丙寅元術正壬午三辛巳四庚辰六己卯八戊寅十丁丑十二丙子朔閏三三庚戌穀雨四庚辰小滿按通鑑目録四庚辰作閏四庚辰不合壬寅陳十四隋開皇二陳正乙巳四甲戌六癸酉八壬申十辛未十二庚午朔隋正丙午二乙亥四甲戌七癸卯九壬寅十一辛丑朔癸卯陳長城煬公至德元隋三陳正庚子二己巳四戊辰六丁卯九丙申十一乙未十二甲午朔閏十一十一甲子冬至十二乙未大寒隋正庚子三己亥五戊戌七丁酉九丙申十二乙丑朔閏十二十二甲午大寒按隋紀北史二己巳朔不合又七丁卯日蝕亦不合今推八丁卯朔與通鑑合通鑑目録九丙申作十丙寅不合甲辰陳二隋四陳仍用大明術正甲子二癸巳四壬辰六辛卯八庚寅十一己未朔隋初用張賓開皇術上元甲子以來四百一十二萬九千一年正甲子二癸巳五壬戌七辛酉九庚申十一己未朔正乙丑雨水按通鑑目録正月一日雨水與今推二日乙丑雨水不合乙巳陳三隋五陳正戊午三丁巳五丙辰七乙卯九甲寅
