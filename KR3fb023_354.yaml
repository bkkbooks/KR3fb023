body:
  text: 紀合癸卯康帝建元元正癸丑三壬子五辛亥七庚戌九己酉十一戊申朔甲辰二正丁未三丙午六乙亥八甲戌九癸酉十一壬申朔閏八八壬寅秋分九癸酉霜降乙巳穆帝永和元正辛未三庚午五己巳七戊辰十丁酉十二丙申朔按紀及通鑑正甲戌朔不合通鑑目録三庚午作三庚子宋本不訛丙午二正丙寅二乙未四甲午六癸巳八壬辰十辛卯朔按紀志元經通鑑四已酉日食不合丁未三正庚申三己未五戊午六丁巳八丙辰十乙卯十二甲寅朔閏五五丁亥夏至六丁巳大暑戊申四正甲申二癸丑五壬午七辛巳九庚辰十一己卯朔己酉五正戊寅三丁丑五丙子七乙亥十甲辰十二癸卯朔按紀正辛巳朔通鑑正辛未朔並不合庚戌六正癸酉二壬寅三辛丑五庚子七己亥九戊戌十二丁卯朔閏二二辛未春分三壬寅穀雨按通鑑目録三月一日穀雨與今推二日壬寅穀雨不合辛亥七正丁酉二丙寅四乙丑六甲子八癸亥十壬戌
