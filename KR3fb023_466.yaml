body:
  text: 臘癸巳朔戊申立春一壬戌朔癸亥啓蟄當時欲就正月甲子朔冬至強改明年正月為今年閏十月臘癸亥朔為正甲子朔壬戌冬至為甲子冬至於是八月以後連四大通鑑目録十月二十八日小雪十一月二十九日大寒與今推十月二十九日壬辰小雪臘月三十日壬辰大寒並不合戊戌周聖曆元正建子甲子臘癸巳一壬戌三辛酉四庚寅六己丑八戊子十丁亥朔正甲子冬至按壬戌冬至既強改為甲子并壬辰大寒亦強進為癸巳己亥周二正建子丁巳二丙戌四乙酉五甲寅七癸丑八壬午朔庚子周久視元正建子辛亥三庚戌五己酉六戊寅閏七丁丑八丙午十乙巳朔七丙子處暑八丙午秋分按此年十月復用寅正凡十五月為一年舊志會要五乙酉朔不合辛丑周長安元正建寅乙亥二甲辰五癸酉六壬寅八辛丑九庚午十一己巳朔壬寅周二正己巳二戊戌五丁卯七丙寅九乙丑十一甲子十二癸巳朔按新志三壬戌朔九庚寅朔尹思貞造像記七庚辰朔並不合癸卯周三正癸亥三壬戌閏四辛酉七庚寅九己丑十一
  hash: sha256:5d8ea43b24da0eb7896b41e899c6136770e62897f4d57fe17df1fdb6ddc04cb1
