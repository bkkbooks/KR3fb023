body:
  text: 庚申三正庚寅二己未三戊子五丁亥七丙戌十乙卯朔按舊紀正庚子七丁亥十丙辰朔並不合今推正庚寅朔與黃滔集合辛酉天復元正甲申三癸未五壬午六辛亥七庚戌九己酉朔閏六六庚辰大暑七庚戌處暑按通鑑目錄正甲申作二甲寅五壬午作四壬子並不合舊五代史梁紀通鑑及吳融上元春詞正乙酉朔亦不合今推正甲申朔四癸丑朔並與舊紀合壬戌二正戊申三丁未五丙午六乙亥七甲辰十癸酉朔按通鑑目錄五丙午作四丙子不合癸亥三正癸卯二壬申四辛未六庚午七己亥八戊辰十丁卯朔按通鑑目錄六庚午作五庚子不合甲子天祐元正丁酉二丙寅閏四乙未六甲午七癸亥八壬辰十辛卯朔四甲午小滿五乙丑夏至按通鑑目錄六甲午作五甲子不合今推五月一日乙丑夏至通鑑目錄旣以五月爲甲子朔又云五月一日夏至亦不合乙丑昭宣帝天祐二正庚申四己丑六戊子八丁亥十丙戌十一乙卯朔按通鑑目錄十丙戌作九丙辰不合丙寅三正乙卯二甲申四癸未七壬子九辛亥十一庚戌十二己卯朔閏十二十二戊申大寒按舊紀四甲申五癸酉
