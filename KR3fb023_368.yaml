body:
  text: 戊申十一丁未朔秦同辛丑晉五秦三魏四晉魏正丙午四乙亥六甲戌八癸酉九壬申十一辛未朔閏八八壬寅秋分九壬申霜降秦同壬寅晉元興元秦四魏五晉魏正庚午三己巳五戊辰八丁酉十丙申十二乙未朔按通鑑三乙巳朔不合秦同癸卯晉二秦五魏六晉魏正乙丑二甲午四癸巳六壬辰八辛卯十一庚申朔按通鑑目録十一庚申作十一庚寅乃刊本之訛秦正乙丑二甲午四癸巳六壬辰八辛卯十庚寅朔甲辰晉三秦六魏天賜元晉魏正己未三戊午五丁巳六丙辰八乙卯十甲寅十二癸丑朔閏五五丙戌夏至六丙辰大暑秦同乙巳晉義熙元秦七魏二晉魏正癸未三壬午五辛巳七庚辰九己卯十一戊寅朔秦同丙午晉二秦八魏三晉魏正丁丑三丙子五乙亥八甲辰十癸卯十二壬寅朔秦同丁未晉三秦九魏四晉魏正壬申二辛丑三庚子五己亥七戊戌十丁卯十二丙寅朔閏二二庚午春分三辛丑穀雨按通鑑目録二辛丑作閏正辛丑又云二月一日春分與今推閏二二月三十日庚午春分不合秦正壬申二辛丑三庚子五己亥七戊戌九丁酉十二丙寅朔閏二二庚午春分三
