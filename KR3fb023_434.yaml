body:
  text: 十一癸丑朔隋正戊午三丁巳五丙辰八乙酉十甲申十二癸未朔丙午陳四隋六陳正壬子四辛巳六庚辰閏七己卯九戊寅十一丁丑朔七戊寅處暑八己酉秋分隋正癸丑二壬午四辛巳六庚辰八己卯九戊寅十二丁未朔閏八八戊申秋分九己卯霜降丁未陳禎明元隋七陳正丙子三乙亥五甲戌八癸卯十壬寅十二辛丑朔隋正丁丑二丙午四乙巳六甲辰八癸卯十壬寅十二辛丑朔按通鑑目録六甲辰作五甲戌乃刊本之訛戊申陳二隋八陳正辛未二庚子四己亥六戊戌八丁酉十一丙寅朔隋正辛未二庚子五己巳七戊辰九丁卯十一丙寅朔己酉陳三隋九陳正乙丑三甲子四癸亥六壬戌八辛酉十庚申十二己未朔閏三三壬辰穀雨四癸亥小滿按通鑑目録此年不載陳朔今補隋正乙丑三甲子閏四癸亥七壬辰九辛卯十一庚寅朔四壬戌小滿五癸巳夏至按通鑑目録閏六閏四癸亥作五癸亥不合又云七月二日處暑與今推三日甲午處暑亦不合庚戌隋開皇十隋仍用張賓開皇術正己丑三戊子五丁亥
