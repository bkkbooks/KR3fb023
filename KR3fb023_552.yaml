body:
  text: 癸丑周三遼三周正壬子二辛亥三庚辰五己卯七戊寅十一丁丑朔閏正正庚辰雨水二辛亥春分按通鑑目録十一月九日冬至舊紀乙酉日南至與今推八日甲申夜子初三刻冬至不合乙酉冬至乃遼術也遼朔考周正壬午不合遼同按朔考儼大任正壬午三庚申並不合甲寅周世宗顯德元遼四周正丙子三乙亥四甲辰六癸卯八壬寅十一辛未朔遼同按紀十二辛酉朔不合乙卯周二遼五周正辛未二庚子四己亥五戊辰七丁卯九丙寅十乙丑朔閏九九甲午霜降十乙丑小雪按八月本丙申朔未及進限而進遼正辛未二庚子四己亥五戊辰七丁卯八丙申十乙丑朔閏九九甲午霜降十乙丑小雪丙辰周三遼六周初用欽天術上元甲子以來七千二百六十九萬八千四百五十三年正乙未二甲子四癸亥五壬辰七辛卯八庚申十一己丑朔按此術盈縮遲疾諸率史文失載今借宣明術日躔月離二表化分擬數以加減欽天平朔為定朔通鑑五丙辰朔不合遼仍用調元術同丁巳周四遼七周正己丑三戊子五丁亥六丙辰八乙卯九甲申十一癸未朔遼同戊午周五遼八周正癸未三壬午五辛巳七庚辰八己卯
