body:
  text: 長術正癸卯三壬寅五辛丑七庚子九己亥十一戊戌朔壬子二十三魯二十四正建子丙寅二乙未四甲午六癸巳八壬辰十辛卯朔杜氏長術正丁酉三丙申四乙未六甲午八癸巳十一壬戌朔閏三癸丑二十四魯二十五正建子庚申三己未五戊午七丁巳九丙辰十一乙卯朔杜氏長術正辛酉三庚申五己未七戊午九丁巳十一丙辰朔甲寅二十五魯二十六正建子甲寅三癸丑六壬午閏七辛巳九庚辰十一己卯朔七庚辰夏至八辛亥大暑杜氏長術正乙卯三甲寅六癸未八子午十辛巳十二庚辰朔閏十二乙卯二十六魯二十七正建子戊寅三丁丑五丙子八乙巳十甲辰十二癸卯朔杜氏長術正己卯四戊申六丁未八丙午十乙巳後閏甲戌朔閏十一按釋例是年頓置兩閏月十一月建申閏十一月建酉後閏月建戌十二月建亥外紀目録後閏甲戌作十二甲辰無兩閏月與今本釋例不合疑亦刊本之訛丙辰二十七魯二十八正建子癸酉二壬寅四辛丑六庚子八己亥十戊戌朔杜氏長術正癸酉三壬申五辛未七庚午九己巳十一戊辰朔
