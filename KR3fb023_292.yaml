body:
  text: 甲子三正乙未二甲子五癸巳七壬辰九辛卯閏十庚寅十二己丑朔十已丑小雪十一庚申冬至按五行志九庚寅晦不合今推庚申晦與紀合乙丑四正己未二戊子四丁亥六丙戌九乙卯十一甲寅朔按延光殘碑六月卅日庚戌不合丙寅順帝永建元正癸丑三壬子五辛亥七庚戌九己酉十一戊申朔丁卯二正戊申二丁丑四丙子六乙亥七甲戌九癸酉十一壬申朔閏六六癸卯大暑七甲戌處暑按通鑑目錄六乙亥作五乙亥宋本不譌又閏六作閏五下云七月一日處暑知本是閏六乃刊本之譌袁紀七丙戌朔不合今推甲戌朔與紀志合戊辰三正辛未四庚子六已亥八戊戌十丁酉十二丙申朔已巳四正丙寅二乙未四甲午六癸巳九壬戌十一辛酉朔庚午五正庚申三已未四戊午六丁巳八丙辰十一乙酉朔閏三三戊子穀雨四戊午小滿辛未六正甲申三癸未五壬午七辛巳九庚辰十一己卯朔
