body:
  text: 亥作四辛巳十戊寅作九戊申並不合舊紀正丙寅上元夜亦不合今推正癸丑朔與張說為人作祭弟文合辛亥二正丁未二丙子五乙巳閏六甲辰八癸卯十壬寅十一辛未朔六癸卯大暑七甲戌處暑按舊志會要閏九不合蕭思亮墓志景雲二年歲次丁亥正月卅日亦不合下云二月景子朔則合壬子元宗先天元正辛未二庚子四己亥七戊辰九丁卯十一丙寅朔按通鑑目録七戊辰作六戊戌又云十二乙未朔並不合今推七戊辰朔與史公石像銘合十二丙申朔與契苾明碑十六日辛亥合又舊志會要二丁卯朔不合癸丑開元元正乙丑二甲午五癸亥七壬戌九辛酉十二庚寅朔按通鑑目録五癸亥作四癸巳不合今推四甲午朔與舊紀三月有癸巳合徐鍔大寶積經述有六月三十日不合甲寅二正庚申二己丑三戊子四丁巳六丙辰九乙酉十二甲寅朔閏二二丁巳春分三戊子穀雨按通鑑目録二己丑作閏二己未三戊子作四戊午四丁巳作五丁亥並不合今推三月一日戊子穀雨通鑑目録既以三月為己丑朔又云三月一日穀雨亦不合
