body:
  text: 丁巳九丙辰朔四丁亥小滿五戊午夏至按統天術同元同按郝經陵川集十一月十五日辛未不合丁未宋七元二宋正乙卯三甲寅五癸丑六壬午八辛巳十庚辰朔按統天術同元同戊申宋八元三宋正庚戌二己卯四戊寅六丁丑七丙午九乙巳十甲戌朔按統天術同元同己酉宋九元定宗后稱制元宋正甲辰二癸酉四壬寅六辛丑七庚午九己巳十戊戌朔閏二二壬寅春分三癸酉穀雨按統天術同元同庚戌宋十元二宋正丁卯五丙寅六乙未八甲午十癸巳十一壬戌朔按統天術正丁卯四丙申六乙未八甲午十癸巳十一壬戌朔天文志四丁酉朔與開禧術合元與統天術同辛亥宋十一元憲宗元宋初用淳祐術上元甲子以來一億二千二十六萬七千六百四十八年正壬戌二辛卯五庚申八己丑九戊午閏十丁巳十一丙戌朔十丙辰小雪十一丁亥冬至按此術盈縮遲疾諸率無考今求定朔借統天術日躔月離二表化分擬數推之此年統天術正壬戌二辛卯五庚申七己未九戊午閏十丁巳十二丙辰朔十丙辰小雪十一丁亥冬至四史朔閏考云冬至與朔同日今按與統
