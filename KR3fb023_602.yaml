body:
  text: 九壬戌十一辛酉朔按元志十一月壬午冬至與今推草三日癸未冬至不合遼同辛未宋六遼七宋正辛酉二庚寅五己未七戊午閏八丁巳九丙戌十一乙酉朔八丙辰秋分九丁亥霜降遼同壬申宋七遼八宋正甲申四癸丑七壬午九辛巳十庚戌十二己酉朔遼同按十月本當進為辛亥朔當時應進失進故與宋同庚戌朔癸酉宋八遼九宋正己卯二戊申四丁未七丙子十乙巳十二甲辰朔按王公儀神道碑十二月二十二日甲子不合今推甲辰朔與遼朔考宋大詔令合遼同甲戌宋紹聖元遼十宋初用觀天術上元甲子以來五百九十四萬四千八百一十一年正癸酉三壬申閏四辛未六庚午九己亥十二戊辰朔四庚午小滿五辛丑夏至按紀四乙巳朔不合遼仍用賈俊大明術正甲戌二癸卯三壬申閏四辛未六庚午九己亥十二戊辰朔四庚午小滿五辛丑夏至按此年為西夏崇宗乾順天佑民安四年西夏皆慶寺碑陰正甲戌朔與遼合乙亥宋二遼壽昌元宋正戊戌二丁卯三丙申五乙未七甲午九癸巳朔遼同丙子宋三遼二宋正壬辰三辛卯四庚申六己未七戊子
