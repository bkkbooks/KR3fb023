body:
  text: 戊子宋紹定元金五元睿宗監國元宋正丙子二乙巳三甲戌五癸酉六壬寅八辛丑十二庚子朔按統天術同金元同己丑宋二金六元太宗元宋正庚午三己巳四戊戌六丁酉七丙寅九乙丑朔按統天術同金元同庚寅宋三金七元二宋正甲子三癸巳四壬戌六辛酉七庚寅九己丑十一戊子朔閏二二癸亥春分三癸巳穀雨按統天術朔閏同二壬戌春分三癸巳穀雨四史朔閏考十一月丙申冬至與統天術九日冬至合開禧術十日丁酉冬至金元與開禧術同辛卯宋四金八元三宋正戊子三丁亥五丙戌七乙酉八甲寅十癸丑十二壬子朔按統天術同癸辛雜識續集三月六日甲辰不合金元同壬辰宋五金天興元元四宋正壬午四辛亥六庚戌八己酉九戊寅十丁丑十二丙子朔閏九九丙午霜降十丁丑小雪按統天術正壬午四辛亥六庚戌八己酉九戊寅閏十丁丑十二丙子朔十丙子小雪十一丁未冬至金元與開禧術同按金五行志閏八不合今推閏九與紀合癸巳宋六金二元五宋正丙午三乙巳六甲戌七癸卯九壬寅十一辛丑朔按統天術同金元同按金石盞女魯歡傳二戊辰朔不合四史朔閏考錢東垣曰金紀九癸
