body:
  text: 辰十二己卯朔正甲寅雨水金同乙亥宋二十五金三宋正己酉二戊寅四丁丑七丙午九乙巳十二甲戌朔金正己酉二戊寅四丁丑七丙午十乙亥十二甲戌朔丙子宋二十六金正隆元宋正癸卯三壬寅五辛丑七庚子十己巳十二戊戌朔閏十十戊戌小雪十一己巳冬至按朱文公集家藏石刻序八月二十二日壬戌不合金同丁丑宋二十七金二宋正戊辰二丁酉三丙寅五乙丑六甲午九癸亥朔按系年要録十乙未朔不合金同戊寅宋二十八金三宋正壬戌三辛酉四庚寅六己丑七戊午九丁巳朔金同己卯宋二十九金四宋正丙辰四乙酉五甲寅閏六癸丑七壬午九辛巳朔六壬子大暑七癸未處暑按紀六甲辰朔不合今推甲申朔與系年要録十朝綱要合金同庚辰宋三十金五宋正庚辰四己酉五戊寅七丁丑八丙午十乙巳朔按系年要録四戊申六丁未朔兩朝編年八丙子朔並不合今推四己酉八丙午朔與紀合金同辛巳宋三十一金世宗大定元宋正甲戌四癸卯六壬寅八辛丑九庚午十一己巳朔金同壬午宋三十二金二宋正戊辰三丁酉六丙寅八乙丑九甲
