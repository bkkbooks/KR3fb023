body:
  text: 癸酉九正庚辰三己卯五戊寅七丁丑十一丙子朔正辛巳雨水甲戌十正乙亥二甲辰四癸卯六壬寅八辛丑十一庚午朔按舊志六辛丑晦不合今推辛未晦與新志合新志閏四亦不合乙亥十一正庚午二己亥四戊戌五丁卯七丙寅八乙未十甲子朔閏八八甲子秋分九乙未霜降按通鑑目錄四戊戌作三戊辰七丙寅作八丙申宋本作六丙申並不合丙子十二正甲午二癸亥四壬戌五辛卯六庚申八己未十戊午朔按舊紀八辛未朔會要通鑑八乙未朔柳宗元柳元方墓誌五月十九日甲子並不合丁丑十三正戊子二丁巳四丙辰六乙卯七甲申九癸未十一壬午朔按舊紀六己卯朔不合戊寅十四正壬午三辛巳五庚辰六己卯七戊申九丁未十一丙午朔閏五五己酉夏至六己卯大暑己卯十五正丙午二乙亥五甲辰七癸卯八壬申十辛未十二庚午朔按舊紀十一月乙巳冬至與今推十七日丁巳冬至不合柳宗元亡妻楊氏誌八月十日甲子九月五日庚午並不合庚辰十六正庚子二己巳五戊戌七丁酉九丙申十一乙
