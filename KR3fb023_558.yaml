body:
  text: 亦不合今推草四日癸卯冬至與紀合遼同己巳宋二遼景宗保寧元宋正己卯二戊申五丁丑六丙子九乙巳十一甲辰朔閏五五丙午夏至六丙子大暑按薛氏宋元通鑑三壬寅朔不合遼同按朔考儼大任二己酉不合庚午宋三遼二宋正癸卯二壬申四辛未六庚午九己亥十二戊辰朔按天文志四辛酉朔稽古録九朝編年備要四辛卯朔並不合遼朔考宋十二己巳長編引十國紀年十二月七日乙亥亦不合今推戊辰朔與長編二十四日辛卯合遼同辛未宋四遼三宋正戊戌二丁卯三丙申五乙未七甲午九癸巳朔按遼朔考宋九甲午十朝綱要十癸酉朔並不合東都事略九朝編年備要太平寶訓十朝綱要十一月癸未日南至亦不合今推草七日己未冬至與紀合遼同壬申宋五遼四宋正壬辰閏二辛卯三庚申五己未六戊子九丁巳朔二庚寅春分三辛酉穀雨按紀七己未十二乙酉朔遼朔考宋十二丙戌並不合遼同癸酉宋六遼五宋正丙辰三乙卯五甲寅六癸未七壬子九辛亥朔按遼朔考宋四甲申五癸丑九壬子並不合遼正丙辰三乙卯四甲申六癸未七壬子九辛亥朔
