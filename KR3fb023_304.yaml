body:
  text: 推四乙酉朔與李翕天井道碑廿五日已酉合癸丑二正辛亥二庚辰四已卯六戊寅八丁丑九丙子十一乙亥朔閏八八丙午秋分九丙子霜降按紀及五行志十二癸酉晦耿勳碑三月六日癸酉並不合甲寅三正乙亥二甲辰四癸卯六壬寅八辛丑十庚子十二己亥朔乙卯四正己巳二戊戌四丁酉七丙寅九乙丑十一甲子朔丙辰五正癸亥三壬戌五辛酉六庚申八己未十一戊子朔閏五五庚寅夏至六辛酉大暑丁巳六正丁亥三丙戌五乙酉七甲申九癸未十一壬午朔按五行志十癸酉朔不合今推癸丑朔與紀合戊午光和元正壬午二辛亥四庚戌六已酉八戊申十丁未十二丙午朔按袁紀十一丙子晦不合今推十丙子晦與紀合已未二正丙子閏正乙巳三甲辰六癸酉八壬申十辛未十二庚午朔正甲辰雨水二乙亥春分按袁紀四丙戌朔不合今推甲戌朔與紀志合庚申三正庚子二已巳四戊辰六丁卯九丙申十一乙未朔按紀有冬閏月不合
