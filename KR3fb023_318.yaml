body:
  text: 六戊子八丁亥十丙戌十二乙酉朔正辛酉雨水己酉漢七魏三吳黃龍元漢魏正乙卯四甲申六癸未八壬午十辛巳十二庚辰朔吳正乙卯二甲申五癸丑七壬子九辛亥十一庚戌朔庚戌漢八魏四吳二漢魏正庚戌二己卯四戊寅七丁未九丙午十乙巳十二甲辰朔閏九九乙亥霜降十丙午小雪吳正已酉三戊申五丁未八丙子九乙亥十一甲戌朔閏八八甲辰秋分九乙亥霜降按通鑑目錄九乙亥作閏九乙亥不合辛亥漢九魏五吳三漢魏正甲戌二癸卯四壬寅六辛丑八庚子十一己巳朔吳正癸酉三壬申五辛未七庚午九己巳十二戊戌朔按通鑑目錄九己巳作九乙巳宋本不譌壬子漢十魏六吳嘉禾元漢魏正戊辰三丁卯五丙寅七乙丑九甲子十一癸亥朔吳正戊辰二丁酉四丙申六乙未八甲午十癸巳十二壬辰朔癸丑漢十一魏青龍元吳二漢魏正壬戌四辛卯閏五庚寅七己丑九戊子十一丁亥朔五己丑夏至六庚申六暑吳正壬戌二辛卯五庚申六已未八戊午十丁巳十二丙辰朔閏五五己丑夏至六己未大暑甲寅漢十二魏二吳三漢魏正丙戌三乙酉六甲寅八癸丑
