body:
  text: 辰十一辛酉朔周正丙寅二乙未四甲午六癸巳九壬戌十一辛酉朔按北史五甲午朔不合今推甲子朔與周紀合齊與陳同甲申陳五周四齊三陳正庚申三己未五戊午七丁巳九丙辰閏十乙卯朔十甲寅小雪十一乙酉冬至周正庚申三己未五戊午七丁巳九丙辰十乙卯朔閏九九甲申霜降十乙卯小雪按正光術朔閏中氣並與陳同聖母寺碑九丁巳朔不合齊朔閏與周同九乙酉霜降十乙卯小雪乙酉陳六周五齊溫公天統元陳正甲申三癸未五壬午七辛巳九庚辰十一己卯朔周同齊亦同丙戌陳天康元周天和元齊二陳仍用大明術正戊寅三丁丑六丙午八乙巳十甲辰十二癸卯朔周初用天和術上元甲寅以來八十七萬五千七百九十三年正己卯二戊申四丁未六丙午八乙巳十甲辰十二癸卯朔齊仍用天保術與陳同丁亥陳臨海王光大元周二齊三陳正癸酉二壬寅四辛丑六庚子七己亥十戊辰十二丁卯朔閏六六戊辰大暑七己亥處暑周正癸酉三壬申五辛未七庚午閏八己巳十戊辰十二丁卯朔八戊辰秋分九己亥霜降按周紀北史隋志閏六不合又隋志正癸酉朔十五日戊子亦有訛齊朔閏與陳同六己
