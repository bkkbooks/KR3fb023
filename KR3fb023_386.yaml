body:
  text: 午十已亥十二戊戌朔閏二二壬寅春分三癸酉穀雨按通鑑目錄三月一日穀雨與今推二日癸酉穀雨不合魏正癸酉三壬申五辛未七庚午十已亥十二戊戌朔已丑宋二十六魏十宋正戊辰二丁酉四丙申六乙未八甲午十癸巳十二壬辰朔魏同按天象志六月庚寅朔不合通鑑目錄引在明年是也庚寅宋二十七魏十一宋正壬戌三辛酉五庚申七已未九戊午閏十丁巳十二丙辰朔十丙辰小雪十一丁亥冬至魏正壬戌三辛酉五庚申七已未八戊午十丁十二丙辰朔閏七七戊子處暑八已未秋分辛卯宋二十八魏正平元宋正丙戌二乙卯五甲申七癸未九壬午十一辛巳朔按通鑑二丙辰朔不合今推二月二日丙辰與宋臧質傳合魏同壬辰宋二十九魏文成帝興安元宋仍用元嘉術正庚辰三已卯五戊寅七丁丑十丙午十二乙巳朔按宋志十一已卯朔不合魏初用元始術丙申蔀三千八百七十九年同癸巳宋三十魏二宋正乙亥二甲辰四癸卯六壬寅七辛丑九庚子十一已亥朔閏六六庚午大暑七辛丑處暑按建康實錄正乙未朔不合今推乙亥朔與南史合通鑑七辛酉朔亦不合今推辛丑朔與宋紀志南史合魏朔閏同六辛未大
