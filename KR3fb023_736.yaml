body:
  text: 甲申朔甲寅四十二正甲寅二癸未五壬子七辛亥九庚戌十一己酉朔乙卯四十三正戊申三丁未五丙午八乙亥九甲戌十一癸酉朔閏八八癸卯秋分九甲戌霜降大淸太祖高皇帝天命元年丙辰明萬曆四十四大統術正壬申三辛未四庚子七己巳十戊戌十二丁酉朔二年丁巳明四十五正丁卯二丙申四乙未五甲子七癸亥十壬辰朔三年戊午明四十六正辛酉三庚申閏四己未五戊子七丁亥九丙戌朔四戊午小滿五戊子夏至按明天文志閏六不合今推閏四與紀及五行志合四年己未明四十七正乙酉三甲申五癸未六壬子八辛亥九庚辰朔五年庚申明四十八光宗泰昌元正庚辰二己酉四戊申六丁未七丙子九乙亥十甲辰朔六年辛酉明熹宗天啟元正癸酉四壬申六辛未七庚子九己亥十戊辰朔閏二二壬申春分三癸卯穀雨七年壬戌明二正丁酉四丙寅六乙丑八甲子十癸亥十
