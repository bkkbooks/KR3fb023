body:
  text: 丁卯九丙寅十一乙丑朔按通鑑目錄五戊辰作四戊戌十一乙丑作十二乙未並不合宋本作四戊戌十一乙未亦譌丙戌二正甲子三癸亥五壬戌七辛酉十庚寅十二己丑朔丁亥三正丁未二戊子三丁亥五丙戌七乙酉九甲申十二癸丑朔閏二二丁巳春分三戊子淸明按通鑑目錄十二癸丑作十一癸未不合熊氏補後漢書年表閏正亦不合戊子四正癸未二壬子四辛亥六庚戌八己酉十戊申十二丁未朔按五行志注引古今注五乙卯晦不合已丑五正丁丑二丙午五乙亥七甲戌九癸酉閏十壬申十二辛未朔十辛未小雪十一壬寅冬至庚寅六正辛丑二庚午四己巳六戊辰九丁酉十一丙申朔按通鑑目錄二庚午作三庚子宋本不譌辛卯七正乙未三甲午五癸巳七壬辰九辛卯十二庚申朔按通鑑目錄十二庚申作十一庚寅不合袁紀正癸亥晦日食二癸亥晦又食並不合今推三癸亥晦日食與紀志合壬辰八正庚寅二己未四戊午六丁巳七丙辰九乙卯十一甲寅朔閏六六乙酉大暑七丙辰處暑按本紀閏四不合
