body:
  text: 烏程汪曰楨丁卯唐天祐四後梁太祖開平元後梁仍用崇元術正戊寅四丁未六丙午九乙亥十一甲戌朔正己卯雨水按此年為遼太祖元年遼未有術朔當與崇元術同遼史朔考耶律儼正丁未二丁丑並不合戊辰梁開平二後唐太祖天祐五後梁後唐同用崇元術正癸酉二壬寅四辛丑六庚子九己巳十二戊戌朔按舊五代史唐紀正戊子朔遼朔考儼十乙亥並不合己巳梁三唐莊宗天祐六正戊辰二丁酉三丙寅五乙丑七甲子閏八癸亥十二壬戌朔八壬戌秋分九癸巳霜降按通鑑目録三丙寅作四丙申不合又通鑑目録云蜀初用胡秀林永昌術正丁卯朔今按此年為前蜀高祖王建武成二年行用迄永平元年辛未其術無考不能推算庚午梁四唐七正壬辰二辛酉四庚申五己丑七戊子九丁亥朔按通鑑目録四庚申作三庚寅不合辛未梁乾化元庚八正丙戌三乙酉五甲申六癸丑七壬午九辛巳朔按遼朔考儼正戊戌新五代史王景仁傳正庚寅日食並不合此年為前蜀永平元年通鑑目録云蜀正丁亥朔
