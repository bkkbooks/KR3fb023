body:
  text: 十一戊午朔乙未十五正戊午三丁亥五丙戌六乙卯七甲申九癸未十一壬午朔閏正正丁亥雨水二戊午春分丙申十六正壬午三辛巳五庚辰七己卯九戊寅十丁未十二丙午朔按此年爲周誠王張士誠天佑四年初用明時術其法無攷不能推算丁酉十七正丙子三乙亥六甲辰八癸卯閏九壬寅十辛未十二庚午朔九辛丑霜降十壬申小雪戊戌十八正庚子二己巳五戊戌七丁酉十丙寅十一乙未朔己亥十九正甲午三癸巳五壬辰八辛酉十庚申朔庚子二十正己丑二戊午四丁巳閏五丙辰七乙卯十甲申朔五乙卯夏至六丙戌大暑辛丑二十一正癸丑三壬子四辛巳六庚辰七己酉十戊寅朔壬寅二十二正戊申二丁丑四丙子五乙巳六甲戌八癸酉十壬申朔癸卯二十三正壬寅三辛丑四庚子五己巳六戊戌八丁酉十丙申朔閏三三庚午穀雨四辛丑小滿甲辰二十四正丙寅二乙未四甲午六癸巳七壬戌九辛
