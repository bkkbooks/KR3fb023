body:
  text: 庚子宋四元十二宋正丙寅三乙丑五甲子七癸亥八壬辰十辛卯十一庚申朔閏十二十二己未大寒按統天術同元同辛丑宋淳祐元元十三宋正庚寅二己未五戊子七丁亥八丙辰十乙卯十一甲申朔正庚寅雨水按統天術同蘭亭續考李心傳跋十有一月庚子哉生霸越六日乙巳與今推十六日己亥望不合四史朔閏考引李跋作十二月庚子哉生明疑為戊戌朔非也元同壬寅宋二元太宗后稱制元宋正甲申二癸丑五壬午七辛巳九庚辰十一己卯朔按統天術同畢鑑正丙申朔不合元同癸卯宋三元二宋正戊寅三丁丑五丙子八乙巳九甲辰十一癸卯朔閏八八癸酉秋分九甲辰霜降按統天術同元同按四史朔閏考錢侗曰元遺山集中令耶律公祭先妣文八月己巳朔當是乙巳之誤甲辰宋四元三宋正壬寅三辛丑五庚子七己亥十戊辰十二丁卯朔按統天術同元同乙巳宋五元四宋正丁酉二丙寅四乙丑五甲午七癸巳十壬戌朔按統天術同元同丙午宋六元定宗元宋正辛卯三庚寅閏四己丑五戊午七
