body:
  text: 庚午朔閏三三癸酉驚蟄四癸卯春分辛未十六正建子己巳三戊辰五丁卯七丙寅九乙丑十二甲午朔壬申十七正建子甲子二癸巳四壬辰六辛卯八庚寅十己丑十二戊子朔閏十二十二丁巳小雪癸酉十八周術戊子蔀首正建子戊子二丁巳四丙辰六乙卯八甲寅十癸丑十二壬子朔正戊子冬至甲戌十九正建子壬午二辛亥四庚戌七己卯九戊寅十一丁丑朔乙亥二十正建子丙子三乙亥五甲戌七癸酉閏八壬申十一辛丑朔八辛未大暑九壬寅處暑丙子二十一正建子庚子三己亥五戊戌七丁酉九丙申十一乙未朔丁丑二十二正建子乙未二甲子四癸亥六壬戌八辛酉十庚申十二己未朔戊寅二十三正建子己丑二戊午四丁巳六丙戌八乙酉十甲申十二癸未朔閏五五丙辰淸明六丙戌小滿按司馬氏資治通鑑託始此年而通鑑目録載劉氏羲叟長術則起於漢高帝元年不推周秦朔閏今並補推己卯二十四正建子癸丑二壬午四辛巳六庚辰八己卯十
