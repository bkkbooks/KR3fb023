body:
  text: 世祖章皇帝順治元年甲申明十七正庚寅三己丑四戊午六丁巳七丙戌十乙卯朔大統術同按明本紀三庚寅朔不合金起士哀國變詩崇禎甲申月建辰十有九日曰丁未與今所推合二年乙酉正乙酉二甲寅四癸丑五壬午閏六辛巳七庚戌九己酉朔五己酉夏至閏六辛巳大暑七壬子處暑蓋大暑加時在合朔加時之前則中氣尙屬前月也大統術朔閏同六庚辰大暑七庚戌處暑按是年始用考成前編法定朔定氣頒行時憲書三年丙戌正己酉二戊寅四丁丑五丙午七乙巳八甲戌十癸酉朔大統術同四年丁亥正癸卯二壬申五辛丑六庚午八己巳九戊戌十一丁酉朔大統術同五年戊子正丁酉二丙寅閏四乙未六甲午八癸巳九壬戌十一辛酉朔四癸巳小滿五乙丑夏至大統術正丁酉二丙寅四乙未六甲午八癸巳九壬戌十一辛酉朔閏三三甲子穀雨四乙未小滿六年己丑五庚申四己丑七戊午九丁巳十丙戌十二乙酉朔大統術同七年庚寅正乙卯二甲申五癸丑七壬子十辛巳十一庚戌朔大統術正乙卯二甲申五癸丑七壬子十辛巳
