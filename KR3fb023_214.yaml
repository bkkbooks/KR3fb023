body:
  text: 淸明應閏二戊寅後元殷十丁丑十二丙子二乙亥四甲戌六癸酉九壬寅朔顓十丁丑十一丙午正乙巳四甲戌六癸酉八壬申朔已卯二殷十壬申十一辛丑正庚子三己亥五戊戌七丁酉九丙申朔後九九甲子霜降按通鑑目録後九在明年與殷術不合顓十辛未十二庚午二己巳四戊辰六丁卯九丙申朔庚辰三殷十乙未正甲子三癸亥五壬戌七辛酉九庚申朔十乙未小雪按通鑑目録十一乙未二甲子四癸亥六壬戌八辛酉後九庚申朔並不合史漢侯表四月有丁巳與今所推合顓十丙寅十一乙未正甲午三癸巳五壬辰七辛卯九庚寅朔後九十一甲子冬至正乙未大寒應閏十一按通鑑目録脫後九二字辛巳四殷十庚寅十一己未正戊午三丁巳六丙戌八乙酉朔顓十庚寅十一己未正戊午三丁巳五丙辰七乙卯九甲寅朔按漢本紀荀紀四丙寅晦不合五行志四丙辰晦與殷合壬午五殷十甲申十二癸未二壬午四辛巳六庚辰九己酉朔後九七己卯處暑九己酉秋分應閏七顓十甲申十一癸丑
