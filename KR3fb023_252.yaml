body:
  text: 午朔正丙午驚蟄按通鑑目録六癸酉作五癸卯不合癸未建昭元正庚子二己巳四戊辰六丁卯八丙寅十一乙未朔甲申二正甲午三癸巳五壬辰七辛卯閏八庚寅十己丑十二戊子朔八己丑秋分九庚申霜降乙酉三正戊午三丁巳五丙辰七乙卯九甲寅十一癸丑朔丙戌四正壬子三辛亥六庚辰八己卯十戊寅十二丁丑朔丁亥五正丁未二丙子四乙亥五甲戌七癸酉十壬寅十二辛丑朔閏四四癸卯小滿五甲戌夏至戊子竟寧元正辛未二庚子四己亥六戊戌八丁酉十丙申朔按通鑑目録十二乙未朔不合己丑成帝建始元正乙丑三甲子五癸亥七壬戌九辛酉十一庚申朔庚寅二正己未二戊午五丁亥七丙戌九乙酉十一甲申朔閏正正戊子驚蟄二戊午春分按通鑑目録二戊午作三戊子不合宋本作二戊子亦訛辛卯三正癸未三壬午五辛巳七庚辰十己酉十二戊申朔
