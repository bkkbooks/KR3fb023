body:
  text: 甲子春分庚午宋七涼三魏三宋魏正戊子三丁亥五丙戌七乙酉九甲申十一癸未朔涼同辛未宋八涼義和元魏四宋魏正壬午三辛巳五庚辰七已酉九戊申十一丁未朔閏六六戊寅大暑七已酉處暑按通鑑目録七已酉作閏七已酉不合涼正壬午三辛巳五庚辰七已卯閏九戊申十一丁未朔九丁未霜降十戊寅小雪壬申宋九涼二魏延和元宋魏正丙午三乙巳五甲辰七癸卯九壬寅十二辛未朔涼同癸酉宋十涼哀王沮渠茂虔永和元魏二宋魏正辛丑二庚午四已巳六戊辰八丁卯十丙寅十二乙丑朔按通鑑目録十二乙丑作十一乙未宋本作十二乙酉並訛涼同甲戌宋十一涼二魏三宋魏正乙未二甲子四癸巳六壬辰八辛卯十庚寅十二已丑朔閏三三癸亥穀雨四癸巳小滿涼正乙未二甲子五癸巳六壬辰八辛卯十庚寅十二已丑朔閏五五辛酉夏至六壬辰大暑乙亥宋十二涼三魏太延元宋魏正已未二戊子四丁亥七丙辰九乙卯十一甲寅朔按宋志北史正乙未朔不合今推已未朔與魏天象志合涼正已未二戊子四丁亥六丙戌九乙卯十一甲寅朔
