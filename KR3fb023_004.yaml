body:
  text: 得不借用他術合否未能決定是五難也夏時便民古今通用而秦用亥正魏景初用丑正唐武后用子正民間仍從其便又初改之時或年少一月或月少數日志乘編年因之差別是六難也唐武后神功元年强閨十月元宗開元十二年强閏十二月後晉天福間亦因明年正旦日食改前十二月朔民間通行仍依本術爲之貫通是七難也汪君輯要所采證以書籍數百種丕惮七難殚精畢慮幾三十年于步算可謂勞矣于讀書可謂博矣使讀史者家置一編舉二千五百餘年之月日釐然具見得以即一事之後先而孜其得失治曶之機倘亦勿菴所謂一生勤苦皆爲人用者與余故不揣固陋而樂爲之序光緒四年戊寅秋七月撫浙使者南昌梅啓照撰
  hash: sha256:e4597d65aa544accd26877c90b8c88b1082788c40c314e900793fd52e631b6e3
