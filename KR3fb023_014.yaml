body:
  text: 就簡仿通鑑目録專載朔閏又取羣書所見朔閏不合者綴于每年之末編為輯要十卷其諸術考二卷乃推步之凡例仍附於後蓋距初布算時已逾三十年矣歲月不居學殖荒落此書雖頗費日力不過覆瓿之資耳為之太息丁卯五月汪曰楨識
