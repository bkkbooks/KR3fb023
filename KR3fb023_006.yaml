body:
  text: 厯代長術輯要序汪剛木先生精於史學又精於算學於是有二十四史月日孜之作其書上起共和下迄有明各就當時所用之術依法推算詳列朔閏月建大小二十四氣略如萬年書之式經始於道光十有六年至同治十有二年而書成都凡五十三卷既而病其繁也又刪繁就簡仿通鑑目録之例專載朔閏其後朔與前朔天干相同則亦不記改日乃記之成書十卷命之曰厯代長術輯要而以古今推步諸術考二卷附於後蓋推步諸術固此書之條例也既成問序於余余於史學粗疏而算學又素未問津何足以序先生之書哉惟念長術之名本於杜征南杜氏嘗著術論大旨謂天行不息日月星辰皆動物也物動則不一纍日為月纍月為歲不得不有豪毛之差而算守恆數故術無有不差失易言治厯明時當順天以求合非苟合以驗天杜氏此論雖若通達然不求之術而徒求之紀載之文則其為術勞而終不免於疏且舛今杜氏長術具在不過就前後推排以成其説孔穎達於隱二年傳云杜觀上下若月丕容誤則指言日誤若日不容誤則指言月誤蓋杜氏所恃以考定經傳者止於如此非知術者也本朝經學昌明諸老先生講求實學而顧震滄氏著春秋朔閏表其法用
  hash: sha256:d49cc2a1d372881758e7a617f283c5f57cdde612d5532d7925d8ff3ddcb61746
