body:
  text: 閏同九丙寅霜降十丁酉小雪金與開禧術同按紀九乙巳朔不合甲戌宋七金二宋正丁卯二丙申四乙未六甲午八癸巳九壬戌十一辛酉朔按統天術同紀十一辛丑朔不合金同乙亥宋嘉定八金貞祐三元太祖十宋仍用開禧術正辛酉二庚寅五己未七戊午九丁巳十丙戌十二乙酉朔按統天術同金元同用重修大明術同丙子宋九金四元十一宋正乙卯二甲申五癸丑閏七壬午九辛巳十庚戌十二己酉朔七辛巳處暑八壬子秋分按統天術同金元同丁丑宋十金興定元元十二宋正己卯二戊申四丁未七丙子九乙亥十二甲辰朔按統天術同馮椅厚齊易學序五月辛卯既望與今推十六日壬辰望不合金元同戊寅宋十一金二元十三宋正癸酉三壬申五辛未七庚午十己亥朔按統天術同金元同己卯宋十二金三元十四宋正戊辰三丁卯閏三丙申五乙未六甲子九癸巳朔三乙未穀雨四丙寅小滿按統天術同金元同庚辰宋十三金四元十五宋正壬辰三辛卯四庚申六己未七戊子九丁亥朔按統天術同金元同按此年元耶律
