body:
  text: 烏程汪曰楨庚申周共和元周術甲子蔀二十四年正建子庚辰三己卯五戊寅七丁丑十丙午十二乙巳朔按周以建子月為正月三統術超辰率是年太歲在甲寅太陰在壬辰歲星在豕韋古帝王紀年干支自共和以後始可考信故從此年推起共和以前別詳疑年表及超辰表凡每年中後朔與前朔天干相同則不記改日乃記之後仿此三統術以前節氣並先驚蟄後雨水先穀雨後淸明辛酉二正建子乙亥二甲辰四癸卯閏五壬寅七辛丑九庚子十一己亥朔五辛丑淸明六壬申小滿壬戌三正建子己亥二戊辰四丁卯六丙寅八乙丑十甲子十二癸亥朔癸亥四正建子癸巳二壬戌四辛酉七庚寅九己丑十一戊子朔甲子五正建子丁亥二丙戌四乙酉六甲申九癸丑十一壬子朔閏正正乙卯冬至二丙戌大寒乙丑六正建子辛亥三庚戌五已酉七戊申九丁未十一丙午朔丙寅七正建子丙午二乙亥四甲戌六癸酉八壬申十辛
