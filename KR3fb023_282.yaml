body:
  text: 癸丑十二壬子朔正丙戌驚蟄二丁巳春分按十二月大盡四分術以十二月三十日辛巳為明年正月朔故十二月止于二十九日五行志八乙未晦不合五行志注引古今注九乙未日食亦不合通鑑目録云二月二日春分十一月壬辰冬至與今推二月一日丁巳春分十一月九日辛卯冬至並不合乙酉二初用四分術辛酉蔀十八年正辛巳三庚辰五己卯七戊寅九丁丑十一丙子朔按通鑑目録正辛巳作二辛亥乃刊本之訛本紀十一月壬辰日南至與今推二十日乙未冬至不合自此以後節氣並先雨水後驚蟄先淸明後穀雨與今秝法同丙戌三正乙亥三甲戌六癸卯八壬寅十辛丑十一庚子朔閏十十庚午小雪十一庚子冬至丁亥章和元正己亥三戊戌五丁酉七丙申十乙丑十二甲子朔戊子二正甲午二癸亥四壬戌六辛酉八庚申十己未朔己丑和帝永元元正戊子三丁亥五丙戌七乙酉八甲申十癸未十二壬午朔閏七七甲寅處暑八乙酉秋分庚寅二正壬子二辛巳五庚戌七己酉九戊申十一丁
