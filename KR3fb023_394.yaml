body:
  text: 辛亥宋七魏孝文帝延興元宋正庚申二已丑五戊午七丁巳九丙辰十一乙卯朔魏同按天象志北史十二癸卯日蝕不合壬子宋泰豫元魏二宋正甲寅三癸丑五壬子閏七辛巳九庚辰十一已卯朔七庚辰處暑八辛亥秋分魏正甲寅三癸丑五壬子七辛巳九庚辰十一已卯朔閏六六辛亥大暑七辛巳處暑癸丑宋蒼梧王元徽元魏三宋正戊寅三丁丑五丙子七乙亥九甲戌十二癸卯朔魏同甲寅宋二魏四宋正癸酉二壬寅四辛丑六庚子八已亥十戊戌十二丁酉朔魏同乙卯宋三魏五宋正丁卯二丙申四乙丑六甲子八癸亥十壬戌十二辛酉朔閏三三甲午穀雨四乙丑小滿魏朔閏同三乙未穀雨四丙寅小滿丙辰宋四魏承明元宋正辛卯二庚申四己未七戊子九丁亥十一丙戌朔按宋志三乙巳朔不合魏同按通鑑目錄此年脫魏朔乃刊本之譌丁巳宋順帝昇明元魏太和元宋正乙酉三甲申五癸未七壬午九辛巳十二庚戌朔閏十二十二乙卯大寒按宋沈攸之傳閏十不合魏正乙西三甲申五癸未七壬午九辛巳閏十一庚戌朔十一已酉冬至十二庚辰大寒
