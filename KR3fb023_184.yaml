body:
  text: 癸巳四十七秦三十九周正建子乙酉三甲申六癸丑八壬子十辛亥十二庚戌朔秦十丙辰十二乙卯二甲寅四癸丑七壬午九辛巳朔甲午四十八秦四十周正建子庚辰二己酉三戊申五丁未七丙午十乙亥十二甲戌朔閏二二戊寅大寒三己酉驚蟄秦十辛亥十一庚辰正己卯三戊寅五丁丑七丙子後九乙巳朔正戊申驚蟄三己卯春分應閏正乙未四十九秦四十一周正建子甲辰二癸酉四壬申六辛未八庚午十己巳朔秦十乙亥十一甲辰正癸卯三壬寅五辛丑七庚子九己亥朔丙申五十秦四十二周正建子戊戌三丁酉五丙申七乙未九甲午閏十癸巳十二壬辰朔十壬辰秋分十一癸亥霜降秦十己巳十一戊戌二丁卯四丙寅六乙丑八甲子後九癸亥朔九壬戌霜降丁酉五十一秦四十三周正建子壬戌二辛卯五庚申七己未九戊午十一丁巳朔秦十癸巳十一壬戌正辛酉三庚申六己丑八戊子朔十癸巳小雪戊戌五十二秦四十四周正建子丙辰三乙卯五甲寅八癸未十壬午十二辛巳朔秦十丁亥十二丙戌二乙酉四甲申六癸未九壬子朔
