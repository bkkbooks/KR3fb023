body:
  text: 十二丙申朔丙辰顯慶元正丙寅二乙未五甲子七癸亥九壬戌十一辛酉朔丁巳二正庚申二己未四戊午七丁亥九丙戌十一乙酉朔閏正正戊子啟蟄二己未春分戊午三正甲申三癸未五壬午七辛巳九庚辰十二己酉朔己未四正己卯二戊申四丁未六丙午八乙巳十甲辰十一癸卯朔閏十十癸酉小雪十一癸卯冬至庚申五正壬寅四辛未六庚午八己巳十戊辰十二丁卯朔辛酉龍朔元正丁酉二丙寅四乙丑七甲午九癸巳十一壬辰朔按新紀四甲午晦食不合今推五甲子晦食與舊紀新志合乙速孤神慶碑龍朔元年歲次癸亥二月戊午朔舛譌不合壬戌二正辛卯三庚寅五己丑七戊子八丁亥十一丙辰朔閏七七丁巳處暑八戊子秋分按舊紀七丁亥朔不合今推戊子朔與冊府元龜通鑑合癸亥三正乙卯三甲寅五癸丑七壬子九辛亥十一庚戌朔
