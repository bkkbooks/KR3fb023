body:
  text: 辛未宋九遼興宗景福元宋正己酉二戊寅五丁未七丙午十乙亥十一甲戌朔閏十十癸卯小雪十一甲戌冬至按遼閏考宋閏九朔考宋四丁丑十二癸卯並不合朔考又云宋八庚子誤當作丙子遼同按趙知微術閏十一十一癸酉冬至十二甲辰大寒今進為甲戌冬至使與閏十相合閏考儼大任高麗閏九不合壬申宋明道元遼重熙元宋用重修崇天術正癸酉二壬寅四辛丑六庚子九己巳十二戊戌朔按遼朔考宋正壬申不合遼仍用賈俊大明術同按紀正壬申朔不合癸酉宋二遼二宋正戊辰二丁酉三丙寅五乙丑六甲午九癸亥朔按宋大詔令三甲午朔不合遼同甲戌宋景祐元遼三宋正壬戌三辛酉四庚寅六己丑閏六戊午九丁亥朔六丁巳大暑七戊子處暑遼同按趙知微術閏七七丁亥處暑八戊午秋分今進為戊子處暑使與閏六相合乙亥宋二遼四宋正丙戌三乙酉四甲寅六癸丑七壬午九辛巳朔遼同按朔考云儼六癸酉誤丙子宋三遼五宋正庚辰四己酉五戊寅七丁丑八丙午十乙巳朔按能改齊漫録十一月晦冬至郊祀移用十五日甲子與今推十一月乙亥朔十一日乙酉冬至不
