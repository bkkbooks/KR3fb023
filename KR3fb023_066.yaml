body:
  text: 巳九庚辰十一己卯朔丙午二魯十九正建子丁未三丙午五乙巳七甲辰九癸卯十一壬寅十二辛丑朔閏十一十一庚午霜降十二辛丑小雪杜氏長術正己卯二戊申四丁未六丙午八乙巳十甲辰十二癸卯朔丁未三魯二十正建子辛未三庚午五己巳七戊辰九丁卯十一丙寅朔杜氏長術正癸酉二壬寅五辛未七庚午九己巳十一戊辰閏十二丁卯朔按外紀目録二壬寅作三壬寅乃刊本之訛戊申四魯二十一正建子乙丑三甲子五癸亥八壬辰十辛卯十二庚寅朔杜氏長術正丁酉二丙寅四乙丑六甲子九癸巳十一壬辰朔己酉五魯二十二正建子庚申二己丑四戊子六丁亥八丙戌十乙卯十二甲寅朔閏九九乙酉處暑十乙卯秋分杜氏長術正辛卯三庚寅五己丑七戊子九丁亥十一丙戌朔庚戌六魯二十三正建子甲申二癸丑四壬子六辛亥八庚戌十己酉十二戊申朔杜氏長術正丙戌二乙卯四甲寅六癸丑八壬子十辛亥十二庚戌朔按外紀目録十辛亥作十辛丑乃刊本之訛超辰率是年太歲超乙巳入丙午太陰超癸未入甲申歲星超實沈入鶉首
