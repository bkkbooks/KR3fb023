body:
  text: 癸酉五正建丑庚辰三己卯五戊寅七丁丑九丙午十一乙巳朔閏八八丙子處暑九丙午秋分甲戌天鳳元正建丑甲辰三癸卯五壬寅七辛丑九庚子十二己巳朔按此丑正十二月己巳朔通鑑目錄作寅正十月己亥朔不合又通鑑目錄二壬申晦指夏正也與王莽傳三壬申晦合乙亥二正建丑己亥二戊辰四丁卯六丙寅八乙丑十甲子十二癸亥朔丙子三正建丑癸巳二壬戌五辛卯六庚寅八己丑十甲子十二丁亥朔閏五五庚申小滿六辛卯夏至按通鑑目錄六戊子晦指夏正也與王莽傳七戊子晦合又通鑑目錄五月三日夏至宋本作一日夏至與今推丑正六月二日辛卯夏至不合丁丑四正建丑丁巳二丙戌四乙酉六甲申九癸丑十一壬子朔戊寅五正建丑辛亥三庚戌五己酉七戊申九丁未十二丙子朔按此丑正十二月丙子朔通鑑目錄作寅正十月丙午朔不合己卯六正建丑丙午閏正乙亥三甲戌五癸酉七壬申九辛未十一庚午朔正甲戌大寒二乙巳驚蟄
