body:
  text: 乙卯朔乙丑二正甲寅三癸丑五壬子八辛巳九庚辰十一己卯朔閏八八己酉秋分九庚辰霜降丙寅三正戊寅三丁丑五丙子七乙亥十甲辰十二癸卯朔丁卯四正癸酉二壬寅四辛丑六庚子八己亥十戊戌十二丁酉朔按本紀四辛丑晦不合今推辛丑朔與五行志合戊辰甘露元正丁卯三丙寅五乙丑六甲子八癸亥十壬戌十二辛酉朔閏五五甲午夏至六甲子大暑己巳二正辛卯二庚申五己丑七戊子九丁亥十一丙戌朔按通鑑目録五己丑作四已未不合庚午三正乙酉三甲申五癸未七壬午十辛亥十二庚戊朔辛未四正庚辰二己酉三戊申五丁未七丙午九乙己十一甲辰朔閏二二戊寅春分三己酉淸明壬申黃龍元正甲辰十一癸酉四壬申六辛未八庚午十己巳十二戊辰朔癸酉元帝初元元正戊戌二丁卯五丙申七乙未九甲午閏十癸巳十二壬辰朔十壬辰小雪十一癸亥冬至
