body:
  text: 辛亥七魯二十四正建子戊寅三丁丑五丙子七乙亥九甲戌十一癸酉朔杜氏長術正庚辰二己酉五戊寅七丁丑八丙子十乙亥十二甲戌朔閏七按外紀目録七丁丑作六丁丑乃刊本之訛壬子八魯二十五正建子壬申三辛未六庚子七己亥九戊戌十一丁酉朔閏六六己巳小滿七庚子夏至杜氏長術正甲辰二癸酉四壬申六辛未九庚子十一己亥朔癸丑九魯二十六正建子丙申三乙未五甲午七癸巳十壬戌十二辛酉朔杜氏長術正戊戌三丁酉五丙申七乙未九甲午十一癸巳朔甲寅十魯二十七正建子辛卯二庚申四己未六戊午八丁巳十丙辰十二乙卯朔杜氏長術正壬辰三辛卯六庚申八己未十戊午十二丁巳朔乙卯十一魯二十八正建子乙酉閏二甲申四癸未六壬午八辛巳十庚辰十二己卯朔二癸未大寒三甲寅驚蟄杜氏長術正丁亥二丙辰閏三乙卯五甲寅七癸丑九壬子十一辛亥朔按外紀目録二丙辰作三丙辰乃刊本之訛丙辰十二魯二十九正建子己酉二戊寅五丁未七丙午九乙巳十一甲辰朔杜氏長術正辛亥二庚辰四己卯六戊寅八丁丑十丙子十二乙亥朔
