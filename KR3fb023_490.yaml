body:
  text: 巳朔亦不合己酉四正庚午三己巳五戊辰六丁酉七丙寅十乙未朔按舊志正月十五日甲午不合庚戌五正乙丑二甲午四癸巳六壬辰七辛酉九庚申十己丑朔按通鑑目録九庚申作八庚寅不合辛亥六正己未二戊子四丁巳五丙戌七乙酉八甲寅十癸丑朔閏三三丁亥穀雨四丁巳小滿壬子七正癸未二壬子四辛亥六庚戌八己酉十戊申十一丁丑朔癸丑八正丁丑二丙午五乙亥七甲戌九癸酉十一壬申十二辛未朔閏十一十一辛丑冬至十二辛未大寒按通鑑目録二丙午作四丙午不合甲寅九正庚子四己巳七戊戌九丁酉十一丙申朔按通鑑目録正庚子作二庚午今推正月本當進為辛丑朔當時應進失進與舊紀冊府元龜干祿字書石刻正月庚子朔合乙卯十正乙未三甲午四癸亥七壬辰十辛酉十二庚申朔丙辰十一正庚寅二己未三戊子五丁亥七丙戌九乙卯十二甲申朔閏八八乙酉秋分九乙卯霜降按通鑑目録脫閏八二
