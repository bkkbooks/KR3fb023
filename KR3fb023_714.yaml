body:
  text: 十二辛亥朔丙寅武宗正德元正辛巳四庚戌六己酉七戊寅九丁丑十丙午十二乙巳朔按五行志十二己巳朔不合丁卯二正乙亥三甲辰五癸卯七壬寅九辛丑十一庚子朔閏正正甲辰雨水二乙亥春分戊辰三正己亥三戊戌六丁卯八丙寅十乙丑十二甲子朔己巳四正甲午二癸亥四壬戌六辛酉九庚寅十己丑十二戊子朔閏九九戊午霜降十己正小雪庚午五五戊午二丁亥三丙辰五乙卯八甲申十一癸丑朔辛未六正壬子三辛亥四庚辰六己卯八戊寅十一丁未朔按實錄九丁未朔譌十戊寅朔仍合壬申七正丁未二丙子四乙亥五甲辰六癸卯七壬申十辛丑朔閏五五壬申夏至六癸卯大暑按實錄四己亥九癸酉朔並譌癸酉八正辛未二庚子四己亥五戊辰七丁卯八丙申十乙未朔甲戌九正乙丑三甲子五癸亥六壬辰八辛卯九庚申十一己未朔
