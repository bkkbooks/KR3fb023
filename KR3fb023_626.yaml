body:
  text: 午十一癸巳朔閏二二丙寅春分三丁酉穀雨按系年要録四丙子朔不合金同癸未宋孝宗隆興元金三宋正壬辰四辛酉六庚申八已未十戊午十二丁巳朔按續宋編年通鑑正壬申朔不合金正壬辰四辛酉六庚申九己丑十戊午十二丁巳朔甲申宋二金四宋正丁亥二丙辰四乙卯六甲寅九癸未十一壬午十二辛巳朔閏十一十一庚戌冬至十二辛巳大寒金同按紀十癸亥朔不合乙酉宋乾道元金五宋正辛亥二庚辰四己卯六戊寅八丁丑十一丙午朔金同丙戌宋二金六宋正丙午二乙亥三甲辰五癸卯六壬申八辛未十二庚午朔金同按大金國志正己酉朔不合丁亥宋三金七宋復用統元術正庚子三己亥四戊辰六丁卯七丙申八乙未十二甲午朔閏七七甲子處暑八乙未秋分按紀元術同紀元術十一月甲子朔當進為乙丑朔當時日官應進失進以為甲子朔後乃據統元術改正仍進為乙丑朔周必大游山録三丙申朔不合四史朔閏考戊辰冬至亦不合今推十一月二日丙寅冬至與紀丙寅圜丘合金仍用楊級大明術同按劉屛山集墓表
