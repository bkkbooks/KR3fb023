body:
  text: 朔壬辰十一載正己卯三戊寅四丁丑五丙午七乙巳九甲辰十二癸酉朔閏三三丁未穀雨四丁丑小滿按多寶塔碑夫子廟堂記並四月乙丑朔不合癸巳十二載正癸卯三壬寅五辛丑六庚午八己巳十戊辰十二丁卯朔按通鑑目録五辛丑作四辛未不合會要六乙丑朔亦不合甲午十三載正丁酉四丙寅六乙丑七甲午九癸巳十一壬辰十二辛卯朔閏十一十一辛酉冬至十二辛卯大寒按賀蘭進明西楚伯王廟頌天寶之敦牂歲月壯十九日辛亥不合乙未十四載正辛酉二庚寅五己未七戊午九丁巳十一丙辰朔按通鑑目録二庚寅作正庚申五己未作四己丑九丁巳作八丁亥又云十二乙酉朔並不合舊紀十一戊午朔亦不合丙申肅宗至德元載正乙卯三甲寅六癸未八壬午十辛巳十二庚辰朔按舊紀三壬午八癸未朔賈至册漢中王瑀文七戊子朔並不合又肅宗即位册文八月癸未朔亦不合下云十八日己亥則合又通鑑考異引唐曆三月四日乙酉不合丁酉二載正庚戌二己卯四戊寅六丁丑閏八丙午十乙
