body:
  text: 己丑梁八魏二梁正己卯三戊寅五丁丑八丙午十乙巳十二甲辰朔魏同庚寅梁九魏三梁初用大明術上元甲子以來五萬一千九百八十七年正甲戌二癸卯四壬寅六辛丑七庚子九己亥十二戊辰朔閏六六庚午大暑七庚子處暑魏仍用元始術朔閏同六庚午大暑七辛丑處暑辛卯梁十魏四梁正戊戌二丁卯四丙寅六乙丑八甲子十癸亥十二壬戌朔魏同壬辰梁十一魏延昌元梁正壬辰三辛卯五庚寅七已丑九戊子十一丁亥朔魏同癸巳梁十二魏二梁正丙戌三乙酉四甲申七癸丑九壬子十一辛亥朔閏三三甲寅穀雨四甲申小滿按通鑑目録梁四月二日小滿與今推一日甲申小滿不合又七癸丑作七癸未宋本不訛魏正丙戌閏二乙酉四甲申七癸丑九壬子十一辛亥朔二甲申春分三乙卯穀雨甲午梁十三魏三梁正庚戌三己酉五戊申七丁未九丙午十二乙亥朔魏同乙未梁十四魏四梁正乙巳二甲戌四癸酉六壬申八辛未十庚午十二己巳朔閏十二十二戊戌大寒魏正乙巳二甲戌四癸酉六壬申八辛未十庚午十一己巳朔閏十十戊
