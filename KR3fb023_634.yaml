body:
  text: 丙午宋十三金二十六宋正庚辰二己酉四戊申六丁未七丙子八乙亥九甲辰朔閏七七甲辰處暑八乙亥秋分按范成大石湖詞十二月九日立春與今推十九日壬辰立春不合金同丁未宋十四金二十七宋正癸卯四壬申六辛未七庚子九己亥十戊辰朔按談鑰吳興志閏七不合金同戊申宋十五金二十八宋正丁酉五丙申七乙未八甲子十癸亥十一壬辰朔按兩朝編年八甲午朔薛鑑八甲申朔並不合禮志三月二十日丙戌亦不合金同己酉宋十六金二十九宋正壬辰二辛酉五庚寅六己丑八戊子十丁亥十二丙戌朔閏五五己未夏至六己丑大暑金同庚戌宋光宗紹熙元金章宗明昌元宋正丙辰二乙酉四甲申七癸丑九壬子十一辛亥朔按五行志十一月壬午日南至與今推十七日丁卯冬至不合金同辛亥宋二金二宋初用會元術上元甲子以來二千五百四十九萬四千七百六十八年正庚戌三己酉四戊寅七丁未十丙子十二乙亥朔按紀五己酉朔不合今推四戊寅朔與朱文公集豐淸敏遺事後序合又五行志五月有戊申亦合金仍用重修大明術同壬子宋三金三宋正乙巳二甲戌三癸酉四壬寅六辛丑
