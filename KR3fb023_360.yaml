body:
  text: 丑朔閏正正辛巳雨水二辛亥春分庚午五正丙子三乙亥五甲戌七癸酉九壬申十二辛丑朔辛未簡文帝咸安元正辛未二庚子四己亥六戊戌八丁酉十丙申十一乙未朔閏十十乙丑小雪十一乙未冬至按通鑑目録十一乙未作十二乙未宋本不訛壬申二正乙未二甲子四癸亥六壬戌八辛酉十庚申十二己未朔癸酉孝武帝寧康元正己丑二戊午四丁巳七丙戌九乙酉十一甲申朔按宋志三戊申朔不合甲戌二正癸未三壬午五辛巳七庚辰八已卯十一戊申朔閏七七己酉處暑八庚辰秋分按通鑑目録八月一日秋分與今推二日庚辰秋分不合乙亥三正丁未三丙午五乙巳七甲辰九癸卯十一壬寅朔按志三戊申朔不合丙子太元元正壬寅二辛未四庚午六己巳八戊辰十丁卯十二丙寅朔按紀及通鑑十一己巳朔不合宋志二乙丑閏三甲子朔並不合今推當在二年與志合丁丑二正丙申二乙丑閏三甲子六癸巳八壬辰十辛卯十二庚寅朔三癸亥穀雨四甲午小滿
