body:
  text: 千九百八十年正乙亥二甲戌五癸卯七壬寅八辛未十庚午十二己巳朔閏正正甲辰雨水二甲戌春分按通鑑目錄八辛未作九辛丑十庚午作十二庚午十二己巳作明年正己亥並不合舊紀正丁亥四戊寅九壬戌十一辛丑朔亦並不合甲辰二正己亥三戊戌五丁酉七丙申九乙未十一甲午朔按舊紀七己酉朔冊雍王爲皇太子文三戊辰朔並不合顏眞卿李光弼碑七月五日己亥亦不合下云十一月二十七日庚申則合又康阿義屈達千碑十一月二十日甲寅不合乙巳永泰元正癸巳三壬辰六辛酉八庚申十己未十一戊午朔閏十十戊子小雪十一己未冬至按通鑑目錄六辛酉作六辛亥八庚申作九庚寅通鑑正癸卯朔並不合丙午大曆元正丁巳三丙辰五乙卯七甲寅十癸未十二壬午朔丁未二正壬子二辛巳四庚辰五己酉七戊申十一丁未朔戊申三正丙午三乙巳五甲辰六癸酉七壬申十辛丑朔閏六六壬寅大暑七癸酉處暑按通鑑目錄脫閏六二字五甲辰作四甲戌宋本作四甲戌閏七壬申並不合會要三己
