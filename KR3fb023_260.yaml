body:
  text: 戊午四正丁未二丙子四乙亥六甲戌八癸酉十壬申十二辛未朔已未元壽元正辛丑三庚子五已亥七戊戌九丁酉十一丙申十二乙未朔閏十一十一甲子冬至十二乙未大寒按通鑑目録三庚子作二庚午十二乙未作閏十二乙未並不合荀紀正辛卯朔亦不合今推辛丑朔與紀志及孔光傳合庚申二正乙丑二甲午四癸巳七壬戌九辛酉十一庚申朔按本紀荀紀通鑑四壬辰晦不合今推三壬辰晦與五行志合辛酉平帝元始元正己未三戊午五丁巳七丙辰十乙酉十二甲申朔按通鑑目録十乙酉作九乙卯不合壬戌二正甲寅二癸未四壬午六辛巳八庚辰九己卯十一戊寅朔閏八八己酉秋分九己卯霜降按通鑑目録十一戊寅作十三戊寅宋本不訛王子侯表閏六不合癸亥三正戊寅二丁未四丙午六乙巳八甲辰十癸卯十二壬寅朔甲子四正壬申二辛丑四庚子七己巳九戊辰十一丁卯朔乙丑五正丙寅三乙丑五甲子六癸亥九壬辰十一辛卯朔閏五五癸巳夏至六甲子大暑按通鑑目録九壬辰作八壬戌
  hash: sha256:a3558e01bfa21e77ba29804d954d36c390c811a4bd3865a312ce70e1a7d12808
