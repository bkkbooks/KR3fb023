body:
  text: 九癸丑十一壬子朔按宋元凶劭傳閏正不合今推閏正在明年與南史合涼同丙寅宋三涼十五魏三宋魏正辛亥二庚戌五已卯七戊寅九丁丑十一丙子朔閏正正庚辰雨水二庚戌春分按通鑑十一月壬午冬至與今推九日甲申冬至不合涼正辛亥三庚戌五已卯七戊寅九丁丑十一丙子朔閏四四已酉小滿五已卯夏至丁卯宋四涼十六魏四宋魏正乙亥三甲戌五癸酉八壬寅十辛丑十二庚子朔按通鑑目錄五癸酉作六癸卯宋本作五癸卯並不合涼正乙亥三甲戌五癸酉七壬申十辛丑十二庚子朔戊辰宋五涼承元元魏神麚元宋魏正庚午二已亥四戊戌六丁酉八丙申十乙未十二甲子朔閏十十甲子小雪十一乙未冬至按北史十二乙未朔不合今推十一乙未朔與魏天象志合涼正庚午二已亥四戊戌六丁酉八丙申十乙未朔已巳宋六涼二魏二宋魏正甲午二癸亥四壬戌六辛酉八庚申十已未十二戊午朔按建康實錄十二已丑朔不合今推十一已丑朔與南史合涼正甲子二癸亥四壬戌六辛酉八庚申十已未十二戊午朔閏正正癸巳雨水二
