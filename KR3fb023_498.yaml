body:
  text: 未朔按柳宗元亡姊墓志三月十三日甲子八月十八日甲子並不合考柳集每云甲子猶言干支耳非定指甲子日也辛巳十七正甲午二癸巳四壬辰七辛酉九庚申十一己未朔閏正正癸亥雨水二癸巳春分按軒轅鑄鼎原銘正月九日癸卯柳宗元亡姑權厝志九月六日甲子並不合壬午十八正戊午三丁巳五丙辰七乙卯十甲申朔癸未十九正癸丑二壬午四辛巳五庚戌七己酉十戊寅朔閏十十丁未小雪十一戊寅冬至按新表閏十一不合今推閏十與舊紀合鄭玉墓石十一月戊寅朔不合今推十戊寅朔與權德輿祭崔侍郎文合柳宗元祭楊凝文四月辛未朔許孟容祭楊郎中文四月壬午朔並不合甲申二十正丁丑二丙午四乙巳五甲戌七癸酉九壬申朔按權德輿祭獨孤常州文祭獨孤台州文皆云十一月戊申朔又祭唐評事文十一月壬戌朔十六日癸亥並不合乙酉順宗永貞元正辛未三庚午五己巳六戊戌八丁酉十丙申朔丙戌憲宗元和元正丙寅二乙未四甲午六癸巳閏六壬戌八辛酉十庚申朔六辛酉大暑七壬辰處暑按順宗實録正景戌朔
