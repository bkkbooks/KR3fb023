  text: 壬辰朔辛卯十九正建子辛卯四庚申六己未八戊午十丁巳十二丙辰朔壬辰二十正建子丙戌二乙卯閏三甲寅五癸丑八壬午十辛巳十二庚辰朔三癸丑驚蟄四甲申春分癸巳二十一正建子庚戌二己卯四戊寅六丁丑八丙子十一乙巳朔甲午二十二正建子甲辰三癸卯五壬寅七辛丑九庚子十一己亥十二戊戌朔閏十一十一丁卯霜降十二戊戌小雪乙未二十三正建子戊辰三丁卯五丙寅七乙丑九甲子十一癸亥朔丙申二十四正建子壬戌三辛酉五庚申八己丑十戊子十二丁亥朔丁酉二十五正建子丁巳二丙戌四乙酉六甲申八癸未十壬子十二辛亥朔閏九九壬午處暑十壬子秋分戊戌二十六正建子辛巳二庚戌四己酉六戊申八丁未十丙午十二乙巳朔己亥二十七正建子乙亥三甲戌五癸酉七壬申九辛未十一庚午朔庚子二十八正建子己巳三戊辰六丁酉七丙申九乙未十
