body:
  text: 己酉十戊寅朔四庚辰小滿五辛亥夏至丙午二十二正戊申二丁丑三丙午五乙巳六甲戌八癸酉十壬申朔丁未二十三正壬寅二辛未四庚午六己巳七戊戌九丁酉十一丙申朔戊申孝宗宏治元正丙申二乙未四甲午六癸巳七壬戌九辛酉十一庚申朔閏正正乙丑雨水二乙未春分己酉二正庚申二己丑五戊午七丁巳八丙戌十乙酉十二甲申朔庚戌三正甲寅二癸未五壬子七辛亥九庚戌十己酉十二戊申朔閏九九己卯霜降十己酉小雪辛亥四正戊寅二丁未四丙午七己亥九甲戌十一癸酉朔壬子五正壬申三辛未五庚午七己巳十戊戌十二丁酉朔癸丑六正丁卯二丙申四乙未五甲子六癸亥九壬辰十二辛酉朔閏五五癸巳夏至六癸亥大暑按實録四乙亥朔訛甲寅七正辛卯二庚申四己未五戊子七丁亥九丙戌朔乙卯八正乙酉三甲申五癸未六壬子七辛巳十庚戌
