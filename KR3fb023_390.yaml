body:
  text: 一庚午冬至按通鑑目録十一庚午作閏十一庚午不合已亥宋三魏五宋正已巳三戊辰六丁酉八丙申十乙未十二甲午朔正己已雨水魏朔同按通鑑目録正月二日雨水與今推三日辛未雨水不合庚子宋四魏和平元宋正甲子二癸巳四壬辰六辛卯九庚申十一已未朔魏同辛丑宋五魏二宋正戊午三丁巳五丙辰七乙卯九甲寅十癸丑朔閏九九癸未霜降十甲寅小雪按通鑑目録十癸丑作十一癸丑宋本不訛魏正戊午三丁巳五丙辰七乙卯八甲寅十癸丑朔閏七七甲申處暑八甲寅秋分按通鑑目録八甲寅作閏八甲寅不合壬寅宋六魏三宋正壬午三辛巳五庚辰七己卯九戊寅十一丁丑朔魏同癸卯宋七魏四宋正丙子三乙亥六甲辰八癸卯十壬寅十二辛丑朔魏同按靈徵志有閏月不合甲辰宋八魏五宋正辛未二庚子四已亥閏五戊戌八丁卯十丙寅十二乙丑朔五丁酉夏至六戊辰大暑魏正辛未二庚子四已亥五戊戌八丁卯十丙寅十二乙丑朔閏四四戊辰小滿五戊戌夏至乙巳宋明帝泰始元魏六宋正乙未二甲子四癸亥六壬戌八
