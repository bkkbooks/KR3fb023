body:
  text: 十丁未十一丙午朔閏十十丙子秋分十一丙午霜降杜氏長術正壬午三辛巳五庚辰七己卯九戊寅十一丁丑朔辛未十五魯十二正建子乙巳四甲戌六癸酉八壬申十辛未十二庚午朔杜氏長術正丙子二乙亥四甲戌六癸酉八壬申十一辛丑朔閏正壬申十六魯十三正建子庚子二己巳四戊辰六丁卯九丙申十一乙未朔杜氏長術正庚子三己亥五戊戌七丁酉九丙申十一乙未朔癸酉十七魯十四正建子甲午三癸巳五壬辰七辛卯八庚寅十己丑朔閏七七庚申夏至八辛卯大暑杜氏長術正甲午四癸亥六壬戌八辛酉十庚申十二己未朔甲戌十八魯十五正建子戊午三丁巳五丙辰七乙卯九甲寅十一癸丑朔杜氏長術正己丑二戊午四丁巳七丙戌九乙酉十甲申十二癸未朔閏九超辰率是年太歲超庚午入辛未太陰超戊申入己酉歲星超鶉首入鶉火乙亥十九魯十六正建子壬子四辛巳六庚辰八己卯十戊寅十二丁巳朔杜氏長術正癸丑二壬午四辛巳六庚辰八己卯十戊寅十二丁丑朔丙子二十魯十七正建子丁未二丙子閏三乙丑五甲戌八癸卯十壬寅十二辛丑朔三甲戌驚蟄四乙巳春分杜氏長術正丁未
