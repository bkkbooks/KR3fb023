body:
  text: 癸巳二十戊辰十二丁卯二丙寅四乙丑六甲子八癸亥朔後九九壬戌霜降甲午三十壬辰十二辛卯二庚寅四己丑六戊子八丁亥朔十壬辰小雪乙未秦王子嬰元漢高帝元漢用殷術丁卯蔀七十年十丁亥十一丙辰正乙卯三甲寅六癸未八壬午朔顓頊術十丙戌正乙卯三甲寅五癸丑七壬子九辛亥朔按通鑑目録載劉氏長術起此年漢初承秦仍以十月為歲首用殷術或云仍用顓頊術今從劉氏長術兩存之以史文考之似殷術為合丙申漢高帝二殷十辛巳十二庚辰二己卯四戊寅六丁丑八丙子朔後九四丙午小滿六丁丑夏至應閏四顓十辛巳十一庚戌正己酉三戊申六丁丑八丙子朔後九六丙午大暑八丁丑處暑應閏六丁酉三殷十乙巳十二甲辰二癸卯四壬寅六辛丑八庚子朔顓十乙巳十一甲戌正癸酉三壬申五辛未八庚子朔按漢本紀五行志十甲戌晦與殷合戊戌四殷十己亥十二戊戌三丁卯五丙寅七乙丑九甲子朔顓十己亥十二戊戌二丁酉四丙申六乙未八甲午朔
