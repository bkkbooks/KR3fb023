body:
  text: 讀史而考及於月日干支小事也然亦難事也欲知月日必求朔閏欲求朔閏必明推步宋劉仲更羲叟遍通前代步法撰劉氏輯術自漢初迄五季千餘年朔閏燦然足資考索惜乎輯術全書久佚僅存於通鑑目録而通鑑目録又僅存明人刊本脫訛不少且自宋逮明又六百餘年未有續撰長術繼仲更而起者蓋其事甚小為之則難不知推步者欲為之而不能為知推步者能為之而不屑為也兒子曰楨性好學史又喜習算嘗有志於此遍考當時行用之本術如法推步得其朔閏凡仲更所推悉為算校正其訛補其缺并續推宋以後之長術又取二十四史所載月日一一稽其合否證以羣書略加考辨其布算檢閲始於丙申之夏期以二十載之功畢成全史曰楨之言曰史學所以資治其本在深察夫興衰治忽之大端徒考核於典章名物已為末務月日干支抑末之末也雖然月日淆亂則事迹之先後不明而興衰治忽之故將欲察而無由矣且下學上達初非二致欲求其精必先求其粗譬諸飲食先以烹飪先以種藝及其既飽則種藝烹飪皆為筌蹄而要不能不先從事於此若徒知種藝烹飪而不求飽食則將終身為田父為膳夫惟孜孜於隴畝之畔爨竈之間
  hash: sha256:9f7bfba43d7ae8c24d69956d15144f3af6d7a83729bcbd341a4d2a99739b5b6a
