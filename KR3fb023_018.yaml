body:
  text: 讀史而攷及於月日干支小事也然亦難事也欲知月日必求朔閏欲求朔閏必明推步宋劉仲更羲叟徧通前代步法撰劉氏輯術自漢初迄五季千餘年朔閏燦然足資攷索惜乎辑術全書久佚僅存於通鑑目錄而通鑑目錄又僅存明人刊本脫譌不少且自宋迨明又六百餘年未有續撰長術繼仲更而起者葢其事甚小爲之則難不知推步者欲爲之而不能爲知推步者能爲之而不屑爲也兒子曰楨性好學史又喜習算嘗有志於此徧攷當時行用之本術如法推步得其朔閏凡仲更所推悉爲算校正其譌補其缺并續推宋以後之長術又取二十四史所載月日一一稽其合否證以羣書畧加攷辯其布算檢閱始於丙申之夏期以二十載之功畢成全史曰楨之言曰史學所以資治其本在深察夫興衰治忽之大端徒攷覈於典章名物已爲末務月日干支抑末之末也雖然月日淆亂則事蹟之先後不明而興衰治忽之故將欲察而無由矣且下學上達初非二致欲求其精必先求其粗譬諸飲食先以烹飪先以種蓺及其既飽則種蓺烹飪皆爲筌蹏而要不能不先從事於此若徒知種蓺烹飪而不求飽食則將終身爲田父爲膳夫惟孜孜於隴畝之畔爨竈之間
