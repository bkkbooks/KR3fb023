body:
  text: 戌小雪十一己巳冬至按通鑑目録十一己巳作閏十一己巳不合丙申梁十五魏孝明帝熙平元梁正戊辰四丁酉六丙申八乙未十甲午十二癸巳朔正己巳雨水按通鑑三戊戌朔不合今推戊辰朔與紀志南史合魏同按通鑑目録此年脫魏朔乃刊本之訛丁酉梁十六魏二梁正癸亥二壬辰四辛卯七庚申九己未十一戊午朔魏同戊戌梁十七魏神龜元梁正丁巳三丙辰五乙卯七甲寅閏八癸丑十一壬午朔八壬子秋分九癸未霜降魏正丁巳三丙辰五乙卯七甲寅八癸丑十一壬午朔閏七七癸未處暑八癸丑秋分按通鑑目録魏與梁同閏八不合己亥梁十八魏二梁正辛巳三庚辰五己卯七戊寅九丁丑十一丙子朔魏同按賈思伯碑四戊辰朔不合庚子梁普通元魏正光元梁正乙亥四甲辰六癸卯八壬寅十辛丑十二庚子朔魏同辛丑梁二魏二梁正庚午二己亥四戊戌六丁卯八丙寅十乙丑十二甲子朔閏五五丁酉夏至六丁卯大暑魏朔閏同五丁酉夏至六戊辰大暑按北史五丁酉朔不合壬寅梁三魏三梁正甲午二癸亥四壬戌六辛酉八庚申
