body:
  text: 辛酉五正戊戌三丁酉五丙申八乙丑十甲子十二癸亥朔正已亥雨水按志正戊午朔不合今推戊戌朔與宋志合壬戌哀帝隆和元正癸巳二壬戌四辛酉六庚申八己未十一戊子朔按紀志元經三甲寅朔建康實録三丙寅朔並不合癸亥興寧元正丁亥三丙戌五乙酉七甲申閏八癸未十壬午十二辛巳朔八壬午秋分九癸丑霜降甲子二正辛亥三庚戌五已酉七戊申九丁未十一丙午朔乙丑三正乙巳三甲辰五癸卯八壬申十辛未十二庚午朔丙寅海西公太和元正庚子二己巳四戊辰五丁卯七丙寅十乙未十二甲午朔閏四四丙申小滿五丁卯夏至按通鑑目録五丁卯作閏五丁卯不合丁卯二正甲子二癸巳四壬辰六辛卯八庚寅十已丑十二戊子朔戊辰三正戊午三丁巳五丙辰七乙卯九甲寅十一癸丑朔己巳四正壬子二辛亥四庚戌七已卯九戊寅十一丁
