body:
  text: 九丙子十一乙亥朔五丁丑夏至六戊申大暑按通鑑目錄正庚戌作二庚辰不合魏正庚戌四已卯五戊寅七丁丑九丙子十一乙亥朔閏四四戊申小滿五戊寅夏至按通鑑目錄正庚戌作二庚辰不合甲子齊二魏八齊正甲戌三癸酉六壬寅八辛丑十庚子十二已亥朔魏同乙丑齊三魏九齊正已巳二戊戌四丁酉六丙申八乙未十一甲子朔魏同按通鑑目錄此年脫魏朔乃刊本之譌北史七丙午朔不合今推丙寅朔與魏紀合丙寅齊四魏十齊正癸亥二壬戌四辛酉六庚申八已未十戊午十二丁巳朔閏正正辛卯雨水二壬戌春分按天文志閏二不合魏朔閏同正壬辰雨水二癸亥春分丁卯齊五魏十一齊正丁亥三丙戌五乙酉七甲申九癸未十一壬午朔魏同戊辰齊六魏十二齊正辛巳三庚辰六已酉八戊申十丁未十一丙午朔閏十十丙子小雪十一丙午冬至按天文志閏八又作閏四並不合魏正辛巳三庚辰六己酉八戊申閏九丁未十一丙午朔九丙午霜降十丁丑小雪按天象志北史閏十不合今推閏九與魏紀合己巳齊七魏十三齊正乙巳三甲辰五癸卯七壬寅十辛未
