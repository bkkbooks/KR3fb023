body:
  text: 戊戌三正戊申五丁未六丙子八乙亥十甲戌朔按正月本己酉朔二月本當進為己卯朔當時避正旦日食強改正月為戊申朔故二月亦當進不進此年為南唐升元二年南漢高祖劉龑大有十一年通鑑目録云南唐正己酉二己卯朔十國春秋南唐南漢並正月己酉朔日食遼朔考大任正己酉皆依推步本法南唐劉津婺源諸縣都制置新城記十月癸丑五日丁巳不合己亥四初用調元術自天寶十四載乙未正月辛酉朔雨水為元積一百八十五年正癸卯四壬申六辛未七庚子八己亥十戊戌十二丁酉朔閏七七己巳處暑八庚子秋分按此術失考今借宣明術推之通鑑目録云晉用調元小術五年而差遼閏考閏五册府元龜七壬寅閏庚子朔並不合庚子五正丁卯四丙申六乙未七甲子九癸亥十一壬戌朔按此年為南唐升元四年初用陳承勳中正術迄元宗李璟保大中其術無考不能推算辛丑六正辛酉四庚寅七己未八戊子十丁亥十二丙戌朔壬寅七正丙辰二乙酉閏三甲申六癸丑八壬子十辛亥十二庚戌朔三癸未穀雨四甲寅小滿按舊紀九丁丑朔舊志八
