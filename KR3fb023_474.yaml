body:
  text: 辛酉九正戊申三丁未七丙午八乙亥十一甲辰十二癸酉朔按舊紀九己巳朔舊志會要五乙巳朔並不合今推九乙巳朔與新紀合又舊紀十一月庚午冬至與今推廿五日戊辰冬至不合壬戌十正癸卯二壬申四辛未六庚子九己巳十一戊辰朔閏五五庚午夏至六辛丑大暑按通鑑目錄六月一日大暑與今推二日辛丑大暑不合張九齡爲吏部侍郎祭故人文二月癸酉朔李邕王仁忠碑三月癸酉朔八月壬寅朔張説赤帝壇祈雨文四月壬申朔並不合癸亥十一正丁卯三丙寅四乙未六甲午九癸亥十二壬辰朔按通鑑目錄三丙寅作二丙申九癸亥作八癸巳十二壬辰作十一壬戌並不合今推十一癸亥朔與沁州刺史馮公碑十日壬申合通鑑攷異引實錄癸酉日長至不合今推十一月十六日戊寅冬至與通鑑攷異引唐曆合甲子十二正壬戌二辛卯三庚申五己未六戊子九丁巳閏十二丙辰朔十二甲寅大寒按今推閏月廿九日甲申啟蟄明年二月一日乙卯春分本當閏明年正月當時強改爲閏十二月以避正旦日食甲申啟蟄亦強進爲丙戌通鑑目錄九丁巳作八丁亥閏十二丙辰作十二丙戊
