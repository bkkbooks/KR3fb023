body:
  text: 當超庚戌入辛亥太陰當超戊子入己丑歲星當超大火入析木當時應超不超其法遂廢辛亥二十七正己巳三戊辰五丁卯七丙申九乙未十一甲午朔閏六六乙丑大暑七丙申處暑按通鑑方錄七丙申作閏六丙寅不合壬子二十八正癸巳三壬辰五辛卯七庚寅九已丑十二戊午朔癸丑二十九正戊子二丁巳四丙辰六乙卯八甲寅十癸丑十二壬子朔甲寅三十正壬午三辛巳四庚辰六已卯八戊寅十丁丑十二丙子朔閏三三庚戌淸明四庚辰小滿按通鑑目錄三辛巳作二辛亥不合天文志閏四亦不合今推閏三與本紀合乙卯三十一正丙午二乙亥四甲戌七癸卯九壬寅十一辛丑朔按通鑑目錄七癸卯作六癸酉不合丙辰建武中元元正庚子三己亥五戊戌七丁酉九丙申十二乙丑朔閏十二十二甲午大寒丁巳二正甲子三癸亥五壬戌七辛酉九庚申十一己未朔正甲子驚蟄戊午明帝永平元正己未二戊子四丁亥六丙戌八乙酉十甲申十二癸未朔按通鑑目錄二戊子作正戊午不合
