body:
  text: 天術合淳祐術十一月二日丁亥冬至元仍用重修大明術正壬戌二辛卯四庚寅七己未九戊午閏十丁巳十二丙辰朔十丙辰小雪十一丁亥冬至壬子宋十二元二宋正丙戌二乙卯四甲寅六癸丑九壬午十一辛巳朔按統天術正乙酉四甲寅六癸丑九壬午十一辛巳朔元與統天術同癸丑宋寶祐元元三宋初用會天術上元甲子以來一千一百三十五萬六千一百三十年正庚辰二己酉四戊申七丁丑十丙午十二乙巳朔按此術盈縮遲疾諸率無考今求定朔借統天術日躔月離二表化分擬數推之此年統天術朔同紀正庚寅朔不合元仍用重修大明術正庚辰二己酉四戊申七丁丑九丙子十二乙巳朔甲寅宋二元四宋正乙亥二甲辰四癸卯五壬申閏六辛未九庚子十二乙巳朔六庚午大暑七辛丑處暑按統天術同元同乙卯宋三元五宋正己亥二戊辰四丁卯五丙申七乙未九甲午朔按統天術同元同丙辰宋四元六宋正癸巳三壬辰五辛卯六庚申八己未九戊子朔按統天術正癸巳三壬辰五辛卯六庚申七
