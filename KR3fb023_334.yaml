body:
  text: 已巳十二戊辰朔按宋志三已亥朔不合今推十一已亥朔與晉志合吳正癸卯三壬寅六辛未八庚午十已已十二戊辰朔癸未漢炎興元魏四吳六漢正戊戌四丁卯五丙寅七乙丑九甲子十一癸亥朔閏四四丙申小滿五丁卯夏至魏正戊戌二丁卯閏三丙寅五乙丑七甲子十癸巳十二壬辰朔三乙丑穀雨四丙申小滿吳正戊戌二丁卯閏三丙寅五乙丑八甲午十癸巳十二壬辰朔三乙丑穀雨四丙申小滿按通鑑目錄四月二日小滿與今推一日丙申小滿不合宋本作一日不譌甲申魏咸熙元吳歸命侯元興元魏正壬戌二辛卯四庚寅六已丑八戊子十丁亥十二丙戌朔吳正壬戌二辛卯四庚寅六已丑八戊子十丁亥朔乙酉魏咸熙二晉武帝泰始元吳甘露元晉仍用景初術更名泰始術正丙辰三乙卯五甲寅七癸丑九壬子十一辛亥十二庚戌朔閏十一十一已卯冬至十二庚戌大寒按通鑑目錄十二庚戌作閏十二庚戌不合吳仍用乾象術同丙戌晉泰始二吳寶鼎元晉正庚辰二已酉四戊申七丁丑九丙子十一已亥朔按通鑑六丙午晦不合今推七丙午晦與紀志合志十一月庚寅冬至與今推十一日乙酉冬至不合庚寅冬至在明年與宋志合吳正庚辰二
