body:
  text: 九庚午十二己亥朔閏二二癸卯春分三甲戌穀雨按紀十一月丙戌日南至與今推八日丁丑冬至不合陸象山年譜十二月七日丙午亦不合金同癸丑宋四金四宋正己巳二戊戌四丁酉五丙寅七乙丑九甲子朔按四史朔閏考錢侗曰會元術注十一月二十日癸未冬至五行志作己卯誤也曰楨按今考五行志作乙卯亦不合金同甲寅宋五金五宋正癸亥三壬戌五辛酉六庚寅八己丑九戊午十二丁巳朔閏十十丁巳小雪十一戊子冬至按建炎以來朝野雜記五壬辰朔齊東野語七月四日甲子慶元黨禁閏十月十九日甲戌樓鑰攻愧集孝宗靈駕祭文十一戊午朔續宋編年通鑑十二乙巳朔並不合金同乙卯宋寧宗慶元元金六宋正丁亥三丙戌五乙酉六甲寅八癸丑九壬午十二辛亥朔按紀正丁巳朔不合今推丁亥朔與周益公年譜合慶元黨禁四月四日戊午不合金同丙辰宋二金承安元宋正辛巳四庚戌六己酉七戊寅九丁丑十丙午朔金同丁巳宋三金三宋正乙亥四甲辰六癸卯七壬寅九辛丑十庚午十二己巳朔閏六六辛未大暑七壬寅處暑按續宋編年通
