body:
  text: 子十乙亥朔二己卯春分三庚戌穀雨己亥十三正乙巳二甲戌五癸卯六壬申八辛未九庚子十一己亥朔庚子十四正己亥二戊辰五丁酉七丙申九乙未閏十甲午十二癸巳朔十癸巳小雪十一甲子冬至按十一月本癸亥朔當時依李淳風新術進爲甲子辛丑十五正癸亥二壬辰四辛卯七庚申九己未十一戊午朔壬寅十六正丁巳三丙辰五乙卯七甲寅十癸未十二壬午朔按通鑑目錄三丙辰作二丙戌不合癸卯十七正壬子二辛巳四庚辰五己酉閏六戊申九丁丑朔六丁未大暑七戊寅處暑按通鑑目錄四庚辰作三庚戌又十二丙午朔宋本作一辛巳二庚戌十二丙午並譌無名氏陸讓碑十月丁未六日壬寅此年十二月丁未朔月內無壬寅當有譌字甲辰十八正丙子二乙巳四甲辰五癸酉七壬申九辛未朔按通鑑目錄四甲辰作三甲戌五癸酉作六癸卯並不合乙巳十九正庚午二己亥四戊戌六丁酉九丙寅十一乙丑朔按此年以九月後定朔連四大復改用平朔
