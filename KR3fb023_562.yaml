body:
  text: 八辛未十一庚子朔閏三三癸卯穀雨四癸酉小滿按遼朔攷宋四甲戌六癸酉七癸卯八壬申九壬寅並不合今推四癸酉朔與上淸太平宮碑合遼同辛巳宋六遼三宋正庚子二己巳三戊戌五丁酉六丙寅八乙丑十二甲子朔按錢氏四史朔閏攷三己亥朔不合遼同壬午宋七遼四宋正甲午三癸巳四壬戌六辛酉七庚寅九己丑十二戊午朔閏十二十二丁亥大寒遼同按紀三月乙未淸明與今推六日戊戌淸明不合癸未宋八遼聖宗統和元宋初用乾元術上元甲子以來三千五十四萬三千九百八十年正戊午三丁巳四丙戌六乙酉七甲寅九癸丑十一壬子朔應天術正戊午雨水乾元術則丁巳雨水戊子春分當閏正月按長編四辛卯朔不合遼仍用調元術同正戊午雨水按朔攷大任二丁亥七乙卯並不合甲申宋雍熙元遼二宋正壬子三辛亥正庚戌七己酉八戊寅十丁丑十二丙子朔按遼朔攷宋十戊寅不合遼同按紀六己卯朔朔攷大任三庚戌六己卯並不合乙酉宋二遼三宋正丙午三乙巳六甲戌八癸酉九壬寅十辛丑十二庚子朔閏九九辛未霜降十壬寅小雪按遼朔攷宋二乙亥五甲辰並不合遼正丙午三乙巳六甲戌八癸
