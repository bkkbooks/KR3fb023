body:
  text: 辛丑十二庚午朔癸巳晉九吳二晉正庚子二己巳四戊辰六丁卯八丙寅十乙丑十二甲子朔吳同甲午晉十吳三晉正甲午閏正癸亥三壬戌六辛卯八庚寅十己丑十二戊子朔正壬戌雨水二癸巳春分吳正甲午閏正癸亥四壬辰六辛卯八庚寅十已丑十二戊子朔正壬戌雨水二癸巳春分乙未晉咸寧元吳天册元晉正戊午二丁亥四丙戌六乙酉九甲寅十一癸丑朔吳同丙申晉二吳天璽元晉正壬子三辛亥五庚戌七己酉九戊申十丁未朔閏九九丙子霜降十丁未小雪按通鑑目録十丁未作閏十丁未不合吳正壬子三辛亥五庚戌七已酉九戊申十一丁丑朔閏十十丁未小雪十一丁丑冬至丁酉晉三吳天紀元晉正丙子三乙亥五甲戌七癸酉九壬申十一辛未朔吳同戊戌晉四吳二晉正庚午四已亥六戊戌八丁酉十丙申十二乙未朔吳正庚午四己亥六戊戌八丁酉十丙申十二乙未朔己亥晉五吳三晉正乙丑二甲午四癸巳六壬辰八辛酉十庚申十二已未朔閏七七辛卯處暑八辛酉秋分吳同
