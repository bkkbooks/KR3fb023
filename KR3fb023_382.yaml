body:
  text: 丙子宋十三涼四魏二宋魏正癸丑三壬子五辛亥七庚戌九已酉十二戊寅朔閏十二十二丁未大寒涼朔同無閏丁丑宋十四涼五魏三宋魏正丁丑三丙子五乙亥七甲戊九癸酉十一壬申朔正丁丑雨水涼正戊申二丁丑三丙子五乙亥七甲戌九癸酉十一壬申朔閏二二丙午春分三丙子穀雨戊寅宋十五涼六魏四宋魏正辛未四庚子六已亥八戊戌十丁酉十二丙申朔涼同已卯宋十六涼七魏五宋魏正丙寅二乙未四甲午七癸亥九壬戌十辛酉十二庚申朔閏九九辛卯霜降十壬戌小雪按宋氏胡傳閏八不合通鑑目錄十月一日小雪與今推二日壬戌小雪不合宋本作二日不譌涼正丙寅二乙未四甲午六癸巳九壬戌十一辛酉十二庚申朔閏十一十一庚寅冬至十二庚申大寒庚辰宋元嘉十七魏太平眞君元宋魏仍同用景初術正庚寅二已未四戊午六丁已八丙辰十一乙酉朔辛巳宋十八魏二正甲申三癸未五壬午七辛巳九庚辰十一已卯朔壬午宋十九魏三正戊寅四丁未閏五丙午七乙巳九甲辰十一癸卯朔五乙巳夏至六丙子大暑按魏天象志北史八甲戌晦
