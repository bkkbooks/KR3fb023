body:
  text: 卯六丙寅八乙丑十甲子十二癸亥朔戊午漢延熙元魏二吳赤烏元漢正建寅癸巳三壬辰六辛酉八庚申十已未十一戊午朔閏十十戊子小雪十一戊午夏至魏正建丑癸亥三壬戌五辛酉七庚申十已丑閏十一戊子朔十一丁亥小雪十二戊午冬至吳正建寅癸巳二壬戌四辛酉七庚寅九已丑閏十戊子十二丁亥朔十丁亥小雪十一戊午冬至已未漢二魏三吳二漢正建寅丁巳三丙辰五乙卯七甲寅十癸未十二壬午朔魏正建丑丁亥三丙戌五乙酉七甲申九癸未十一壬午朔後十二按明年復用寅正故此年置後十二月吳正建寅丁巳二丙戌四乙酉六甲申八癸未十一壬子朔庚申漢三魏邵陵厲公正始元吳三漢正壬子二辛巳四庚辰六已卯八戊寅十丁丑朔魏正辛亥三庚戌五已酉七戊申九丁未十一丙午朔按自此以後仍用寅正吳與魏同辛酉漢四魏二吳四漢正丙午三乙巳五甲辰七癸卯八壬寅十辛丑十二庚子朔閏七七壬申處暑八癸卯秋分魏正乙巳三甲辰六癸酉七壬申九辛未十一庚午朔閏六六辛丑大暑七壬申處暑吳正乙巳四甲戌六癸酉七壬申九辛未十一庚午朔閏六六辛丑大暑七壬申處暑
