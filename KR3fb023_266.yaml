body:
  text: 庚辰地皇元正建丑己巳四戊戌六丁酉八丙申十乙未十二甲午朔辛巳二正建丑甲子二癸巳四壬辰七辛酉九庚申十己未十二戊午朔閏九九戊子秋分十己未霜降按此丑正七月辛酉朔通鑑目錄作寅正五月辛卯朔不合壬午三正建丑戊子二丁巳四丙辰六乙卯八甲寅十一癸未朔按王莽傳二月乙未立春與今推建丑月十八日乙巳立春不合癸未漢淮陽王更始元新地皇四漢正建寅壬子二辛巳四庚辰六己卯八戊寅十丁丑十二丙子朔按後漢光武紀正甲子朔不合新正建丑壬午三辛巳五庚辰七己卯九戊寅十一丁丑朔按王莽傳三辛巳朔與丑正合後漢光武紀劉元傳荀氏漢紀袁氏後漢紀通鑑皆作二辛巳朔乃夏正也又王莽傳續漢天文志十戊申朔亦與丑正合通鑑九戊申朔與寅正合荀紀十一戊申朔不合此年漢仍用寅正與新用丑正異今兩列之甲申漢更始二正建寅丙午三乙巳五甲辰六癸卯八壬寅十辛丑十二庚子朔閏五五癸酉夏至六癸卯大暑按自此年以後仍用寅正乙酉漢光武帝建武元仍用太初術正庚午二己亥五戊辰七
