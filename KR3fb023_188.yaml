body:
  text: 乙巳五十九秦五十一周術丙午蔀首正建子丙午二乙亥四甲戌六癸酉八壬申十辛未十二庚午朔正丙午冬至秦十丁未十一丙子正乙亥四甲辰六癸卯八壬寅後九辛丑朔十一乙巳冬至正丙子大寒應閏十一丙午秦昭襄王五十二秦仍用顓頊術十辛未十一庚子正己亥三戊戌五丁酉八丙寅朔丁未五十三十乙丑十二甲子二癸亥四壬戌六辛酉八庚申朔後九七己未處暑九庚寅秋分應閏七戊申五十四十己丑十二戊子二丁亥四丙戌六乙酉八甲申朔己酉五十五十癸未十二壬午三辛亥五庚戌七己酉九戊申朔庚戌五十六十戊寅十一丁未正丙午三乙巳五戊辰八癸酉後九壬申朔三癸酉淸明五甲辰小滿應閏三辛亥孝文王元十壬寅十一辛未正庚午三己巳五戊辰八丁卯朔壬子莊襄王元十丙申十二乙未二甲午四癸巳六壬辰八辛卯朔癸丑二十庚寅十二己丑三戊午五丁巳七丙辰九乙卯朔後九正戊子驚蟄三己未春分應閏正
