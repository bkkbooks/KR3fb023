body:
  text: 春分今進為丁丑雨水使與閏十二相合閏考閏二朔考儼閏二壬子三壬午四辛亥五辛巳六庚戌八己酉九戊寅十一丁丑十二丁未並不合辛酉宋五遼太平元宋正丁丑二丙午五乙亥七甲戌九癸酉十一壬申朔正丁丑雨水按遼朔考宋九甲戌十一癸酉並不合遼正丁丑二丙午五乙亥七甲戌九癸酉十一壬申十二辛丑朔正丁丑雨水壬戌宋乾興元遼二宋正辛未二庚子五己巳八戊戌十丁酉十二丙申朔按天文志七甲子朔長編及遼朔考宋七戊辰並不合遼同按紀二辛丑五乙亥十癸卯朔朔考儼大任二辛丑並不合癸亥宋仁宗天聖元遼三宋正丙寅二乙未三甲子五癸亥八壬辰十辛酉十二庚申朔閏九九辛卯霜降十辛酉小雪按遼朔考宋七壬戌四史朔閏考五癸未朔並不合遼朔閏同九庚寅霜降十辛酉小雪甲子宋二遼四宋初用崇天術上元甲子以來九千七百五十五萬六千三百四十一年正庚寅二己未三戊子五丁亥七丙戌十乙卯十二甲寅朔按遼朔考宋十二乙卯不合遼仍用賈俊大明術正庚寅二己未三戊子五丁亥七丙戌十乙卯朔
