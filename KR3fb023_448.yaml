body:
  text: 合辛卯五正辛酉三庚申五己未七戊午九丁巳十一丙辰朔壬辰六正乙卯三甲寅六癸未八壬午九辛巳十一庚辰朔閏八八庚戌秋分九辛巳霜降癸巳七正已卯三戊寅五丁丑八丙午十乙巳十二甲辰朔甲午八正甲戌二癸卯四壬寅五辛未八庚子十一己巳朔乙未九正戊辰三丁卯閏四丙寅五乙未七甲午十一癸巳朔四甲子小滿五乙未夏至按通鑑目録十一癸巳作十癸亥不合唐會要閏丁卯朔舊紀閏丁卯日食亦不合今推丙寅朔日食與新紀志舊志合丙申十正壬辰三辛卯五庚寅六己未八戊午十丁巳朔按通鑑目録五庚寅作四庚申不合文德皇后哀册文九月十一日丁酉亦不合丁酉十一正丁亥二丙辰四乙卯六甲寅七癸未九壬午十一辛巳朔按通鑑目録九壬午作八壬子十一辛巳作十二辛巳並不合宋本十一辛巳不訛戊戌十二正辛巳閏二庚辰四己卯五戊申七丁未八丙
