body:
  text: 癸丑晉九秦十五涼二魏五晉魏正丁卯二丙申四乙未六甲午八癸巳十壬辰十二辛卯朔秦同涼亦同甲寅晉十秦十六涼三魏神瑞元晉魏王辛酉二庚寅四已丑七戊午九丁巳十一丙辰朔按宋志九己巳朔不合今推丁巳朔與晉紀志合秦同涼亦同乙卯晉十一秦十七涼四魏二晉魏正乙卯三甲寅四癸丑六壬子九辛巳十一庚辰朔閏三三癸未穀雨四癸丑小滿秦正乙卯三壬寅四癸丑六壬子八辛亥十一庚辰朔閏三三癸未穀雨四癸丑小滿涼正乙卯三甲寅五癸丑六壬子八辛亥十一庚辰朔閏五五辛巳夏至六壬子大暑丙辰晉十二秦後主姚泓永和元涼五魏泰常元晉魏正己卯三戊寅五丁丑七丙子九乙亥十一甲戌朔按北史七辛亥晦不合秦同涼亦同丁巳晉十三秦二涼六魏二晉魏正甲戌二癸卯四壬寅六辛丑八庚子十己亥十二戊戌朔閏十二十二丁卯大寒按通鑑目録十二戊戌作十二戊子宋本不訛秦朔閏並同涼朔同無閏戊午晉義熙十四涼元始七魏泰常三晉魏正丁酉三丙申六乙丑八甲子十癸亥十二壬戌朔正戊戌雨水涼正戊辰二丁酉三丙申六乙丑八甲子十癸亥十二壬戌朔閏二二丙
