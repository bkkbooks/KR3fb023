body:
  text: 庚子晉太康元吳四晉正己丑二戊午四丁巳六丙辰八乙卯十甲寅朔按通鑑目録二戊午作二戊子宋本不訛吳正已丑二戊午四丁巳六丙辰八乙卯十一甲申朔按通鑑目録是年不載吳朔今補辛丑晉太康二正癸未三壬午五辛巳七庚辰九己卯十一戊寅朔壬寅三正丁丑三丙子五乙巳七甲辰九癸卯十一壬寅朔閏四四乙亥小滿五丙午夏至癸卯四正辛丑三庚子五已亥八戊辰十丁卯十二丙寅朔按紀志及宋志通鑑三辛丑朔不合甲辰五正丙申二乙丑四丙子六癸亥八壬戌十辛酉閏十二庚寅朔十二己丑大寒按志正壬辰朔不合乙巳六正庚申二已丑四戊子六丁亥八丙戌十乙酉十二甲申朔正庚申雨水丙午七正甲寅二癸未五壬子七辛亥九庚戌十一己酉朔丁未八正戊申三丁未五丙午八乙亥九甲戌十一癸酉朔閏八八癸卯秋分九甲戌霜降按宋志閏三不合戊申九正壬申三辛未五庚午七已巳九戊辰十二丁酉朔按通鑑目録十二丁酉作十一丁酉宋本不訛
