body:
  text: 二癸亥朔按正元術同舊紀正己亥四丙寅十二甲子朔白居易册新回鶻可汗文四庚寅朔並不合今以正元術推十二癸亥朔與李翱集合壬寅二初用宣明術上元甲子以來七百七萬一百三十九年正癸巳三壬辰四辛酉六庚申七己丑九戊子十一丁巳朔閏十十丁亥小雪十一戊午冬至按通鑑目録六庚申作五庚寅閏十作閏三並不合舊紀六甲戌朔通鑑四丁酉朔亦並不合癸卯三正丁巳二丙戌四乙酉六甲申七癸丑九壬子十一辛亥朔按張九齡碑九癸丑朔不合
