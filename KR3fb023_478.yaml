body:
  text: 皇龍角山慶唐觀紀聖銘九己丑朔舊志會要十丙午朔並不合庚午十八正丙戌三乙酉五甲申七癸丑九壬子十一辛亥朔閏六六癸未大暑七癸丑處暑按通鑑考異引實録正月五日丁巳迎氣東郊與今推十日乙未立春不合辛未十九正庚戌三己酉五戊申七丁未十丙子朔按通鑑目録十二乙亥朔舊紀三乙酉朔並不合壬申二十正乙巳二甲戌四癸酉六壬申八辛未十一庚子朔按通鑑目録十一庚子作十一庚午宋本不訛舊志會要通鑑二癸酉朔不合今推甲戌朔與新紀志合癸酉二十一正庚子二己巳閏三戊辰四丁酉六丙申七乙丑十甲午朔三丁卯穀雨四戊戌小滿按通鑑目録閏三戊辰作四戊戌四丁酉作五丁卯並不合今推四月二日戊戌小滿通鑑目録既以四月為戊戌朔又云四月二日小滿亦不合又會要十己丑朔不合甲戌二十二正甲子二癸巳三壬戌五辛酉六庚寅八己丑十戊子朔按舊紀正癸亥朔不合乙亥二十三正戊午二丁亥四丙戌六乙酉七甲寅九癸丑十一壬子朔閏十一十一辛巳冬至十二壬子大寒按通鑑目録九癸丑作八癸未不合舊紀十一壬申朔亦不合
