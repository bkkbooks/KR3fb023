body:
  text: 癸未二十九十丙寅十二乙丑二甲子五癸巳七壬辰九辛卯朔後九十甲午小雪十二乙丑冬至應閏十甲申三十十庚寅十二己丑二戊子四丁亥七丙辰九乙卯朔乙酉三十一十乙酉十一甲寅正癸丑三壬子五辛亥七庚戌九己酉朔後九七己卯處暑九己酉秋分應閏七丙戌三十二十己酉十一戊寅正丁丑三丙子五乙亥七甲戌九癸酉朔丁亥三十三顓頊術壬申蔀首十癸卯十一壬申二辛丑四庚子六已亥八戊戌朔戊子三十四十丁酉十二丙申二乙未四甲午七癸亥九壬戌朔後九四癸亥小滿六甲午夏至應閏四己丑三十五十辛酉十二庚申二己未四戊午六丁巳八丙辰朔庚寅三十六十丙辰十一乙酉正甲申三癸未五壬午七辛巳九庚辰朔辛卯三十七十庚戌十一己卯二戊申四丁未六丙午八乙巳後九甲辰朔十二丁丑大寒二戊申驚蟄應閏十二壬辰二世元十甲戌十一癸卯端壬寅三辛丑六庚午八己巳朔按史月表二世二年三年正月並作端月蓋二世所改索隱日秦諱正謂之端月
