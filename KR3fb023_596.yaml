body:
  text: 按此術盈縮遲疾諸率無考今求定朔借崇天術日躔月離二表化分擬數推之遼朔考宋十二己丑不合今推戊子朔與紀丙申濬河長編作九日合遼仍用賈俊大明術正癸巳四壬戌五辛酉八庚寅十己丑十二戊子閏四四辛卯小滿五辛酉夏至丙辰宋九遼二宋正戊午二丁亥三丙辰六乙酉八甲申十一癸丑朔按夢溪筆談熙寧十年天正元用午時新術改用子時遼同丁巳宋十遼三宋正壬子三辛亥四庚辰六己卯八戊寅十二丁丑朔遼正壬子三辛亥四庚辰六己卯八戊寅十二丁丑朔閏十二十二乙巳大寒按宋蘇頌傳此年使契丹遇冬至其國曆後宋曆一日今推趙知微術十一月草七日甲戌冬至與宋同蓋賈俊術乙亥冬至也趙知微術閏明年正月正乙亥雨水二丙午春分今進為丙子雨水使與閏十二相合戊午宋元豐元遼四宋正丁未閏正丙子三乙亥四甲辰六癸卯八壬寅十一辛未朔正乙亥雨水二丙午春分按宋大詔令閏九遼朔考宋閏五丙子薛鑑正庚申朔並不合夢溪筆談熙寧十年閏十二月奉元術改為閏正月四夷朝貢用舊曆遼正丙子三乙亥四甲辰六癸卯八壬寅十
