body:
  text: 十二乙巳朔按通鑑目録十丙午作九丙子不合舊紀十壬子朔亦不合丁未三正乙亥四甲辰六癸卯七壬申九辛未十一庚午十二己巳朔閏十一十一戊戌冬至十二己巳大寒按通鑑考異引薛居正五代史梁紀十二月後有閏月又引實録閏十二庚子朔並不合今推閏十一與通鑑考異引妖亂志十國紀年合司馬霜殘幢歲次丁亥十二月己巳朔今考有唐一代丁亥年十二月無己巳朔疑即此丁未年之訛戊申文德元正己亥三戊戌五丁酉七丙申九乙未十一甲午朔按通鑑考異引舊紀四壬午朔又引妖亂志四癸未朔並不合今本舊紀四戊辰朔合己酉昭宗龍紀元正癸巳三壬辰六辛酉八庚申十己未十二戊午朔庚戌大順元正戊子二丁巳四丙辰六乙卯八甲寅十癸未十二壬午朔閏九九癸丑霜降十甲申小雪辛亥二正壬子二辛巳四庚辰五己酉七戊申十一丁未朔按舊紀九丁未十丁丑十二丙子朔並不合壬子景福元正丙午三乙巳四甲戌六癸酉八壬申十一辛丑朔按通鑑目録四甲戌作五甲辰不合
