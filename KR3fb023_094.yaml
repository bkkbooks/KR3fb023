body:
  text: 丁卯十三魯十五正建子丁巳三丙辰五乙卯七甲寅九癸丑十一壬子朔杜氏長術正丁巳三丙辰五乙卯七甲寅九癸丑十一壬子十二辛亥朔閏十一戊辰十四魯十六正建子辛亥三庚戌六己卯七戊寅九丁丑十一丙子朔閏六六戊申小滿七己卯夏至杜氏長術正辛巳二庚戌四己酉六戊申八丁未十丙午十二乙巳朔己巳十五魯十七正建子乙亥三甲戌五癸酉七壬申十辛丑十二庚子朔杜氏長術正乙亥二甲辰四癸卯七壬申九辛未十一庚午朔庚午十六魯十八正建子庚午二己亥四戊戌六丁酉八丙申十乙未十二甲午朔杜氏長術正己巳三戊辰五丁卯八丙申十乙未十二甲午朔辛未十七魯成公元正建子甲子閏二癸亥四壬戌六辛酉八庚申十己未十二戊午朔二壬戌大寒三癸巳驚蟄杜氏長術正甲子二癸巳閏三壬辰五辛卯八庚申十己未十二戊午朔按外紀目録十二戊午作十二戊辰乃刊本之訛壬申十八魯二正建子戊子二丁巳五丙戌七乙酉九甲申十一癸未朔杜氏長術同癸酉十九魯三正建子壬午三辛巳五庚辰七己卯十戊申十一丁未朔閏十十丙子秋分十一丁未霜降杜氏長術正壬午四
