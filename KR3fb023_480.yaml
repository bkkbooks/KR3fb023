body:
  text: 丙子二十四正辛巳四庚戌六己酉七戊寅九丁丑十一丙子朔丁丑二十五正乙亥五甲戌七癸酉九壬申十辛丑十二庚子朔按通鑑目錄九壬申作八壬寅不合孫逖冊潁王獨孤妃文七月辛巳朔十日辛卯亦不合戊寅二十六正庚午二己亥五戊辰八丁酉九丙申十乙丑十二甲子朔閏八八丙寅秋分九丙申霜降按通鑑目錄八丁酉作七丁卯九丙申作閏七丙申不合又云八月二日秋分與今推三十日丙寅秋分亦不合又今推八丁酉朔與孫逖冊永甯公主文合閏八與任城橋亭記合又冊忠王爲皇太子文七月戊寅朔不合己卯二十七正甲午二癸亥四壬戌七辛卯九庚寅十一己丑朔庚辰二十八正戊子三丁亥五丙戌七乙酉十甲寅十二癸丑朔辛巳二十九正癸未三壬午四辛亥五庚戌七己酉十戊寅朔閏四四庚辰小滿五庚戌夏至按舊紀四庚戌朔不合攷此年正癸未朔見冊府元龜二癸丑朔見裴道安墓志閏四辛巳朔見洞淸觀鐘款皆與今所推合壬午天寶元正丁未三丙午四乙亥六甲戌七癸卯十壬
