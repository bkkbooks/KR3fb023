body:
  text: 丙子二十九正庚申二己丑三戊午五丁巳七丙辰十乙酉朔丁丑三十正甲寅三癸丑五壬子六辛巳七庚戌十己卯朔戊寅三十一正己酉二戊寅四丁丑閏五丙子六乙巳七甲戌九癸酉朔五乙亥夏至六乙巳大暑己卯惠帝建文元正壬申四辛丑六庚子七己巳八戊戌十丁酉朔庚辰二正丙寅五乙丑六甲午八癸巳九壬戌十一辛酉朔按國榷十一壬戌朔不合今推辛酉朔與成祖實録合辛巳三正辛酉二庚寅四己未六戊午八丁巳十丙辰十一乙酉朔閏三三己丑穀雨四己未小滿按成祖實録正辛卯六戊申十一己酉朔並訛壬午四正甲申四癸丑七壬午九辛巳十一庚辰朔癸未成祖永樂元正己卯二戊申四丁未七丙子十乙巳閏十一甲辰朔十一癸卯冬至十二甲戌大寒甲申二正癸卯二壬申四辛未六庚午九己亥十二戊辰朔乙酉三正戊戌二丁卯三丙申五乙未七甲午九癸巳
