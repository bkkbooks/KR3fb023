body:
  text: 十一庚寅朔閏十二十二己丑大寒按舊紀十二庚辰朔不合己丑十正己未四戊子六丁亥八丙戌九乙卯十一甲寅朔正庚子雨水庚寅十一正甲寅二癸未五壬子七辛亥九庚戌十己卯十二戊寅朔辛卯十二正戊申二丁丑五丙午七乙巳閏八甲辰十癸卯十二壬寅朔八癸卯秋分九甲戌霜降按顧雲題致仕武賓客嵩山舊隱詩序律中林鍾十二丙寅不合壬辰十三正壬申二辛丑四庚子七己巳九戊辰十一丁卯朔按舊紀正壬寅朔不合癸巳十四正丙寅三乙丑五甲子七癸亥十壬辰朔按顧謙墓志十一月二十四日乙卯不合甲午僖宗乾符元正辛酉二庚寅四己丑五戊子六丁巳九丙戌十二乙卯朔閏四四丁巳小滿五戊子夏至乙未二正乙酉三甲申四癸丑六壬子七辛巳九庚辰朔丙申三正己卯四戊申五丁丑六丙午八乙巳十甲辰朔丁酉四正癸酉三壬寅五辛丑七庚子八己巳十戊辰十二丁卯朔閏二二壬申春分三壬寅穀雨
