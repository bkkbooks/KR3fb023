body:
  text: 丙午二十正甲子三癸亥四壬戌六辛酉八庚申十己未朔閏三三辛卯穀雨四壬戌小滿按通鑑目録脫十己未朔丁未二十一正戊子三丁亥五丙戌七乙酉九甲申十一癸未朔戊申二十二正壬午三辛巳六庚戌八己酉十戊申十二丁未朔閏十二十二丙子大寒己酉二十三正丙午三乙巳五甲辰八癸酉十壬申十二辛未朔正丙午啓蟄按通鑑目録正月二日雨水與今推一日丙午啓蟄十七日壬戌雨水不合庚戌高宗永徽元正辛丑二庚午四己巳六戊辰八丁卯十丙寅朔辛亥二正乙未三甲午五癸巳七壬辰九辛卯十庚寅十二己丑朔閏九九庚申霜降十辛卯小雪壬子三正己未二戊子五丁巳七丙辰九乙卯十一甲寅朔癸丑四正癸丑三壬子五辛亥八庚辰十己卯十二戊寅朔甲寅五正戊申二丁丑四丙子閏五乙亥七甲戌九癸酉十二壬寅朔五甲戌夏至六乙巳大暑乙卯六正壬申二辛丑四庚子六己亥八戊戌十丁酉
