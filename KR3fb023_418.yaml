body:
  text: 術正辛亥三庚戌五己酉八戊寅十丁丑十二丙子朔西魏仍用正光術同北齊仍用興和術亦同辛未梁二魏十七齊天保二梁仍用大明術正丙午二乙亥閏三甲戌五癸酉七壬申九辛未十二庚子朔三癸酉穀雨四甲辰小滿按本紀南史閏四又本紀六甲辰朔並不合西魏仍用正光術正丙午二乙亥四甲戌五癸酉七壬申十辛丑十二庚子朔閏四四癸卯小滿五甲戌夏至北齊初用天保術上元甲子以來十一萬五百二十八年正丙午二乙亥三甲戌五癸酉七壬申九辛未十二庚子朔閏二二甲辰春分三甲戌穀雨按本紀閏四不合壬申梁元帝承聖元魏廢帝元齊三梁正庚午二己亥四戊戌六丁酉八丙申十乙未十二甲午朔魏同齊亦同癸酉梁二魏二齊四梁正甲子三癸亥五壬戌七辛酉九庚申十一己未十二戊午朔閏十一十一丁亥冬至十二戊午大寒按通鑑目録十二戊午作閏十二戊午不合通鑑閏十亦不合魏正甲子三癸亥五壬戌七辛酉九庚申十一己未閏十二戊午朔十二丁巳大寒齊朔閏與梁同十一戊子冬至十二戊午大寒甲戌梁三魏恭帝元齊五梁正戊子二丁巳四丙辰七乙酉九甲申十一癸未朔魏同正戊子雨水按通鑑目録此年脫
