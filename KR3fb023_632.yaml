body:
  text: 不合庚子宋七金二十宋正甲寅二癸未五壬子七辛亥九庚戌十一己酉朔按宋文公集祭敬夫文六月癸未朔六日丁亥癸未乃月建又語孟要義後序十一月己丑朔蓋十二月之訛己丑亦月建也金同按紀正庚申朔又交聘表三見並不合辛丑宋八金二十一宋正戊申三丁未四丙午七乙亥九甲戌十一癸酉朔閏三三丙子穀雨四丁未小滿金同壬寅宋九金二十二宋仍用淳熙術正壬申三辛未五庚午七己巳十戊戌十二丁酉朔金初用趙知微重修大明術上元甲子以來五千二百四十二萬一千九百七十九年朔同癸卯宋十金二十三宋正丁卯二丙申四乙未五甲子七癸亥十壬辰十二辛酉朔閏十一十一庚寅冬至十二辛酉大寒金同按靖康紀聞金閏八不合甲辰宋十一金二十四宋正辛卯二庚申四己未五戊子七丁亥九丙戌朔金正辛卯二庚申四己未五戊子七丁亥十丙辰朔乙巳宋十二金二十五宋正乙酉三甲申五癸未六壬子八辛亥十庚戌朔金同
