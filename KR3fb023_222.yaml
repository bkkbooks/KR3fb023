body:
  text: 辰冬至應閏十按通鑑目録五壬申作四壬寅不合庚子三殷十庚午十一已亥正戊戌三丁酉五丙申七乙未九甲午朔按通鑑目録十一己亥作十己巳乃與顓頊術互訛宋本作十一己巳亦訛顓十己巳十二戊辰二丁卯四丙寅七乙未九甲午朔按通鑑目録十己巳作十一己亥乃與殷術互訛宋本作十已亥亦訛歷代長術輯要卷三
