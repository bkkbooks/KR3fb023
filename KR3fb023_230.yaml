body:
  text: 七辛亥九庚戌朔後九十甲寅小雪十二乙酉冬至應閏十顓十乙酉十二甲申二癸未四壬午六辛巳八庚辰後九已卯朔十癸丑小雪十二甲申冬至應閏十按律曆志十一甲申朔旦冬至與顓十二甲申朔冬至合五行志十一癸丑晦亦指十二月以十一月爲閏十月也己未元狩元殷十己酉十二戊申二丁未五丙子七乙亥九甲戌朔顓十己酉十二戊申二丁未四丙午六乙巳八甲辰朔按漢本紀五行志五乙巳晦與殷合庚申二殷十甲辰十一癸酉正壬申三辛未五庚午七己巳後九戊戌朔六戊辰大暑八己亥處暑應閏六顓十癸卯十二壬寅三辛未五庚午七己巳九戊辰朔後九七戊戌處暑九戊辰秋分應閏七辛酉三殷十戊辰十一丁酉正丙申三乙未五甲午七癸巳九壬辰朔顓十丁卯十二丙寅二乙丑四甲子七癸巳九壬辰朔壬戌四殷十壬戌十二辛酉二庚申四己未六戊午八丁巳朔顓十壬戌十一辛卯正庚寅三己丑五戊子七丁亥九丙戌朔癸亥五殷十丙辰十二乙卯二甲寅五癸未七壬午九辛巳朔後九三癸丑淸明五癸未小滿應閏三顓十丙辰十二乙卯
