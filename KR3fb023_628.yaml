body:
  text: 十月二日甲午不合戊子宋四金八宋初用乾道術上元甲子以來九千一百六十四萬五千八百二十五年正甲子三癸亥四壬辰六辛卯七庚申九己未十戊子朔按是年參用紀元術朔同二術十月朔並當進為己丑當時應進失進故十月以後連四大金仍用楊級大明術正甲子三癸亥四壬辰六辛卯七庚申九己未十一戊午朔按四史朔閏考七辛酉朔不合己丑宋五金九宋正戊午三丁巳五丙辰七乙卯八甲申十癸未十二壬午朔金同庚寅宋六金十宋正壬子四辛巳閏五庚辰七已卯八戊申十丁未十二丙午朔五己卯夏至六庚戌大暑按程洵董府君墓表閏十周必大奏事録四月六日丁亥並不合金同辛卯宋七金十一宋正丙子三乙亥六甲辰八癸卯九壬申十一辛未朔按畢鑑三己亥朔不合金同壬辰宋八金十二宋正庚午三己巳六戊戌八丁酉十丙申十二乙未朔金同癸巳宋九金十三宋正乙丑閏正甲午三癸巳五壬辰八辛酉十庚申十二己未朔正癸巳雨水二甲子春分按畢鑑十二乙未朔不合金同
