body:
  text: 不合丙寅孺子嬰王莽君攝元正庚寅三己丑五戊子七丁亥九丙戌十一乙酉朔丁卯二正乙酉二甲寅四癸丑六壬子八辛亥十庚戌十二己酉朔戊辰始初元正己卯閏正戊申四丁丑六丙子八乙亥十甲戌朔正丁未驚蟄二戊寅春分按明年改用丑正故此年終于十一月王莽傳十一月壬子冬至合通鑑目録四丁丑作三丁未不合己巳新主王莽始建國元仍用太初術更名三統術正陶癸酉三壬申五辛未七庚午十己亥十二戊戌朔按是年始改用丑正庚午二正建丑戊辰二丁酉四丙申六乙未八甲午十癸巳十一壬辰朔閏十十辛酉霜降十一壬辰小雪按通鑑目録十一壬辰作閏十壬辰乃誤閏夏正十月也辛未三正建丑壬辰二辛酉四庚申六己未八戊午十丁巳十二丙辰朔壬申四正建丑丙戌二乙卯五甲申七癸未九壬午十一辛巳朔按此丑正五月甲申朔通鑑目録作寅正三月甲寅朔不合
