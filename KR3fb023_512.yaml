body:
  text: 寅朔按通鑑目録十辛卯作九辛酉宋本不訛戊午三正庚申二己丑四戊子五丁巳七丙辰十乙酉朔按通鑑目録七丙辰作八丙戌宋本不訛李商隱奠令狐公文戊午歲丁未朔乙亥晦亦不合己未四正甲寅二癸丑四壬子五辛巳七庚辰九己卯朔閏正正壬午雨水二癸丑春分按舊紀二癸酉五辛丑朔並不合庚申五正戊寅三丁丑五丙子六乙巳八甲辰十癸卯朔辛酉武宗會昌元正癸酉二壬寅四辛丑六庚子七己巳八戊戌閏九丁酉朔九丙申霜降十丁卯小雪按舊紀正壬寅朔新志閏八並不合今推閏九與舊志合壬戌二正丙申四乙丑六甲子七癸巳八壬戌十辛酉十二庚申朔癸亥三正庚寅四己未六戊午八丁巳十丙辰十一乙酉朔按通鑑目録脫十丙辰三字處士包公夫人墓志十二月十二日丙申不合甲子四正乙酉二甲寅五癸未七壬午八辛巳十庚辰十一己酉朔閏七七辛亥處暑八壬午秋分按通鑑目録十庚辰作九庚辰宋本不訛會要三甲寅朔不合乙丑五正己酉二戊寅四丁丑六丙子九乙巳十一甲
