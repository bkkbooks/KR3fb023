body:
  text: 甲戌宋七遼六宋正庚戌四己卯五戊申七丁未八丙子十乙亥十二甲辰朔閏十十甲辰小雪十一乙亥冬至按遼朔攷宋閏十己巳不合遼同乙亥宋八遼七宋正甲戌三癸酉五壬申七辛未八庚子十己亥十二戊戌朔按長編遼朔攷宋十二己亥不合龍興寺東塔記四月辛巳朔二十九日辛未辛巳乃月建也遼同丙子宋太宗太平興國元遼八宋正戊辰四丁酉六丙申八乙未九甲子十一癸亥朔按遼朔攷宋四丁卯五丁酉七乙未八乙丑十癸亥十一癸巳十二癸亥並不合遼同丁丑宋二遼九宋正壬戌四辛卯七庚申八己未十戊子十一丁亥朔閏七七己丑處暑八己未秋分遼同戊寅宋三遼十宋正丙戌三乙酉六甲寅八癸丑十一壬午朔按長編七乙酉九甲申遼朔攷宋大詔令十一癸未朔並不合今推十一壬午朔與本紀丙申祀圜丘太常因革禮作十五日合遼同己卯宋四遼乾亨元宋正辛巳二庚戌四己酉六戊申九丁丑十二丙午朔按遼朔攷宋二辛亥六己酉長編十二丁未朔並不合遼同庚辰宋五遼二宋正丙子二乙巳三甲戌四癸酉六壬申
