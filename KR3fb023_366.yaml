body:
  text: 八月一日秋分與今推二日庚申秋分不合秦同甲午晉十九秦文桓帝姚興皇初元晉正丁亥二丙辰四乙卯六甲寅九癸未十一壬午朔秦同乙未晉二十秦二晉正辛巳三庚辰五已卯七戊寅九丁丑十二丙午朔秦正辛巳三庚辰五已卯七戊寅九丁丑十一丙子朔丙申晉二十一秦三晉正丙子二乙巳閏三甲辰五癸卯七壬寅九辛丑十一庚子朔三癸卯穀雨四甲戌小滿按通鑑目録閏三甲辰作四甲辰五癸卯作閏五癸卯並不合秦同丁酉晉安帝隆安元秦四晉正已亥四戊辰六丁卯八丙寅十乙丑十二甲子朔按通鑑目録正己亥作二已巳不合秦同戊戌晉隆安二秦皇初五北魏道武帝天興元晉魏同用景初術正甲午二癸亥四壬戌六辛酉九庚寅十一已丑十二戊子朔閏十一十一丁巳冬至十二戊子大寒按通鑑目録十二戊子作閏十二戊子不合秦仍用三紀甲子元術同已亥晉三秦宏始元魏二晉魏正戊午二丁亥四丙戌六乙酉八甲申十一癸丑朔秦正戊午二丁亥四丙戌六乙酉八甲申十癸未朔庚子晉四秦二魏三晉魏正壬子三辛亥五庚戌七已酉九
