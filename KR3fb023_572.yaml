body:
  text: 己酉宋二遼二十七宋正丁巳三丙辰五乙卯六甲申八癸未九壬子十二辛巳朔遼同按朔攷云儼七甲申誤庚戌宋三遼二十八宋正辛亥三庚辰五己卯六戊申八丁未九丙子十二乙巳朔閏二二庚戌春分三庚辰穀雨按遼朔攷宋五乙卯不合遼朔閏同二己酉春分三庚辰穀雨按趙知微術閏三三己卯穀雨四庚戌小滿今進爲庚辰穀雨使與閏二相合辛亥宋四遼二十九宋正乙亥三甲戌六癸卯七壬申九辛未十庚子朔按禮志閏三不合遼同壬子宋五遼開泰元宋正己巳三戊辰六丁酉八丙申十乙未十一甲午朔閏十十甲子小雪十一甲午冬至按遼朔攷宋閏十己丑不合遼正己巳四戊戌六丁酉八丙申十乙未十一甲午朔閏十十癸巳小雪十一甲午冬至按趙知微術閏十一十一癸巳冬至十二甲子大寒今進爲甲午冬至使與閏十相合紀十甲午朔不合癸丑宋六遼二宋正癸巳三壬辰五辛卯八庚申十己未十二戊午朔遼同甲寅宋七遼三宋正戊子二丁巳三丙戌六乙卯八甲寅十一癸未朔按遼朔攷宋五乙酉不合遼同按紀五乙酉朔朔攷大任五乙酉不合
