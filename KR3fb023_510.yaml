body:
  text: 子雨水不合奚敬元史周試碑二月十五日甲午亦不合壬子六正乙未二甲子四癸亥六壬戌七辛卯九庚寅十一己丑朔按釋匡白東領寺白氏文集記大和六年歲次甲午八月己巳朔舛訛舊紀十庚子朔不合癸丑七正己丑三戊子五丁亥七丙戌閏七乙卯八甲申十癸未朔七癸丑處暑八甲申秋分按通鑑目録閏七乙卯作八乙卯八甲申作閏八甲申又云閏一日秋分並不合今推閏七與新舊紀合八甲申朔與舊紀及册魯王為皇太子文合又舊紀正乙丑朔不合甲寅八正癸丑二壬午五辛亥六庚辰八己卯十戊寅十一丁未朔按通鑑目録六庚辰作七庚戌不合舊紀九乙酉繫不合乙卯九正丁未二丙子五乙巳七甲辰九癸卯十一壬寅朔按舊紀七甲申朔不合丙辰開成元正辛丑三庚子五己亥六戊戌九丁卯十一丙寅朔閏五五戊辰夏至六己亥大暑按六戊戌本當進為己亥朔當時應進失進舊紀五乙亥朔會要正丙辰朔潘圖劉源墓志十二月庚寅朔十九日甲寅並不合丁巳二正乙丑三甲子五癸亥七壬戌十辛卯十二庚
