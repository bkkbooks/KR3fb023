body:
  text: 己酉元延元正己亥二戊戌四丁酉六丙申八乙未十甲午朔閏正正丁卯驚蟄二戊戌春分庚戌二正癸亥三壬戌五辛酉七庚申九己未十一戊午朔辛亥三正丁巳三丙辰六乙酉八甲申十癸未十一壬午朔閏十十壬子小雪十一壬午冬至壬子四正辛巳三庚辰五己卯八戊申十丁未十二丙午朔按通鑑目録八戊申作七戊寅不合癸丑綏和元正丙子二乙巳四甲辰六癸卯八壬寅十辛丑朔甲寅二正庚午三己巳五戊辰七丁卯八丙寅十乙丑十二甲子朔閏七七丙申處暑八丁卯秋分按通鑑目録閏七作閏三五戊辰作四戊辰七丁卯作六丁卯並不合又失書中氣宋本不訛亦失書中氣乙卯哀帝建平元正甲午三癸巳五壬辰七辛卯九庚寅十一己丑朔按通鑑目録三癸巳作二癸亥不合丙辰二正戊子三丁亥五丙戌八乙卯十甲寅十二癸丑朔按五行志四乙亥朔不合丁巳三正癸未二壬子閏三辛亥五庚戌七己酉九戊申十二丁丑朔三庚戌淸明四辛巳小滿
