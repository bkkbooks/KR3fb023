body:
  text: 丁丑朔丙寅漢九魏七吳九漢正丁丑二丙午五乙亥七甲戌九癸酉十一壬申十二辛未朔閏十一十一庚子冬至十二辛未大寒按通鑑目錄十二辛未作閏十二辛未不合魏正丙子三乙亥五甲戌八癸卯十壬寅十二辛丑朔閏十二十二庚午大寒吳正丙子三乙亥六甲辰八癸卯十壬寅十二辛丑朔閏十二十二庚午大寒按通鑑目錄云吳朔與魏同不合丁卯漢十魏八吳十漢正辛丑二庚午四已巳七戊戌九丁酉十一丙申朔魏正庚子三已亥五戊戊七丁酉九丙申十二乙丑朔正庚子雨水吳正庚子三巳亥五戊戌七丁酉九丙申十二乙丑朔正辛丑雨水戊辰漢十一魏九吳十一漢正乙未三甲午五癸巳七壬辰九辛卯十二庚申朔魏正乙未二甲子四癸亥六壬戌八辛酉十庚申十二己未朔按晉志十二戊午晦不合今推戊子晦與宋志合吳與魏同己巳漢十二魏嘉平元吳十二漢正庚寅二己未四戊午六丁巳八丙辰九乙卯十一甲寅朔閏八八乙酉秋分九乙卯霜降魏正已丑二戊午五丁亥七丙戌九乙酉十甲申十二癸未朔閏九九甲寅霜降十乙酉小雪按通鑑目錄九乙酉作閏八乙酉又云九月一日霜降與今推閏九九月三十日甲寅霜
