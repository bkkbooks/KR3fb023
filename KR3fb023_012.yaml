body:
  text: 丁卯唐昭宣帝天祐四年後梁太祖開平元年至丙午宋欽宗靖康元年金太宗天會四年凡二百二十年卷九丁未宋高宗建炎元年金太宗天會五年至丁未元順帝至正二十七年凡二百四十一年卷十戊申元順帝至正三十八年明太祖洪武元年至庚戌大清聖祖仁皇帝康熙九年凡三百三年附録一古今推步諸術考上附録二古今推步諸術考下余自道光余自道光丙申夏推算厯代長術上起共和下與欽天監頒行萬年書相接各就當時行用本法每年詳列朔閏月建大小并二十四氣略如萬年書之式至同治壬戌夏始寫定為五十卷附以古今推步諸術致二卷甲子紀元表一卷凡五十三卷丙寅夏吾友獨山莫君子偲見之謂此書為人之斫不為可以專門名家而惜其卷帙過繁宜別為簡要之本庶便於謄寫刊刻因以市歲之功刪繁
