body:
  text: 烏程汪曰楨戊申元至正二十八明太祖洪武元明仍用授時術更名大統術正壬申三辛未五庚午七己巳九戊戌十二丁卯朔閏七七戊戌處暑八己巳秋分按明初以馬沙亦黑回回土盤術與大統術參用迄於明亡己酉明洪武二正丙申三乙未五甲午六癸亥九壬辰朔庚戌三正辛卯二庚申四己未六戊午七丁亥九丙戌朔按談遷國榷二辛酉朔不合辛亥四正乙酉閏三甲寅四癸未五壬子七辛亥九庚戌朔三壬子穀雨四癸未小滿壬子五正巳酉三戊申五丁未六丙子八乙亥十甲戌朔癸丑六正癸卯四壬申六辛未七庚子九己亥十一戊戌十二丁酉朔閏十一十一丙寅冬至十二丁酉大寒甲寅七正丁卯四丙申六乙未七甲子九癸亥十一壬戌朔乙卯八正辛酉四庚寅六己丑八戊子十丁亥十二丙戌朔丙辰九正丙辰二乙酉四甲申七癸丑九壬子十辛亥
