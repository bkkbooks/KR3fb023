body:
  text: 九百一年正癸酉二壬寅四辛丑六庚子九己巳十一戊戌朔閏十十戊辰小雪十一戊戌冬至按通鑑目錄十一戊戌作閏十一戊戌又云閏一日冬至不合乙丑貞元元正丁酉二丙寅四乙丑六甲子八癸亥十二壬戌朔丙寅二正壬辰二辛酉三庚寅五己丑六戊午八丁巳十二丙辰朔按新舊志八辛巳朔不合丁卯三正丙戌三乙酉五甲申閏五癸丑六壬午八辛巳十二庚辰朔五辛亥夏至六壬午大暑戊辰四五庚戌三己酉四戊寅六丁丑七丙午九乙巳十二甲戌朔按舊志八辛卯朔不合己巳五正甲辰三癸卯五壬寅七辛丑八庚午十己巳十二戊辰朔按舊紀正壬辰朔不合庚午六正戊戌四丁卯五丙寅七乙丑八甲午十癸巳十二壬辰朔閏四四丙申小滿五丁卯夏至按舊紀正戊辰朔冊府元龜正癸卯朔並不合辛未七正壬戌三辛酉五庚申八己丑十戊子十一丁巳朔按舊紀六庚子朔不合壬申八正丙辰三乙卯六甲申八癸未十一壬子閏十二辛亥朔十二庚戌大寒
