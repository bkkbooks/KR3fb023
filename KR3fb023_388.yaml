body:
  text: 暑七壬寅處暑甲午宋孝武帝孝建元魏興光元宋正已亥二戊辰四丁卯六丙寅八乙丑十甲子十二癸亥朔按建康實録正乙亥朔不合今推已亥朔與宋紀合宋志七丙戌朔亦不合魏同乙未宋二魏太安元宋正癸巳二壬戌五辛卯七庚寅九已丑十以戊子朔按建康實録二已巳九已巳朔並不合今推九己丑朔與宋志合魏正癸巳二壬戌四辛酉七庚寅九已丑十一戊子朔丙申宋三魏二宋正丁亥三丙戌四乙酉六甲申九癸丑十一壬子朔閏三三乙卯穀雨四乙酉小滿按宋志閏二不合魏正丁亥閏二丙戌四乙酉六甲申九癸丑十一壬子朔二乙酉春分三丙辰穀雨丁酉宋大明元魏三宋正辛亥三庚戌五巳酉七戊申九丁未十一丙午朔按南史正乙亥朔不合今推辛亥朔與宋紀合魏同戊戌宋二魏四宋正丙午二乙亥四甲戌六癸酉八壬申十辛未十二庚午朔閏十二十二己亥大寒按爨龍顏碑九壬子朔宋志十一乙丑朔並不合魏正丙午二乙亥四甲戌六癸酉八壬申十辛未十一庚午朔閏十十己亥小雪十
