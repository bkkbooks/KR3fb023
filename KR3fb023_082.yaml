body:
  text: 丙申二十七魯二正建子丁亥二丙辰四乙卯六甲寅八癸丑十壬子朔杜氏長術正丁巳閏正丙戌四乙卯六甲寅八癸丑十壬子十二辛亥朔丁酉二十八魯三正建子辛巳三庚辰五己卯七戊寅九丁丑十一丙子朔杜氏長術正辛巳二庚戌五己卯七戊寅九丁丑十一丙朔戊戌二十九魯四正建子乙亥三甲戌六癸卯閏七壬寅九辛丑十一庚子朔七辛丑夏至八壬申大暑杜氏長術正乙亥三甲戌六癸卯七壬寅九辛丑十一庚子朔閏六按外紀目録九辛丑作九丁丑乃刊本之訛己亥三十魯五正建子己亥三戊戌五丁酉八丙寅十乙丑十二甲子朔杜氏長術正己亥四戊辰六丁卯八丙寅十乙丑十二甲子朔庚子三十一魯六正建子甲午二癸亥四壬戌六辛酉八庚申十己未朔杜氏長術正甲午二癸亥四壬辰七辛卯九庚寅十一己丑閏十二戊子朔辛丑三十二魯七正建子戊子三丁亥四丙戌六乙酉八甲申十癸未十二壬午朔閏三三乙卯驚蟄四丙戌春分杜氏長術正戊午三丁巳五丙辰七乙卯九甲寅十一癸丑朔壬寅三十三魯八正建子壬子三辛亥五庚戌七己酉九戊申
