body:
  text: 十二壬寅朔杜氏長術正戊寅三丁丑六丙午八乙巳十甲辰十二癸卯朔己酉匡王元魯十五正建子壬申二辛丑四庚子閏五己亥七戊戌九丁酉十一丙申朔五戊戌淸明六己巳小滿杜氏長術正癸酉二壬寅四辛丑七庚午九己巳十一戊辰朔庚戌二魯十六正建子丙申二乙丑四甲子六癸亥八壬戌十辛酉十二庚申朔杜氏長術正丁卯三丙寅五乙丑六甲子八癸亥十壬戌十二辛酉朔閏五辛亥三魯十七正建子庚寅二己未四戊午七丁亥九丙戌十一乙酉朔杜氏長術正辛卯二庚申四己未六戊午八丁巳十丙辰十二乙卯朔按今本釋例十丙辰誤作十一丙戌今從外紀目録改正壬子四魯十八正建子甲申二癸未四壬午六辛巳九庚戌十一己酉朔閏正正壬子冬至二癸未大寒杜氏長術正乙酉二甲寅四癸丑六壬子八辛亥十庚戌十二己酉朔癸丑五魯宣公元正建子戊申三丁未五丙午七乙巳九甲辰十一癸卯朔杜氏長術正己卯二戊申五丁丑七丙子九乙亥十一甲戌朔甲寅六魯二正建子癸卯二壬申四辛未六庚午八己巳十戊辰十一丁卯朔閏十十丁酉秋分十一丁卯霜降杜氏長術正癸
