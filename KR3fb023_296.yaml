body:
  text: 巳朔辛巳六正丙辰二乙卯五甲申七癸未九壬午十一辛巳朔閏正正乙酉雨水二乙卯春分壬午漢安元正庚辰三己卯五戊寅七丁丑十丙午十二乙巳朔癸未二正乙亥二甲辰四癸卯六壬寅八辛丑十庚子十二己巳朔閏十十已巳小雪十一庚子冬至甲申建康元四分術庚子蔀首正己亥二戊辰四丁卯六丙寅八乙丑十甲子十二癸亥朔乙酉沖帝永憙元正癸巳二壬戌五辛卯七庚寅九己丑十一戊子朔丙戌質帝本初元正丁亥三丙戌五乙酉閏六甲申九癸丑十一壬子朔六癸未大暑七甲寅處暑歷代長術輯要卷四
