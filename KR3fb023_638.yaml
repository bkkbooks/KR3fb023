body:
  text: 鑑十一月癸卯日南至與今推五日甲辰冬至不合金同戊午宋四金三宋正己亥三戊戌六丁卯八丙寅十乙丑十一甲午朔按紀八丁卯朔不合金正己亥三戊戌六丁卯八丙寅十乙丑十二甲子朔己未宋五金四宋初用統天術上元甲子至紹熙甲寅三千八百三十一年紹熙甲寅距此五年正癸巳四壬戌六辛酉九庚寅十一己丑朔按慶元黨禁九月十一日甲子不合乃明年九月耳金仍用重修大明術同庚申宋六金五宋正戊子二丁巳三丙辰五乙卯八甲申十一癸丑朔閏二二乙酉春分三丙辰穀雨金同辛酉宋嘉泰元金泰和元宋正壬子三辛亥四庚辰六己卯八戊寅十二丁丑朔按四史朔閏考二月八日春分見石刻與今推九日庚寅春分不合金同壬戌宋二金二宋正丁未二丙子四乙亥五甲辰七癸卯八壬申十二辛未朔閏十二十二庚子大寒金同癸亥宋三金三宋正辛未二庚子四己亥五戊辰七丁卯八丙申十一乙丑朔正辛未雨水按畢鑑五戊寅朔不合四史朔閏考十一月甲戌冬至亦不合今推十一日乙亥冬至與紀乙亥圜丘合數書九章云開禧術冬至乙亥
