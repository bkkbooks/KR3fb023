body:
  text: 未十二甲午朔閏三三戊辰穀雨四乙亥小滿按通鑑目録四月一日小滿與今推二日己亥小滿不合舊紀九甲子朔亦不合丁丑二正甲子二癸巳四壬辰七辛酉九庚申十一己未朔戊寅三正戊午三丁巳五丙辰七乙卯十甲申閏十一癸未朔十一壬午冬至十二癸丑大寒按通鑑目録正戊午作二戊子不合舊紀閏十亦不合今推閏十一與新紀合己卯調露元正壬午三辛巳四庚戌六己酉九戊寅十二丁未朔按通鑑目録四庚戌作五庚辰不合今推四庚戌朔與朱懷隱棲霞寺碑合庚辰永隆元正丁丑二丙午四乙巳五甲戌七癸酉九壬申朔按舊志會要十一壬寅朔不合今推壬申朔與新紀志合辛巳開耀元正辛未三庚午五己巳六戊戌閏七丁酉九丙申朔七丙申處暑八丁卯秋分壬午永淳元正乙未三甲午五癸巳六壬戌八辛酉九庚寅十二己未朔按楊炯伯母李氏墓志十一月一日丙辰舊志會要十一庚申朔並不合今推十庚申朔與新志合
