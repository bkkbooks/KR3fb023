body:
  text: 丁亥宋七遼十六宋正丙子三乙亥六甲辰八癸卯九壬申十一辛未朔遼同戊子宋八遼十七宋正庚午二己巳五戊戌七丁酉九丙申十一乙未朔閏正正戊辰雨水二己巳春分按長編十辛未朔不合遼同按趙知微術閏二二戊辰春分三己亥穀雨今進爲己巳春分使與閏正相合己丑宋皇祐元遼十八宋正甲午三癸巳五壬辰八辛酉十庚申朔按十二月本己未朔當時不應進而進紀正丙戌朔不合遼正甲午三癸巳五壬辰八辛酉十庚申十二己未朔庚寅宋二遼十九宋正己丑二戊午四丁巳六丙辰八乙卯十一甲申朔閏十一十一癸丑冬至十二甲申大寒按律曆志二月二十三日己卯春分與今推二月戊午朔二十二日己卯春分不合遼同按趙知微術閏十二十二癸未大寒明年正甲寅雨水今進爲甲申大寒使與閏十一相合辛卯宋三遼二十宋正癸丑二壬午四辛巳五庚戌七己酉十一戊申朔按律曆志正月一日甲寅雨水六月二十三日壬辰立秋九月二十四日𡈼寅寒露九月二十日癸酉立冬與今推正月癸丑朔二日甲寅雨水六月二十三日𡈼寅立秋八月二十四日𡈼寅寒露九月二十
