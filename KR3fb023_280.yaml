body:
  text: 亥十二甲戌朔閏十一十一癸卯冬至十二甲戌大寒按通鑑目録三己卯作二己酉十二甲戌作閏十二甲戌並不合丙子章帝建初元正甲辰二癸酉四壬申七辛丑九庚子十一己亥朔丁丑二正戊戌三丁酉五丙申七乙未十甲子十二癸亥朔按通鑑目録十甲子作九甲午不合戊寅三正癸巳二壬戌四辛酉六庚申八己未九戊午十一丁巳朔閏八八戊子秋分九戊午霜降巳卯四正丁巳二丙戌四乙酉六甲申八癸未十壬午十二辛巳朔庚辰五正辛亥二庚辰五己酉七戊申九丁未十一丙午朔按通鑑目録五己酉作四己卯不合辛巳六正乙巳二甲辰四癸卯六壬寅九辛未十一庚午朔閏五五壬申夏至六癸卯大暑按通鑑目録九辛未作八辛丑不合壬午七正己巳三戊辰五丁卯七丙寅九乙丑十一甲子朔癸未八正甲子二癸巳四壬辰六辛卯八庚寅十己丑十二戊子朔甲申元和元正戊午閏正丁亥四丙辰六乙卯八甲寅十
