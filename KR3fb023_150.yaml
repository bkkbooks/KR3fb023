body:
  text: 辰十二己卯朔閏三三壬子驚蟄四癸未春分庚寅十一正建子己酉三戊申五丁未七丙午九乙巳十一甲辰朔辛卯十二正建子癸卯三壬寅五辛丑八庚午十己巳十二戊辰朔閏十二十二丁酉小雪壬辰十三正建子丁卯三丙寅五乙丑七甲子九癸亥十二壬辰朔正丁卯冬至癸巳十四正建子壬戌二辛卯四庚寅六己丑八戊子十丁亥十二丙戌朔甲午十五正建子丙辰三乙卯五甲寅七癸丑九壬子十辛亥十二庚戌朔閏九九辛巳處暑十壬子秋分乙未十六正建子庚辰二己酉四戊申七丁丑九丙子十一乙亥朔丙申十七正建子甲戌三癸酉五壬申七辛未十庚子十二己亥朔丁酉十八正建子己巳二戊戌四丁酉閏五丙申七乙未九甲午十一癸巳朔五乙未淸明六丙寅小滿戊戌十九正建子癸巳二壬戌四辛酉六庚申八己未十戊午十二丁巳朔超辰率是年太歲超乙未入丙申太陰超癸酉八甲戌歲星超鶉火入鶉尾
