body:
  text: 合遼同丁丑宋四遼六宋正甲戌四癸卯五壬寅七辛丑八庚午十己巳十二戊辰朔閏四四壬申小滿五壬寅夏至按遼朔考宋四甲辰宋大詔令閏五並不合遼朔閏同四辛未小滿五壬寅夏至按朔考云儼十二己亥誤戊寅宋寶元元遼七宋正戊戌四丁卯六丙寅八乙丑九甲午十一癸巳朔按此年為西夏景宗元昊天授禮法延祚元年始自為推步行于國中迄八年乙酉其術無考不能推算遼同己卯宋二遼八宋正壬辰四辛酉六庚申九己丑十一戊子十二丁巳朔閏十二十二丙戌大寒遼正壬辰四辛酉七庚寅九己丑十一戊子十二丁巳朔閏十二十二乙酉大寒庚辰宋康定元遼九宋正丙辰三乙卯五甲寅八癸未十一壬子朔正丙辰雨水按五月本當進為乙卯朔當時應進失進東都事略正庚戌朔不合遼正丙辰三乙卯六甲申八癸未十一壬子十二辛巳朔正丙辰雨水按紀三辛未朔不合辛巳宋慶曆元遼十宋正辛亥二庚辰四己卯六戊寅九丁未十二丙子朔按長編及遼朔考宋八丁丑不合遼同
