body:
  text: 五甲辰七癸卯八壬申十辛未十二庚午朔閏四四甲戌小滿五乙巳夏至按通鑑目錄十二庚午作十一庚子又云八日冬至與今推辛丑朔七日丁未冬至不合甲申唐同光二正庚子二己巳五戊戌八丁卯十丙寅十一乙未朔按遼紀及朔攷九丙申不合乙酉三正甲午三癸巳五壬辰八辛酉十庚申閏十二己丑朔十二戊子大寒按通鑑目錄十庚申作十一庚寅不合通鑑攷異十二月八日丙寅亦不合此年爲前蜀後主王衍咸康元年胡秀林術閏明年正月向隱又進術用宣明法改爲此年閏十二月丙戌明宗天成元正戊午三丁巳五丙辰七乙卯十甲申朔正己未雨水按通鑑目錄十一月一日冬至與今推十日癸亥冬至不合宋本作十日冬至不譌舊明宗紀癸丑日南至亦不合通鑑二己丑朔舊莊宗紀三丁未四丁丑朔並不合今推二戊子朔與冊府元龜合四丁亥朔與舊明宗紀合丁亥二正癸丑二壬午四辛巳六庚辰八己卯十一戊申朔按五代會要八乙卯朔不合戊子三正戊申二丁丑四丙子五乙巳六甲戌八癸酉十壬寅朔閏八八壬寅秋分九癸酉霜降按會要五丁丑朔遼紀十
