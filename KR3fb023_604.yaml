body:
  text: 九丁亥朔遼同丁丑宋四遼三宋正丙戌三乙卯四甲申六癸未七壬子九辛亥朔閏二二乙酉春分三丙辰穀雨遼同按紀二甲辰朔不合戊寅宋元符元遼四宋正庚戌四己卯五戊申七丁未八丙子十乙亥朔遼同己卯宋二遼五宋正甲辰四癸酉六壬申八辛未九庚子十己亥十二戊戌朔閏九九己巳霜降十己亥小雪按四史朔閏攷錢東垣曰紀書十月甲寅日食誤天文志甲寅月食非日食也遼同庚辰宋三遼六宋正戊辰四丁酉六丙申八乙未九甲子十一癸亥朔按宋大詔令正戊寅朔五月二十一日戊子並不合遼同辛巳宋徽宗建中靖國元遼天祚帝乾統元宋正壬戌四辛卯六庚寅九己未十戊子十二丁亥朔遼同壬午宋崇甯元遼二宋正丁巳二丙戌四乙酉閏六甲寅八癸丑十壬子十二辛亥朔六癸丑大暑七甲申處暑按遼朔攷宋五己卯不合遼正丁巳二丙戌四乙酉閏六甲寅八癸丑十一壬午十二辛亥朔六癸丑大暑七甲申處暑癸未宋二遼三宋初用占天術上元甲子以來二千五百
