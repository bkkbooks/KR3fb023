body:
  text: 十二庚午朔魏同庚午齊八魏十四齊正庚子二己巳四戊辰六丁卯八丙寅十乙丑十二甲子朔魏同按北史正己巳朔不合今推二己巳朔與天象志合辛未齊九魏十五齊正甲午三癸巳五壬辰七辛卯八庚寅十己丑十二戊子朔閏七七庚申處暑八庚寅秋分魏正甲午三癸巳五壬辰六辛卯八庚寅十己丑十二戊子朔閏五五庚申夏至六辛卯大暑按通鑑目録六辛卯作閏六辛卯不合壬申齊十魏十六齊正戊午二丁亥五丙辰七乙卯九甲寅十一癸丑朔按天文志十月二日癸未不合魏同癸酉齊十一魏十七齊正壬子三辛亥五庚戌七己酉十戊寅十二丁丑朔按通鑑目録正壬子作正丙子宋本不訛魏同按司馬元興墓志太和十七年歲次戊申七月庚辰朔十二日壬子並舛訛不合甲戌齊明帝建武元魏十八齊正丁未二丙子四乙亥五甲戌七癸酉九壬申十一辛未朔閏四四甲辰小滿五乙亥夏至按天文志閏三通鑑十一辛丑朔並不合魏正丁未二丙子三乙亥五甲戌七癸酉九壬申十一辛未朔閏二二甲辰春分三乙亥穀雨按通鑑目録三乙亥作閏三乙亥不合乙亥齊二魏十九齊正辛未二庚子四己亥六戊戌八丁酉
