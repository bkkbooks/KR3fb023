body:
  text: 丙寅二正丙辰三乙卯五甲寅七癸丑九壬子十一辛亥朔丁卯三正庚戌四己卯六戊寅八丁丑十丙子十二乙亥朔按煬三子傳五庚辰朔不合戊辰四初用張冑元大業術上元甲子以來一百四十二萬七千六百四十五年正乙巳二甲戌閏三癸酉五壬申八辛丑十庚子十二己亥朔三壬申穀雨四癸卯小滿按通鑑目錄八辛丑作八辛未宋本不譌己巳五正己巳二戊戌四丁酉六丙申八乙未十一甲子朔庚午六正癸亥三壬戌五辛酉七庚申九己未十一戊午十二丁巳朔閏十一十一丙戌冬至十二丁巳大寒按通鑑目錄十二丁巳作閏十二丁巳不合辛未七正丁亥三丙戌五乙酉七甲申九癸未十一壬午朔壬申八正辛巳三庚辰五己卯八戊申十丁未十二丙午朔癸酉九正丙子二乙巳四甲辰六癸卯八壬寅十辛未十二庚午朔閏九九辛丑霜降十壬申小雪甲戌十正庚子二己巳四戊辰六丁卯八丙寅十乙丑
