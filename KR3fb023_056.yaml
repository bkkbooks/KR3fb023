body:
  text: 作三癸未四壬午作五壬午六辛巳作七辛巳八庚辰作九庚戌尤不合乙亥十四魯六正建子丁丑二丙午四乙巳六甲辰八癸卯十一壬申朔杜氏長術正戊申二丁丑五丙午七乙巳九甲辰十一癸卯朔丙子十五魯七正建子辛未三庚午五己巳七戊辰九丁卯十一丙寅朔杜氏長術正壬寅三辛丑五庚子七己亥十戊辰十二丁卯朔閏十二丁丑十六魯八正建子丙寅二乙未三甲午五癸巳七壬辰九辛卯十一庚寅朔閏二二甲子大寒三庚午驚蟄杜氏長術正丙寅三乙丑五甲子七癸亥九壬戌十二辛卯朔按外紀目録三乙丑作二乙丑乃刊本之訛戊寅十七魯九正建子己丑三戊子六丁巳八丙辰十乙卯十二甲寅朔杜氏長術正辛酉二庚寅四己丑六戊子八丁亥十丙戌十二乙酉朔己卯十八魯十正建子甲申二癸丑四壬子六辛亥九庚辰十一己卯十二戊寅朔閏十一十一戊申霜降十二己卯小雪杜氏長術正乙卯三甲寅五癸丑七壬子九辛亥十一庚戌朔庚辰十九魯十一正建子戊申二丁丑四丙子六乙亥八甲戌十癸酉朔杜氏長術正己酉二戊申四丁未七丙子九
