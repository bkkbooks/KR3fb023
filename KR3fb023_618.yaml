body:
  text: 列紀元術以備考此年紀元術朔同紀五戊戌六乙巳朔並不合金仍用賈俊大明術同丁巳宋七金十五宋仍用統元術正癸亥四壬辰六辛卯九庚申閏十己未十二戊午朔十戊午小雪十一己丑冬至按紀元術同天文志閏十一不合金初用楊級大明術上元甲子以來三億八千三百七十六萬八千五百一十四年同按此術日躔月離諸率無考今求定朔借趙知微重修大明術推之戊午宋八金天眷元宋正戊子二丁巳三丙戌五乙酉八甲寅十一癸未朔按紀元術同金同己未宋九金二宋正壬午三辛巳四庚戌六己酉八戊申十二丁未朔按紀元術同玉海六月十三日庚戌不合金同庚申宋十金三宋正丁丑二丙午四乙巳五甲戌閏六癸酉八壬申十一辛丑朔六壬申大暑七癸卯處暑按紀元術同系年要録七壬寅朔不合金同辛酉宋十一金皇統元宋正辛丑二庚午四己巳五戊戌七丁酉八丙寅十一乙未朔按紀元術同金同壬戌宋十二金二宋正乙未三甲午五癸巳六壬戌八辛酉九庚寅十一己丑朔按紀元術同金同
