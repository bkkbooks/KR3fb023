body:
  text: 經朔乙丑亦合金同按紀三壬申朔不合甲子宋四金四宋正乙丑三甲子五癸亥六壬辰八辛卯九庚申十一己未朔按樓鑰攻愧集長汀庵記十二月八日壬申不合今推己丑朔與彭叔夏文苑英華辨證序合金同乙丑宋開禧元金五宋正己未三戊午五辛巳七丙辰閏八乙卯九甲申十一癸未朔八甲寅秋分九甲申霜降金朔閏同八甲寅秋分九乙酉霜降丙寅宋二金六宋正癸未二壬子五辛巳七庚辰九己卯十戊申十二丁未朔按慶元黨禁五月十四日癸巳不合金同丁卯宋三金七宋正丁丑三丙子六乙巳八甲辰十癸卯十二壬寅朔金正丁丑三丙子五乙亥八甲辰十癸卯十一壬申朔按五月本當進為丙子朔當時應進失進戊辰宋嘉定元金八宋初用開禧術上元甲子以來七百八十四萬八千一百八十五年正辛未三庚午五己亥七戊戌十丁卯十二丙寅朔閏四四戊辰小滿五己亥夏至按開禧淳祐會天等術並附統天術以行今每年以統天術並推互校此年統天術正辛未三庚午閏五己亥七戊戌十
