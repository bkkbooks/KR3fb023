body:
  text: 朔七辛亥處暑八壬午秋分按新史四夷附録二丁丑朔不合遼初用調元術天寶乙未為元以來一百九十三年朔閏同按通鑑目録不載遼術今補戊中漢乾祐元遼天祿二漢正辛亥三庚戌五己酉六戊寅八丁丑九丙午十二乙亥朔遼同己酉漢隱帝乾祐二遼三漢正乙巳三甲辰六癸酉七壬寅九辛丑十庚午朔按十月本當進為辛未朔當時應進失進遼正乙巳三甲辰六癸酉七壬寅九辛丑十一庚子朔庚戌漢三遼四漢正己亥三戊戌閏五丁卯七丙寅九乙丑十一甲子朔五丙寅夏至六丁酉大暑按三月本當進為己亥朔當時應進失進通鑑目録閏五丁卯作六丁酉不合五代春秋閏六舊紀有十二月三十日並不合遼同按三月朔亦失進辛亥後周太祖廣順元遼穆宗應曆元後周仍用崇元術正癸亥三壬戌六辛卯八庚寅十己丑十二戊子朔遼仍用調元術同壬子周二遼二周正戊午二丁亥四丙戌六乙酉八甲申十一癸丑朔按龍泉禪院記三月辛亥朔乃三年二月之訛遼同
