body:
  text: 丁丑朔大統術同按是年復用大統術定朔恆氣推算時憲書頒行今萬年書並用定氣亦係後來以新法追改之下丁未戊申己酉三年並仿此六年丁未正丙子三乙亥五甲辰七癸卯九壬寅十一辛丑朔閏四四癸酉小滿五甲辰夏至大統術朔閏同四甲戌小滿五乙巳夏至七年戊申正庚子三己亥五戊戌八丁卯十丙寅十二乙丑朔大統術同八年己酉正乙未二甲子四癸亥六壬戌八辛酉十一庚寅朔大統術朔同有閏十二己丑朔小十二戊子大寒明年正己未雨水按欽天監初依舊法推是年閏十二月頒行時憲書既而自行檢舉停止閏月依新法改閏明年二月九年庚戌正己丑閏二戊子四丁亥五丙辰七乙卯十一甲寅朔二丁亥春分三戊年穀雨按是年復用考成前編法定朔定氣頒行時憲書此後永用定氣自十年辛亥以後朔閏並詳萬年書歷代長術輯要卷十
