body:
  text: 孟子有言千歲日至苟求其故可坐而致春秋元凱通鑑仲更不揆檮昧先民是程握管持籌時逾廿載攷古深心於是乎在五十三卷寫定成書用資讀吏庶有裨歟同治壬戌夏六月壬子朔烏程汪曰楨剛木書于上海旅次觀養廬
