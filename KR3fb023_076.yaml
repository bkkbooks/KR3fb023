body:
  text: 閏十丙寅十二丁丑朔十丁丑秋分十一戊申霜降杜氏長術正甲寅二癸未四壬午六辛巳八庚辰十一己酉朔丁丑八魯十六正建子丁未二丙子五乙巳七甲辰九癸卯十一壬寅朔杜氏長術正戊申三丁未五丙午七乙巳九甲辰十一癸卯朔戊寅九魯十七正建子辛丑三庚子五己亥八戊辰十丁卯十二丙寅朔杜氏長術正壬寅四辛未六庚午八己巳十戊辰十二丁卯朔閏十二按外紀目録十二丁卯作十一丁丑乃刊本之訛己卯十魯十八正建子丙申二乙丑四甲子六癸亥七壬戌九辛酉十二庚寅朔閏六六辛卯小滿七壬戌夏至杜氏長術正丙寅三乙丑五甲子八癸巳十壬辰十二辛卯朔庚辰十一魯十九正建子庚申二己丑四戊子六丁亥八丙戌十乙酉十二甲申朔杜氏長術正辛酉二庚寅四己丑六戊子八丁亥十丙戌朔辛巳十二魯二十正建子甲寅二癸未五壬子七辛亥九庚戌十一己酉朔杜氏長術正乙卯三甲寅四癸丑六壬子八辛亥十庚戌十二己酉朔閏三壬午十三魯二十一正建子戊申三丁未四丙午七乙亥九甲戌十一癸酉朔閏三三丙子驚蟄四丙午春分杜氏長術正己卯二
