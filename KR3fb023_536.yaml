body:
  text: 壬申梁二唐九正庚辰四己酉閏五戊申六丁丑七丙午九乙巳十二甲戌朔五丁未夏至六丁丑大暑按遼朔攷儼正丙戌不合此年爲前蜀永平二年初用胡秀林正象術迄後主王衍咸康元年乙酉其術無攷不能推算蜀杜光庭醮詞七丁未朔與崇元術不合癸酉梁均王乾化三唐十正甲辰四癸酉五壬寅七辛丑八庚午十己巳十二戊辰朔按通鑑目錄四癸酉作三癸卯不合此年爲遼太祖七年遼朔攷此年月朔並誤置九年下甲戌梁四唐十一正戊戌四丁卯六丙寅八乙丑十甲子十一癸巳朔按此年爲遼太祖八年遼朔攷此年月朔並誤置十年下不知太祖十年己建元神冊無十年十一年也乙亥梁貞明元唐十二正壬辰三辛酉六庚寅八己丑十戊子十一丁巳朔閏二二辛卯春分三壬戌穀雨按通鑑目錄三月一日穀雨與今推二日壬戌穀雨不合此年爲遼太祖九年遼朔攷誤以七年月朔置此年下而此年月朔並誤置十一年下丙子梁二唐十三正丙辰三乙卯六甲申八癸未十一壬子朔按此年爲遼太祖神冊元年遼朔攷儼二戊戌十二
