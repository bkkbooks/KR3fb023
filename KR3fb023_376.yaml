body:
  text: 烏程汪曰楨庚申晉元熙二宋武帝永初元涼元始九魏泰常五宋仍用景初術更名永初術魏亦仍用景初術正丙戌三乙酉五甲申七癸未閏八壬午十辛巳朔八辛巳秋分九壬子霜降涼仍用元始術正丙戌三乙酉五甲申七癸未九壬午十一辛巳朔閏十一十一庚戌冬至十二辛巳大寒辛酉宋永初二涼十魏六宋魏正庚戌三已酉五戊申七丁未九丙午十一乙巳朔涼同壬戌宋三涼十一魏七宋魏正甲辰三癸卯六壬申八辛未十庚午十二已巳朔涼同癸亥宋營陽王景平元涼十二魏八宋魏正已亥二戊辰四丁卯五丙寅八乙未十甲午十二癸巳朔閏四四乙未小滿五丙寅夏至涼正已亥二戊辰四丁卯六丙寅閏七乙丑十甲午十二癸巳朔七甲子處暑八乙未秋分甲子宋文帝元嘉元涼十三魏太武帝始光元宋魏正癸亥二壬辰四辛卯六庚寅八已丑十戊子朔按宋紀建康實録正癸巳朔元經正已卯朔宋志二癸巳朔南史二已卯朔並不合通鑑目録二壬辰作三壬戌乃刊本之訛涼同乙丑宋二涼十四魏二宋魏正丁巳三丙辰五乙卯七甲寅
