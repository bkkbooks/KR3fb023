body:
  text: 朔丙戌四正壬辰三辛卯五庚寅六己未七戊子八丁亥十二丙戌朔閏七七丁巳處暑八戊子秋分按實錄六乙未朔譌丁亥五正丙辰三乙卯五甲寅六癸未七壬子九辛亥十二庚辰朔按天文志十一辛未朔不合戊子六正庚戌四己卯六戊寅七丁未八丙子十乙亥十二甲戌朔按實錄四乙卯朔譌己丑七正甲辰四癸酉五壬申七辛未八庚子十己亥十二戊戌朔閏四四壬寅小滿五壬申夏至按實錄十二庚戌朔譌庚寅八正戊辰三丁卯六丙申八乙未十甲午十一癸亥朔辛卯九正壬戌三辛酉六庚寅九己未十一戊午十二丁亥朔閏十二十二丙辰大寒壬辰十正丙戌三乙酉五甲申八癸丑十一壬午朔正丙戌雨水癸巳十一正辛巳二庚戌四己酉六戊申八丁未十二丙午朔按國榷八戊申朔不合今推丁未朔與實錄合甲午十二正丙子二乙巳三甲戌五癸酉六壬寅八辛丑十一庚子朔閏九九庚子霜降十辛未小雪乙未十三正庚子二己巳四戊辰五丁酉六丙寅八乙丑
