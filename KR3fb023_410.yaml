body:
  text: 十一己丑朔魏同癸卯梁四魏四梁仍用大明術正戊子三丁亥五丙戌七乙酉九甲申十一癸未朔魏初用正光術甲申紀四萬六千五百五十二年同甲辰梁五魏五梁正壬午三辛亥五庚戌七己酉九戊申十一丁未朔閏二二辛巳春分三壬子穀雨按通鑑目錄閏正月二月一日春分不合魏正癸未二壬子三辛亥五庚戌七己酉九戊申十一丁未朔閏二二辛巳春分三辛亥穀雨乙巳梁六魏孝昌元梁正丙午三乙巳六甲戌八癸酉十壬申十二辛未朔魏同丙午梁七魏二梁正辛丑二庚午四己巳六戊辰八丁卯閏十丙申十二乙未朔十乙未小雪十一丙寅冬至魏正辛丑二庚午四己巳六戊辰八丁卯十一丙申十二乙未朔閏十一十一乙丑冬至十二丙申大寒丁未梁大通元魏三梁正乙丑二甲午四癸巳六壬辰八辛卯十庚寅十二己丑朔魏正乙丑二甲午四癸巳六壬辰八辛卯十庚寅朔戊申梁二魏孝莊帝永安元梁正己未三戊午五丁巳七丙辰九乙卯十一甲寅朔魏同己酉梁中大通元魏二梁正癸丑三壬子六辛巳七庚辰九己
