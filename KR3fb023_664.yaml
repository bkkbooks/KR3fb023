body:
  text: 一月丙寅朔旦冬至統天術與會天術同元正辛丑三庚子六己巳八戊辰十一丁酉十二丙申朔閏十一十一丙寅冬至十二丁酉大寒按楊叔能李氏祖塋碑至元七年閏十月乃指宋術王惲秋澗集閏十一月則指元術辛未宋七元八宋初用成天術上元甲子以來七千一百七十三萬八千一百四十八年正乙丑三甲子五癸亥七壬戌十辛卯朔按四史朔閏考以黃氏日鈔六月大盡推得六壬辰朔不合紀壬辰在五月末可證元仍用重修大明術同壬申宋八元九宋正庚申三己未四戊子六丁亥八丙戌十一乙卯朔元同癸酉宋九元十宋正乙卯二甲申四癸未五壬子閏六辛亥七庚辰十己酉朔六庚戌大暑七庚辰處暑元正乙卯二甲申四癸未五壬子六辛巳七庚辰十己酉朔閏六六庚戌大暑七庚辰處暑甲戌宋十元十一宋正己卯二戊申四丁未五丙子七乙亥八甲辰十癸卯朔元同乙亥宋孝菾帝德祐元元十二宋正癸酉二壬寅五辛未六庚子八己亥九戊辰十一丁卯朔按宋季三朝政要六庚申朔不合元同
