body:
  text: 丙子朔六丁未大暑七戊寅處暑庚辰四正乙亥三甲戌五癸酉七壬申九辛未十二庚子朔辛巳天漢元正庚午二己亥四戊戌六丁酉八丙申十乙未十二甲午朔壬午二正甲子二癸巳四壬戌六辛酉八庚申十己未十二戊午朔閏三三壬辰淸明四壬戌小滿癸未三正戊子二丁巳四丙辰七乙酉九甲申十一癸未朔按通鑑目錄七乙酉作六乙卯不合甲申四正壬午三辛巳五庚辰七己卯九戊寅十二丁未朔閏十二十二丙子大寒乙酉太始元正丙午三乙巳五甲辰七癸卯九壬寅十一辛丑朔正丙午驚蟄按五行志正乙巳晦荀紀正己巳晦並不合丙戌二正庚子四己巳六戊辰八丁卯十丙寅十二乙丑朔超辰率是年太歲超乙酉入丙戌太陰超癸亥入甲子歲星超壽星入大火丁亥三正乙未二甲子四癸亥七壬辰九辛卯十庚寅十二己丑朔閏九九庚申霜降十辛卯小雪戊子四正己未二戊子四丁亥六丙戌八乙酉十一甲
