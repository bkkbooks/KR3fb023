body:
  text: 昔鄭康成游于馬季長之門以步算始得親近漢晉間儒者如張衡高允之徒並能以算攷證經義若夫用秝法上稽往古知當世年月朔閏然後即一事之後先而審其得失治曶之機于史學尤綦重也杜征南春秋長秝國朝李尚之召誥日名攷皆爲一書而作已足以補苴罅漏有功方冊宋劉羲叟推漢至五季月日爲劉氏輯術國朝錢同人成四史朔閏攷精深博大梅勿菴謂吾爲算學秝最艱苦後人坐進此道吾一生勤若皆爲若用此其類也其津逮後學爲何如耶湖州汪剛木廣文曰楨以輯術既佚乃起周共和迄明末各以當時用術步共朔閏爲厯代長術五士三卷既又省爲輯要十卷證以正史參校羣晝稽其合否將付手民匈序于余余謂此書之難非獨握籌數計也南北分析各用厥秝汞能參合五代時民間小秝盛行公私著述時月互異是一難也史家雜釆記載新唐書尤多錄稗官傳聞異詞往往傳表月日與紀不合是二難也傳寫刊刻展轉紕繆或干支字誤或閏月移易不可更僕數今欲悉爲校正是三難也有宋南渡初五年遼太宗以前布憲授時不知何秝是四難也北周用明克讓術南唐用中正術後改用齊政術如是之類用數無可孜不
