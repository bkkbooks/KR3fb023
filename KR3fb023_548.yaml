body:
  text: 戊申朔遼紀五月五日戊午並不合此年為南漢殤帝劉玢光天元年南漢廣州光孝寺鐵塔銘五月癸未朔亦不合癸卯齊王天福八正庚辰二己酉四戊申六丁未九丙子十一乙亥朔按通鑑目録九丙子作四丙子宋本不訛又十一乙亥作十二乙巳不合此年為南唐保大元年保大中改用齊政術迄吳王李煜乙亥年其術無考不能推算甲辰開運元復用崇元術正甲戌三癸酉五壬申六辛丑九庚午十二己亥朔閏十二十二戊辰大寒按遼朔考云儼十二己卯誤當作己亥乙巳二正戊戌三丁酉四丙寅六乙丑八甲子十二癸亥朔正戊戌雨水按通鑑目録十一月一日冬至與今推十日癸卯冬至不合通鑑二壬辰朔亦不合此年為南漢中宗劉晟乾和三年南漢尊勝經鐵塔記三月八日丙寅亦不合丙午三正癸巳二壬戌四辛酉五庚寅七己丑九戊子十二丁巳朔按舊志三壬戌朔不合丁未後漢高祖天福十二遼太宗大同元世宗天祿元後漢仍用崇元術正丁亥三丙戌五乙酉六甲寅閏七癸丑八壬午十一辛亥
