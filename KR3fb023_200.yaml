body:
  text: 己亥五殷十甲午十一癸亥正壬戌三辛酉六庚寅八己丑後九戊子朔正辛卯驚蟄三辛酉春分應閏正顓十癸巳正壬戌三辛酉五庚申七已未九戊午朔後九二庚申春分四辛卯淸明應閏二庚子六殷十戊午十一丁亥正丙戌三乙酉五甲申七癸未朔顓十丁巳十二丙辰二乙卯五甲申七癸未九壬午朔辛丑七殷十壬子十二辛亥二庚戌四己酉六戊申八丁未朔按通鑑目録脫十壬子三字乃刊本之訛顓十壬子十一辛巳正庚辰三己卯五戊寅八丁未朔按通鑑目録五戊寅作五戊辰宋本通鑑目録不訛壬寅八殷術丙午蔀首十丙午正乙亥三甲戌五癸酉七壬申九辛未朔後九十乙亥小雪十二丙午冬至應閏十顓十丙午十二乙巳二甲辰四癸卯六壬寅八辛丑後九庚子朔十甲戌小雪十二乙巳冬至應閏十按律曆志十一乙巳朔旦冬至與顓合癸卯九殷十庚午十二己巳二戊辰五丁酉七丙申九乙未朔按通鑑目録十庚午三字錯在顓頊術下宋本作十庚子尤訛顓十庚午十二已巳二戊辰四丁卯六丙寅八乙丑朔
