body:
  text: 乙丑宋三遼五宋正甲申三癸未四壬子六辛亥七庚辰十己酉朔遼正甲申三癸未四壬子六辛亥八庚戌十己酉朔丙寅宋四遼六宋正己卯二戊申四丁未五丙子六乙亥七甲辰九癸卯朔閏五五乙巳夏至六乙亥大暑按天文志稽古録東都事略九朝編年備要十朝綱要十甲戌朔遼朔考宋五丁丑九甲辰十甲戌十二壬申並不合遼朔閏同五甲辰夏至六乙亥大暑丁卯宋五遼七宋正壬寅四辛未五庚子七己亥八戊辰十丁卯朔遼同戊辰宋六遼八宋正丁酉二丙寅五乙未六甲子八癸亥九壬辰十一辛卯朔遼同己巳宋七遼九宋正辛卯二庚申四己丑六戊子八丁亥九丙辰十一乙卯朔閏二二己丑春分三庚申穀雨按紀五乙未朔遼朔考宋閏七庚寅並不合今推閏二與遼閏考合遼正辛卯二庚申四己丑六戊子八丁亥九丙辰十一乙卯朔閏三三己未穀雨四庚寅小滿按朔考云儼八丁卯誤庚午宋八遼十宋正甲寅四癸未七壬子九辛亥十一庚戌十二己卯朔按遼朔考宋正乙卯不合遼同按紀正己卯朔四史朔閏考正乙卯並不合
