body:
  text: 丙午六殷十乙未十一甲子正癸亥四壬辰六辛卯八庚寅朔顓十乙未十一甲子正癸亥三壬戌五辛酉七庚申九己未朔丁未元光元殷十己丑十二戊子二丁亥四丙戌六乙酉九甲寅朔後九十二丁巳大寒二戊子驚蟄應閏十二顓十己丑十一戊午二丁亥四丙戌六乙酉八甲申後九癸未朔十二丙辰大寒二丁亥驚蟄應閏十二按五行志七癸未先晦一曰與殷合戊申二殷十癸丑十二壬子二辛亥四庚戌六己酉八戊申朔顓十癸丑十一壬午正辛巳三庚辰六已酉八戊申朔已酉三殷十戊申十一丁丑正丙子三乙亥五甲戌七癸酉九壬申朔後九八辛未秋分後九壬寅霜降應閏八顓十丁未十二丙午二乙巳四甲辰六癸卯八壬寅朔後九九辛丑霜降庚戌四殷十辛未十二庚午三己亥五戊戌七丁酉九丙申朔顓十辛未十二庚午二己巳四戊辰六丁卯八丙寅朔十壬申小雪辛亥五殷十丙寅十一乙未正甲午三癸巳六壬戌八辛酉朔顓十乙丑正甲午三癸巳五壬寅七辛卯九庚寅朔壬子六殷十庚申十二己未二戊午四丁巳六丙辰八
