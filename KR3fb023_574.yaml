body:
  text: 乙卯宋八遼四宋正壬午三辛巳四庚戌六己酉七戊申十一丁未朔閏六六戊寅大暑七戊申處暑按長編五辛巳朔十朝綱要正戊午朔並不合遼正壬午三辛巳四庚戌六己酉閏七戊申十一丁未朔七丁未處暑八戊寅秋分按四史朔閏考三辛亥朔不合丙辰宋九遼五宋正丙午三乙巳四甲戌六癸酉八壬申十一辛丑朔按天文志正癸亥朔長編二丁丑朔遼朔考宋六甲戌並不合遼同丁巳宋天禧元遼六宋正辛丑二庚午四己巳五戊戌七丁酉八丙寅十一乙未朔遼同戊午宋二遼七宋正乙未三甲午閏四癸巳五壬戌七辛酉八庚寅十一己未朔四壬辰小滿五癸亥夏至按遼朔考宋三乙未不合今推甲午朔與長編合遼朔閏同四壬辰小滿五壬戌夏至己未宋三遼八宋正己未三戊午五丁巳六丙戌八乙酉九甲寅十一癸丑朔遼同庚申宋四遼九宋正癸丑三壬子五辛亥七庚戌九己酉十戊寅十二丁丑朔閏十二十二丙午大寒遼正癸丑三壬子六辛巳七庚戌九己酉十戊寅十二丁丑朔閏十二十二丙午大寒按趙知微術閏明年正月正丙子雨水二丁未
