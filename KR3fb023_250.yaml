body:
  text: 甲戌二正壬戌二辛卯四庚寅六己丑九戊午十一丁巳朔乙亥三正丙辰三乙卯五甲寅七癸丑九壬子十二辛巳朔按通鑑目録十二辛巳作十一辛亥不合本紀通鑑四乙未晦亦不合丙子四正辛亥二庚辰四己卯六戊寅七丁丑九丙子十一乙亥朔閏六六丙午大暑七丁丑處暑按通鑑目録二庚辰作正庚戌不合宋本作二庚戌亦訛丁丑五正甲戌四癸卯六壬寅八辛丑十庚子十二己亥朔戊寅永光元正己巳二戊戌四丁酉六丙申九乙丑十一甲子朔己卯二正癸亥三壬戌四辛酉六庚申八己未十一戊子朔閏三三辛卯淸明四辛酉小滿庚辰三正丁亥三丙戌五乙酉七甲申九癸未十一壬午朔辛巳四正辛巳四庚戌六己酉八戊申十丁未十二丙午朔閏十二十二乙亥大寒按通鑑目録六戊寅朔日食不合今推戊寅晦與紀志合壬午五正乙巳三甲辰六癸酉八壬申十辛未十二庚
