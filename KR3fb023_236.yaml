body:
  text: 己酉淸明應閏二按五行志六己酉朔與殷合乙亥五殷十丙子正乙巳三甲辰五癸卯七壬寅九辛丑朔顓十丙子十二乙亥二甲戌四癸酉六壬申八辛未朔丙子六股十辛未十一庚子正己亥三戊戌六丁卯八丙寅朔顓十庚午正己亥三戊戌五丁酉七丙申九乙未朔丁丑太初元殷十乙丑十一甲子朔閏十十甲午小雪十一甲子冬至顓十乙丑十一甲午十二癸巳朔閏十一十一癸亥冬至十二甲午大寒按通鑑目録十一甲午作閏十甲午不合初用太初術元首甲子統首十甲子十二癸巳二壬辰四辛卯六庚寅八己丑十戊子十二丁亥朔閏歲前十月十癸巳小雪十一甲子冬至按是年始以正月為歲首一歲中凡有十六月太初術與三統術同史記曆書誤以周術為太初術劉氏長術從之非也今改正史本紀封禪書漢郊祀志十二甲午朔與殷合戊寅二正丁巳二丙戌五乙卯七甲寅九癸丑十一壬子朔按漢百官表通鑑有閏月王氏西漢年紀引漢表閏正並不合己卯三正辛亥三庚戌五己酉閏六戊申九丁丑十一
