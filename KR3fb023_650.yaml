body:
  text: 卯朔而重九庚戌拜天則本是壬寅朔史誤書朔也大金國志亦云九日庚戌甲午宋端平元金三元六宋正庚子三己亥六戊辰八丁卯十丙寅十二乙丑朔按統天術同金元同乙未宋端平二元太宗七宋仍用開禧術正乙未二甲子四癸亥六壬戌八辛卯十庚寅十二己丑朔閏七七辛酉處暑八辛卯秋分按統天術同元仍用重修大明術同按此年元契勘大明術丙申宋三元八宋正己未二戊子四丁亥五丙辰八己酉十一甲寅朔按統天術同元同丁酉宋嘉熙元元九宋正癸丑三壬子五辛亥六庚辰八己卯十一戊申朔按統天術同天文志五庚午朔不合元同戊戌宋二元十宋正戊申二丁丑四丙子五乙亥六甲辰八癸卯十壬寅朔閏四四乙未小滿五丙子夏至按統天術同元同己亥宋三元十一宋正壬申二辛丑四庚子六己亥七戊辰九丁卯十一丙寅朔按統天術同四史朔閏考五己亥不合元正壬申二辛丑四丙子六己亥七戊辰八丁酉十一丙寅朔
