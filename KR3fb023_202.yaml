body:
  text: 甲辰十殷十乙丑十一甲午正癸巳三壬辰五辛卯七庚寅後九己未朔六己丑大暑八庚申處暑應閏六按通鑑目録後九己未作明年十己丑乃刊本之訛顓十甲子十二癸亥三壬辰五辛卯七庚寅九己丑朔後九七己未處暑九己丑秋分應閏七乙巳十一殷十己丑十一戊午正丁巳三丙辰五乙卯七甲寅九癸丑朔顓十戊子十二丁亥二丙戌四乙酉七甲寅九癸丑朔丙午十二殷十癸未十二壬午二辛巳四庚辰六己卯八戊寅朔顓十癸未十一壬子正辛亥三庚戌五己酉七戊申九丁未朔丁未惠帝元殷十丁丑十二丙子二乙亥五甲辰七癸卯九壬寅朔後九三甲戌淸明五甲辰小滿應閏三顓十丁丑十二丙子二乙亥四甲戌六癸酉八壬申後九辛未朔四癸卯小滿六癸酉夏至應閏四戊申二殷十辛丑十二庚子二已亥四戊戌六丁酉九丙寅朔顓十辛丑十一庚午二己亥四戊戌六丁酉八丙申朔己酉三殷十丙申十一乙丑正甲子三癸亥五壬戌七辛酉九庚申朔顓十乙未十二甲午二癸巳四壬辰
