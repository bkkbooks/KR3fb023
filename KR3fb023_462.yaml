body:
  text: 癸未宏道元正己丑四戊午六丁巳七丙戌九乙酉十甲寅朔按舊紀正甲午朔不合新志十二壬午晦乃依推步本法甲申則天后光宅元正甲申二癸丑四壬子六辛巳七庚戌九己酉十一戊申朔閏五五辛亥夏至六壬午大暑按正月本癸未朔當時強進為甲申朔通鑑目録六月一日大暑與今推二日壬午大暑不合乙酉垂拱元正丁未三丙午六乙亥八甲戌十癸酉十二壬申朔丙戌二正壬寅二辛未四庚午六己巳九戊戌十一丁酉朔丁亥三正丙申二乙未四甲午六癸巳八壬辰十一辛酉朔閏正正乙丑啓蟄二丙申春分按舊元宗紀閏七不合今推閏正與新武后紀合通鑑目録二月一日春分與今推二日丙申春分不合戊子四正庚申三己未四戊子六丁亥八丙戌十二乙酉朔己丑永昌元正乙卯二甲申四癸未五壬子七辛亥九庚戌朔閏九九己卯霜降十庚戌小雪按明年改用子正故此年止于十月并閏計之亦僅十一月為一年
