body:
  text: 丙子宋端宗景炎元元十三宋正丁卯三丙寅四乙丑六甲子八癸亥九壬辰十一辛卯朔閏三三甲午穀雨四乙丑小滿按宋遺民録正月十九日甲申宋季三朝政要四己丑朔並不合元正丁卯二丙申四乙丑六甲子八癸亥九壬辰十一辛卯朔閏三三甲午穀雨四乙丑小滿按紀十二辛卯朔不合平宋録二丁酉朔乃指宋朔也丁丑宋二元十四宋初用本天術正辛卯二庚申五己丑七戊子九丁亥十丙辰十二乙卯朔按此術無考今借成天術推之元仍用重修大明術同戊寅宋衛王祥興元元十五宋正乙酉二甲寅五癸未七壬午十辛亥十一庚辰十二己卯朔閏十一十一戊申冬至十二己卯大寒元同己卯宋二元十六宋正己酉二戊寅四丁丑七丙午九乙巳十二甲戌朔元同庚辰元至元十七元仍用重修大明術正癸卯三壬寅五辛丑七庚子十己巳朔辛巳十八初用授時術即以是年歲前冬至為元正戊戌二丁卯三丙申五乙未七甲午閏八癸巳十二壬辰朔八壬辰秋分九癸亥霜降壬午十九正壬戌二辛卯四庚寅五己未七戊午八丁亥
