body:
  text: 巳閏十二丙辰朔十二乙卯大寒按新舊志八己酉朔不合今推己丑朔與新舊紀會要通鑑合戊辰總章元正丙戌二乙卯五甲申七癸未九壬午十一辛巳朔正丙戌啓蟄己巳二正庚辰三己卯五戊寅七丁丑十丙午朔按册冀王文十一月丙午朔不合庚午咸亨元正乙亥二甲辰四癸卯六壬寅八辛丑十庚午朔閏九九庚子霜降十庚午小雪辛未二正己亥二戊辰四丁卯五丙申七乙未十甲子朔壬申三正甲午二癸亥四壬戌五辛卯六庚申八己未十戊午朔癸酉四正戊子二丁巳四丙辰閏五乙卯六甲申八癸未十壬午朔五甲寅夏至六甲申大暑甲戊上元元正壬子二辛巳四庚辰六己卯七戊申九丁未十一丙午朔乙亥二正丙午二乙亥五甲辰七癸卯八壬申十辛未十二庚午朔按高平縣造橋碑側八月癸丑朔王勃鞶鑑圖銘序十一月庚午朔並不合丙子儀鳳元正庚子二己巳四戊戌六丁酉八丙申十乙
