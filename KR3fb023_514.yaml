body:
  text: 辰朔丙寅六正癸卯二壬申四辛未七庚子九己亥十二戊辰朔丁卯宣宗大中元正戊戌二丁卯閏三丙寅四乙未六甲午九癸亥十二壬辰朔三乙丑穀雨四丙申小滿戊辰二正壬戌二辛卯四庚寅五己未七戊午九丁巳朔按通鑑目錄九丁巳作九丁亥宋本不譌己巳三正丙辰三乙卯五甲寅六癸未七壬子九辛亥十二庚戌朔閏十一十一己卯冬至十二庚戌大寒按通鑑目錄九辛亥作十辛亥閏十一作閏九並不合今推閏十一與通鑑合宋本目錄並不譌庚午四正庚辰三己卯五戊寅六丁未七丙子九乙亥十二甲辰朔按通鑑目錄三己卯作二己卯五戊寅作五戊申六丁未作六丁丑七丙子作八丙子九乙亥作十乙亥並不合宋本三己卯亦誤作二己卯餘並不譌辛未五正甲戌四癸卯六壬寅七辛未八庚子十己亥十二戊戌朔按通鑑目錄四癸卯作三癸酉不合壬申六正戊辰四丁酉六丙申閏七乙未八甲子十癸亥十二壬戌朔七癸巳處暑八甲子秋分按此年本當閏八月乙丑朔八月三十日甲子秋分九月一日甲午霜降當時應
