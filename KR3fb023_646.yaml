body:
  text: 楚材撰進西征庚午元術未經行用辛巳宋十四金五元十六宋正丙戌四乙卯五甲申七癸未八壬子十辛亥朔閏十二十二庚辰大寒按統天術同金元同壬午宋十五金元光元元十七宋正庚戌四己卯五戊申七丁未八丙子十乙亥朔正庚戌雨水按統天術同會稽續志十一己巳朔不合金元同按大金國志九庚子朔不合癸未宋十六金二元十八宋正甲辰四癸酉六壬申八辛未九庚子十一己亥朔按統天術同劉克莊後村集十一月三日壬寅不合金元同按大金國志六丁卯十一庚子朔並不合甲申宋十七金哀宗正大元元十九宋正戊戌四丁卯七丙申閏八乙未九甲子十一癸亥朔八甲午秋分九甲子霜降按統天術同紀七丁酉朔不合金元同乙酉宋理宗寶慶元金二元二十宋正壬戌三辛酉六庚寅八己丑十戊子十二丁亥朔按統天術同金元同丙戌宋二金三元二十一宋正丁巳二丙戌四乙酉六甲申九癸丑十一壬子朔按統天術同金元同丁亥宋三金四元二十二宋正辛亥三庚戌五己酉六戊申八丁未十一丙子朔閏五五戊寅夏至六己酉大暑按統天術同金元同
