body:
  text: 壬辰陳四周建德元齊三陳正甲辰二癸酉四壬申六辛未八庚午十己巳閏十二戊戌朔十二丁酉大寒按本紀閏在十二月前不合周正甲辰二癸酉五壬寅七辛丑九庚子十一己亥朔齊正甲辰二癸酉四壬申六辛未八庚午十己巳十二戊戌朔閏十一十一戊辰冬至十二戊戌大寒癸巳陳五周三齊四陳正戊辰二丁酉四丙申六乙未八甲午十癸巳十二壬辰朔正戊辰雨水周正戊戌二丁酉四丙申六乙未九甲子十一癸亥朔閏正正丁卯雨水二丁酉春分齊朔與陳同甲午陳六周三齊五陳正壬戌二辛卯五庚申七己未九戊午十一丁巳朔按本紀南史二壬辰朔通鑑二壬午朔並不合周正壬戌三辛酉五庚申七已未九戊午十二丁亥朔按通鑑二壬午朔不合今推壬辰朔與周紀合齊與陳同乙未陳七周四齊六陳正丙辰三乙卯五甲寅七癸丑九壬午十一辛巳朔閏八八辛亥秋分九壬午霜降按本紀南史建康實録通鑑閏九不合周正丁巳二丙戌四乙酉六甲申八癸未十壬午十一辛巳朔閏十十辛亥小雪十一壬午冬至齊朔閏與陳同八壬子秋分九癸未霜降丙申陳八周五齊隆化元陳正庚辰三己卯五戊寅七丁丑九
