body:
  text: 朔正辛酉雨水按正元術正庚申朔餘同通鑑目録四戊子作五戊午今從舊紀四月戊子朔改正以正元術推四月朔小餘已越進限本當進為己丑當時應進失進也昌黎集甲子日南至與正元術十一月十日乙丑冬至不合癸巳八正乙卯三甲寅四癸未五壬子七辛亥九庚戌朔按正元術同通鑑目録七辛亥作六辛巳則二月以下連四小必訛今從正元術及韋瓘宣州南陵大農陂記六月壬午朔改正舊紀亦誤作六月辛巳朔甲午九正己酉四戊寅五丁未六丙子八乙亥九甲戌朔閏八八甲辰秋分九乙亥霜降按正元術同通鑑目録十二癸卯朔今從正元術及舊紀元稹祭淮瀆文十二月甲辰朔改正乙未十正癸酉三壬申五辛未七庚午八己亥十戊戌朔按正元術同通鑑目録七庚午作六庚子今從正元術及舊紀六月辛丑朔改正丙申十一正丁卯四丙申六乙未八甲午九癸亥十一壬戌朔按正元術七甲子朔餘同丁酉十二正辛酉四庚寅六己未七戊子九丁亥十一丙戌朔閏五五己丑夏至六己未大暑按正元術同白居易祭匡山文
