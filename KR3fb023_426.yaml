body:
  text: 巳大暑七庚子處暑戊子陳二周三齊四陳正丁酉二丙寅四乙丑六甲子八癸亥十壬戌朔按通鑑目録六甲子作七甲午乃刊本之訛周正丁酉二丙寅五乙未七甲午九癸巳十一壬辰朔齊與陳同己丑陳宣帝太建元周四齊五陳正辛卯三庚寅五己丑七戊子九丁亥十一丙戌朔周正辛卯三庚寅五己丑七戊子十丁巳十二丙辰朔齊與陳同庚寅陳二周五齊武平元陳正乙酉三甲申五癸丑七壬子九辛亥十一庚戌朔閏四四癸未小滿五甲寅夏至周正丙戌二乙卯四甲寅五癸丑七壬子九辛亥十一庚戌朔閏四四壬午小滿五癸丑夏至按通鑑目録五癸丑作閏五癸丑不合齊正乙酉閏二甲申五癸丑七壬子九辛亥十一庚戌朔二癸未春分三甲寅穀雨辛卯陳三周六齊二陳正己酉三戊申五丁未七丙午十乙亥十二甲戌朔周正庚戌二己卯四戊寅六丁丑八丙子十乙亥十二甲戌朔按通鑑目録二己卯作正己酉周紀北史亦作正己酉朔並不合隋志四甲寅朔亦不合今推戊寅朔與周紀北史合齊與陳同按朱岱林墓志二月乙卯朔六口甲申乙乃己字之訛
