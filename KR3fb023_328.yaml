body:
  text: 降不合晉宋志正壬辰朔亦不合吳正已丑三戊子五丁亥七丙戌閏八乙酉十甲申十二癸未朔八甲申秋分九乙卯霜降庚午漢十二魏二吳十三漢正甲寅二癸未四壬午六辛巳八庚辰十已卯十二戊寅朔魏正癸丑二壬午四辛巳六庚辰九已酉十一戊申朔吳正癸丑二壬午五辛亥七庚戌九已酉十一戊申朔按通鑑目録五辛亥作四辛巳不合辛未漢十四魏三吳太元元漢正戊申二丁丑四丙子七乙巳九甲辰十一癸卯朔魏正丁未三丙午五乙巳七甲辰九癸卯十二壬申朔吳正丁未三丙午五乙巳七甲辰十癸酉十二壬申朔壬申漢十五魏四吳候官侯建興元漢正壬寅三辛丑五庚子六已亥八戊戌十一丁卯朔閏五五已巳夏至六庚子大暑按通鑑目録六月一日大暑與今推二日庚子大暑不合魏正壬寅二辛未四庚午閏五已巳七戊辰九丁卯十一丙寅朔五戊辰夏至六已亥大暑吳正壬寅二辛未四庚午五已巳七戊辰九丁卯十一丙寅朔閏四四戊戌小滿五已巳夏至按通鑑目録云吳朔閏並與魏同不合癸酉漢十六魏五吳二漢正丙寅三乙丑五甲子七癸亥九
