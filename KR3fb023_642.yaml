body:
  text: 丁卯十二丙寅朔五戊戌夏至六己巳大暑慶元黨禁十二月十三日己卯不合金仍用重修大明術與開禧術同己巳宋二金衛紹王大安元宋正乙未三甲午五癸巳七壬辰十辛酉朔按統天術正乙未三甲午五癸巳七壬辰十一辛卯朔金正丙申二乙丑三甲午五癸巳七壬辰十辛酉朔庚午宋三金二宋正庚寅三己丑四戊午六丁巳八丙辰十一乙酉朔按統天術同談鑰吳興志閏二不合金同按紀正庚戌十二辛酉朔天文志正庚戌朔嘉祥朝氏碣十庚辰朔並不合辛未宋四金三宋正乙酉二甲寅三癸丑四壬午六辛巳七庚戌十己卯朔閏二二癸未春分三癸丑穀雨按統天術同四史朔閏考云十一月己酉紀誤乙酉今考成化本宋史不誤金同壬申宋五金崇慶元宋正己酉二戊寅四丁丑五丙午七乙巳八甲戌十癸酉朔按統天術同四史朔閏考云七己巳一日立秋見鮑浣之數術記遺序李鋭曰己似乙誤與今推七月乙巳朔立秋合金同癸酉宋六金宣宗貞祐元宋正癸卯二壬申五辛丑六庚午八己巳九戊戌十丁酉朔閏九九丁卯霜降十丁酉小雪按統天術朔
