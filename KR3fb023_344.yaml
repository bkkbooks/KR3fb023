body:
  text: 巳朔閏六六庚子大暑七辛未處暑己未九正戊辰三丁卯六丙申八乙未十甲午十二癸巳朔按宋志十甲子朔不合今推十一甲子朔與紀志合庚申永康元正癸亥二壬辰四辛卯六庚寅八已丑十一戊午朔按紀志正己卯日食不合辛酉永寧元正丁巳三丙辰四乙卯六甲寅八癸丑十壬子十二辛亥朔閏三三乙酉穀雨四乙卯小滿壬戌太安元正辛巳三庚辰五己卯七戊寅九丁丑十一丙子朔癸亥二正乙亥三甲戌六癸卯八壬寅十辛丑十二庚子朔閏十二十二已巳大寒按通鑑目録正乙亥作二乙巳宋本作正乙巳並訛紀正甲子朔不合甲子永興元正已亥三戊戌五丁酉七丙申十乙丑十二甲子朔正庚子雨水乙丑二正甲午二癸亥四壬戌六辛酉八庚申十已未十二戊午朔丙寅光熙元正戊子三丁亥五丙戌七乙酉閏八甲申十癸未十二壬午朔八癸未秋分九甲寅霜降丁卯懷帝永嘉元正壬子二辛巳五庚戌七己酉九戊申十
