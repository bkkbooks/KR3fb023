body:
  text: 穀雨與今推二日乙酉穀雨不合己卯四正庚辰二己酉四戊申六丁未八丙午十乙巳十二甲辰朔庚辰五正甲戌二癸卯五壬申七辛未九庚午閏十已巳十二戊辰朔十戊辰小雪十一己亥冬至按袁紀九庚子朔不合今推庚午朔與紀志合辛巳六正戊戌二丁卯四丙寅六乙丑九甲午十一癸巳朔按紀及通鑑三丁卯朔日食五行志十癸未朔日食並不合今推二丁卯朔日食與通鑑目錄引本志合壬午七正壬辰三辛卯五庚寅七己丑九戊子十一丁亥朔癸未八正丁亥二丙辰四乙卯六甲寅七癸丑九壬子十一辛亥朔閏六六壬午大暑七癸丑處暑按紀十月已巳迎冬與今推九月十八日己巳立冬不合甲申九正庚戌四已卯六戊寅八丁丑十丙子十二乙亥朔乙酉十正乙巳二甲戌四癸酉六壬申九辛丑十一庚子朔丙戌十一正已亥三戊戌四丁酉六丙申八乙未十一甲子朔閏三三丁卯穀雨四丁酉小滿
