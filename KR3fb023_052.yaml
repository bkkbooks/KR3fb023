body:
  text: 十己未十二戊午朔癸亥二魯五正建子丁巳二丙戌四乙酉六甲申七癸未九壬午十二辛亥朔閏六六壬子小滿七癸未夏至杜氏長術正戊子二丁巳四丙辰六乙卯八甲寅十癸丑十二壬子朔閏十二按外紀目録十二壬子作閏十二壬午與今本釋例不合甲子三魯六正建子辛巳二庚戌四己酉六戊申八丁未十丙午十二乙巳朔杜氏長術正壬子二辛巳四庚辰六己卯八戊寅十乙丑朔乙丑四魯七正建子乙亥二甲辰五癸酉七壬申九辛未十一庚午朔杜氏長術正丙午三乙巳五甲辰七癸卯九壬寅十一辛丑閏十二庚子朔丙寅五魯八正建子己巳三戊辰四丁卯七丙申九乙未十一甲午朔閏三三丁酉驚蟄四丁卯春分杜氏長術正庚午三己巳五戊辰七丁卯九丙寅十一乙丑朔丁卯六魯九正建子癸巳三壬辰五辛卯七庚寅九己丑十二戊午朔杜氏長術正甲子三癸亥六壬辰八辛卯十庚寅十一己丑朔閏十戊辰七魯十正建子戊子二丁巳四丙辰六乙卯八甲寅十癸丑十二壬子朔閏十二十二辛巳小雪杜氏長術正戊子三
