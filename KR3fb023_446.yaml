body:
  text: 癸未六正丁丑四丙午六乙巳八甲辰十癸卯十二壬寅朔甲申七正壬申二辛丑四庚子六己亥八戊辰十丁卯十二丙寅朔閏七七戊戌處暑八戊辰秋分乙酉八正丙申二乙丑四甲子六癸亥八壬戌十一辛卯朔丙戌九初用崔善為校定戊寅元術上元戊寅以來一十六萬四千三百四十九年正庚寅三己丑五戊子六丁巳八丙辰十二乙卯朔丁亥太宗貞觀元正乙酉二甲寅閏三癸丑四壬午六辛巳八庚辰十一己酉朔三壬子穀雨四壬午小滿戊子二正己酉二戊寅四丁丑五丙午七乙巳八甲戌十一癸卯朔按通鑑三戊寅朔不合今推戊申朔與新舊唐書紀志合己丑三正癸卯三壬寅五辛丑七庚子八己巳九戊戌十二丁卯朔閏十二十二丙申大寒按舊紀志新志明年閏正此年無閏不合今推閏十二與新紀合或當時欲避正旦日食故強改之新紀則仍依推步本法耳庚寅四正丁卯三丙寅五乙丑六甲午八癸巳十壬辰十二辛卯朔正丁卯啓蟄按通鑑目録十壬辰作九壬戌不
