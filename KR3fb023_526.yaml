body:
  text: 癸丑二初用崇元術上元甲子以來五千三百九十四萬七千三百一十年正辛丑二庚午四己巳閏五戊辰六丁酉八丙申十乙未朔五丁卯夏至六戊戌大暑甲寅乾寧元正乙丑二甲午四癸巳五壬戌七辛酉八庚寅十一己未朔按隴西李氏再修功德記及薛廷圭冊益昌公主文並十月庚申朔不合乙卯二正己未三戊午五丁巳七丙辰八乙酉九甲寅十一癸丑朔按通鑑目録七丙辰作六丙戌不合舊紀十一癸未十二甲申朔並不合新董昌傳二月朔之明日皆卯也似以為庚寅朔亦不合丙辰三正癸丑二壬子五辛巳六庚戌八己酉十戊申十一丁丑朔閏正正辛巳雨水二壬子春分按通鑑目録五辛巳作四辛亥不合舊紀三壬子四壬午朔並不合丁巳四正丁丑二丙午五乙亥七甲戌九癸酉十一壬申朔按薛廷圭冊德王為皇太子文三月癸卯朔不合戊午光化元正辛未三庚午五己巳八戊戌十丁酉十一丙申朔閏十十丙寅小雪十一丙申冬至己未二正乙未二甲子五癸巳七壬辰十辛酉十二庚申朔按通鑑目録五癸巳作四癸亥不合又脫七壬辰三字
