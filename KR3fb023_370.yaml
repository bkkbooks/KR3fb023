body:
  text: 辛丑穀雨戊申晉四秦十魏五晉魏正丙申二乙丑四甲子六癸亥八壬戌十辛酉十二庚申朔按魏天象志北史七戊戌朔不合秦同己酉晉五秦十一魏明元帝永興元晉魏正庚寅三已丑五戊子七丁亥九丙戌閏十乙酉十二甲申朔十甲申小雪十一乙卯冬至按晉志通鑑閏十一不合今推閏十與宋志北史合秦同庚戌晉六秦十二魏二晉魏正甲寅二癸未四壬午七辛亥九庚戌十一已酉朔秦同辛亥晉七秦十三魏三晉魏正戊申三丁未五丙午七乙巳十甲戌十二癸酉朔秦正戊申三丁未五丙午七乙巳九甲辰十二癸酉朔壬子晉義熙八秦宏始十四北涼武宣王沮渠蒙遜元始元魏永興四晉魏仍同用景初術正癸卯二壬申四辛未六庚午七已巳九戊辰十一丁卯朔閏六六戊戌大暑七己巳處暑秦仍用三紀甲子元術與晉魏同北涼趙𢾺造元始術丙申蔀三千八百三十九年正癸卯二壬申四辛未六庚午八己巳九戊辰十一丁卯朔閏八八丁酉秋分九戊辰霜降按通鑑目錄不載北涼術今補
