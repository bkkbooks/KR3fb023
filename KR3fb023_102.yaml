body:
  text: 三壬戌五辛酉八庚寅十己丑十二戊子朔癸巳四魯五正建子丙戌二乙卯五甲申七癸未九壬午十一辛巳朔杜氏長術正戊午二丁亥四丙戌五乙酉八甲寅十癸丑十二壬子朔閏四甲午五魯六正建子庚辰三己卯五戊寅八丁未十丙午十二乙巳朔杜氏長術正壬午二辛亥四庚戌六己酉九戊寅十一丁丑朔乙未六魯七正建子乙亥二甲辰四癸卯六壬寅七辛丑九庚子十二己巳朔閏六六庚午小滿七辛丑夏至杜氏長術正丙子三乙亥五甲戌七癸酉十壬寅十一辛丑朔閏十丙申七魯八正建子己亥二戊辰四丁卯六丙寅八乙丑十甲子十二癸亥朔杜氏長術正庚子三己亥五戊戌七丁酉九丙申十二乙丑朔丁酉八魯九正建子癸巳二壬戌五辛卯七庚寅九己丑十一戊子朔杜氏長術正乙未二甲子四癸亥六壬戌八辛酉十庚申十二己未朔戊戌九魯十正建子丁亥三丙戌四乙酉七甲寅九癸丑十一壬子朔閏三三乙卯驚蟄四乙酉春分杜氏長術正己丑二戊午五丁亥七丙戌九乙酉十一甲申十二癸未朔閏十一按外紀目録二戊午作三戊午乃刊本之訛
