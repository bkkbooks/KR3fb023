body:
  text: 癸卯宋五遼三金太宗天會元宋正乙卯三甲寅五癸丑六壬午八辛巳十庚辰朔遼金同甲辰宋六遼四金二宋正庚戌二己卯閏三戊寅五丁丑六丙午八乙巳九甲戌朔三丁丑穀雨四戊申小滿按禮志閏二不合遼金同乙巳宋七遼五金三宋正癸酉四壬寅六辛丑七庚午九己巳十戊戌朔遼金同丙午宋欽宗靖康元金天會四宋仍用紀元術正丁卯五丙寅七乙丑八甲午十癸巳十一壬戌朔閏十一十一辛卯冬至十二壬戌大寒按十朝綱要八丙申朔不合金仍用賈俊大明術同按四史朔閏考錢東垣曰靖康紀聞拾遺云金天會四年閏八月而中國乃閏十一月其說不確也今考大金國志亦作閏十一歷代長術輯要卷八
