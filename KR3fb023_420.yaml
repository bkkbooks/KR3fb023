body:
  text: 魏朔乃刊本之訛齊亦同按通鑑目録此年脫齊朔乃刊本之訛乙亥梁敬帝紹泰元魏二齊六梁正壬午三辛巳五庚辰七己卯九戊寅十二丁未朔魏正壬午三辛巳五庚辰七己卯十戊申十二丁未朔齊與梁同丙子梁太平元魏三齊七梁正丁丑二丙午四乙巳六甲辰八癸卯九壬寅十一辛丑朔閏八八壬申秋分九壬寅霜降魏朔閏同八辛未秋分九壬寅霜降齊朔閏同八壬申秋分九癸卯霜降丁丑梁太平二陳武帝永定元北周明帝元齊天保八陳仍用大明術正辛丑二庚午四己巳六戊辰八丁卯十丙寅十二乙丑朔北周仍用正光術同按北史二癸酉朔不合齊仍用天保術亦同戊寅陳永定二周二齊九陳正乙未二甲子四癸亥七壬辰九辛卯十一庚寅朔周同齊亦同己卯陳三周武成元齊十陳仍用大明術正己丑三戊子五丁亥六丙戌八乙酉十一甲寅朔閏五五丙辰夏至六丙戌大暑按本紀南史通鑑閏四又本紀南史隋志建康實録通鑑五丙辰朔又隋志九辛卯朔並不合周初用明克讓術正己丑三戊子五丁亥六丙戌九乙卯十一甲寅朔閏五五丙辰夏至六丁亥大暑按此術無考劉氏長術仍借正光術推
