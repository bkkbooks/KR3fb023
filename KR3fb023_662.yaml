body:
  text: 戊申十二丁未朔元正壬午三辛巳四庚戌六己酉八戊申十二丁未朔甲子宋五元至元元宋正丁丑二丙午四乙巳五甲戌七癸酉八壬寅十二辛丑朔按統天術同元同乙丑宋度宗咸淳元元二宋正辛未三庚午五己巳閏五戊戌七丁酉八丙寅十一乙未朔五丁酉夏至六戊辰大暑按統天術同元同按紀六戊申朔不合丙寅宋二元三宋正乙未三甲午五癸巳六壬戌八辛酉九庚寅十一己丑朔按統天術同元同丁卯宋三元四宋正己丑三戊子五丁亥七丙戌九乙酉十甲寅十二癸丑朔按統天術同元同按此年札馬魯丁撰進萬年術與大明術參用其法無考戊辰宋四元五宋正癸未二壬午五辛亥七庚戌九己酉十戊寅十二丁丑朔閏正正辛亥雨水二壬午春分按統天術同四史朔閏考閏正壬子不合元同己巳宋五元六宋正丁未三丙午六乙亥八甲戌十癸酉十一壬寅朔按統天術同元同庚午宋六元七宋正辛丑三庚子六己巳八戊辰閏十丁酉十一丙寅朔十丙申小雪十一丙寅冬至按會天術本閏十一丁卯朔十二月二日丁酉大寒當時強改為閏十以就十
