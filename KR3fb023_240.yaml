body:
  text: 寅朔按本紀五行志十甲寅晦不合己丑征和元正癸丑三壬子五辛亥七庚戌九己酉十一戊申朔庚寅二正戊申二丁丑四丙子閏五乙亥七甲戌九癸酉十一壬申朔五甲戌夏至六乙巳大暑按通鑑目錄二丁丑作正丁未不合辛卯三正辛未三庚午六已亥八戊戌十丁酉十二丙申朔壬辰四正丙寅二乙未四甲午六癸巳八壬辰十一辛酉朔按荀紀七辛酉晦不合今推八辛酉晦與紀志合癸巳後元元正庚申二己未四戊午六丁巳八丙辰十乙卯朔閏正正戊子驚蟄二己未春分甲午二正甲申三癸未五壬午七辛巳九庚辰十一己卯朔乙未昭帝始元元正戊寅三丁丑六丙午八乙巳十甲辰十一癸卯朔閏十十癸酉小雪十一癸卯冬至丙申二正壬寅三辛丑五庚子八己巳十戊辰十二丁卯朔按通鑑目錄八己巳作七己亥不合丁酉三正丁酉二丙寅四乙丑六甲子八癸亥十壬戌朔
