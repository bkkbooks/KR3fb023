body:
  text: 五日癸酉立冬並不合遼同壬辰宋四遼二十一宋正戊申二丁丑三丙午五乙巳六甲戌八癸酉十一𡈼寅朔遼同癸巳宋五遼二十二宋正𡈼寅二辛未四庚午六己巳七戊戌八丁酉十丙申朔閏七七丁卯處暑八戊戌秋分按五行志閏六長編及遼朔攷宋二壬申並不合遼正壬寅三辛丑四庚午六己巳七戊戌八丁酉十丙申朔閏七七丁卯處暑八丁酉秋分甲午宋至和元遼二十三宋正丙寅二乙未四甲午六癸巳七𡈼戌九辛酉十一庚申朔按東都事略四甲申朔不合遼同乙未宋二遼道宗淸甯元宋正庚申二己丑五戊午七丁巳八丙戌十乙酉十二甲申朔按天文志閏三不合遼同按紀十一月戊寅冬至與趙知微術廿五日己卯冬至不合丙申宋嘉祐元遼二宋正甲寅二癸未四𡈼子六辛亥八庚戌十己酉十二戊申朔閏三三辛巳穀雨四壬子小滿按遼朔攷宋閏二癸未不合遼正甲寅二癸未四壬子七辛巳八庚戌十己酉十二戊申朔閏三三辛巳穀雨四𡈼子小滿按趙知微術閏四四辛亥小滿五壬午夏至今進爲壬子小滿使
