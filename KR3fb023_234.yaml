body:
  text: 丙午朔十壬子小雪顓十辛亥十一庚辰正己卯三戊寅六丁未八丙午朔十辛亥小雪按史本紀封禪書漢本紀郊祀志十一月辛巳朔旦冬至與殷二日壬午冬至顓二日辛巳冬至並不合庚午六殷十丙午十一乙亥正甲戌三癸酉五壬申七辛未九庚午朔顓十乙巳十二甲辰二癸卯四壬寅六辛丑九庚午朔辛未元封元殷十庚子十一己巳正戊辰四丁酉六丙申八乙未後九甲午朔五乙未夏至七丙寅大暑應閏五顓十庚子十一己巳正戊辰三丁卯五丙寅七乙丑九甲子朔後九五甲午夏至七乙丑大暑應閏五按史表徐廣注閏四不合壬申二殷十甲子十一癸巳正壬辰三辛卯六庚申八己未朔顓十癸亥正壬辰三辛卯五庚寅七己丑九戊子朔按通鑑目錄七己丑作十己丑宋本不譌癸酉三殷十戊午十二丁巳二丙辰四乙卯六甲寅八癸丑朔顓十戊午十一丁亥正丙戌四乙卯六甲寅八癸丑朔甲戌四殷十癸丑十一壬午正辛巳三庚辰五己卯七戊寅九丁丑朔後九正己酉驚蟄三庚辰春分應閏正顓十壬子十二辛亥二庚戌四己酉六戊申九丁丑朔後九二己卯春分四
