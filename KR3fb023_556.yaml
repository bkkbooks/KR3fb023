body:
  text: 辰十己卯朔閏十二十二丁未大寒按開元寺經幢記三月十八日甲午不合太平寶訓十一月甲子日南至亦不合今推丁丑冬至與太常因革禮二十九日冬至合遼同甲子宋二遼十四宋初用應天術上元甲子以來四百八十二萬五千五百六十一年正戊寅三丁丑五丙子六乙巳七甲戌十癸卯朔正戊寅雨水按長編五丁丑朔不合今推丙子朔與遼朔考合遼仍用調元術正戊寅三丁丑四丙午七乙亥八甲辰十癸卯朔正戊寅雨水乙丑宋三遼十五宋正癸酉二壬寅四辛丑六庚子七己巳八戊戌十丁酉朔按唐劉幼升經幢後附題記三月庚辰朔二十五日丙申庚辰乃月建也遼正癸酉二壬寅四辛丑五庚午七己巳八戊戌十丁酉朔丙寅宋四遼十六宋正丁卯二丙申五乙丑六甲午八癸巳閏八壬戌十辛酉朔八辛酉秋分九壬辰霜降遼同丁卯宋五遼十七宋正庚寅四己未六戊午八丁巳九丙戌十一乙酉朔遼同戊辰宋開寶元遼十八宋正乙酉二甲寅四癸丑七壬午九辛巳十一庚辰十二己酉朔按長編正辛卯朔遼朔考宋三乙酉十庚戌並不合太平寶訓十一月癸亥日南至
