body:
  text: 丁丑十一丙子朔閏十十丙午小雪十一丁丑冬至按通鑑目録九戊申作八戊寅不合舊紀十一丙午朔亦不合辛巳二正丙子二乙巳五甲戌七癸酉九壬申十辛丑十二庚子朔按通鑑目録二乙巳上衍正乙亥三字今推正丙子朔與雙讚經幢合宋本不訛壬午三正庚午三己巳五戊辰八丁酉十丙申十一乙丑朔按通鑑正庚寅朔不合癸未四正甲子三癸亥六壬辰七辛卯九庚寅十二己未朔閏六六庚申大暑七辛卯處暑按通鑑目録十二己未作十一己丑不合李密思湘君廟記五月十八日己卯亦不合甲申五正戊子三丁亥五丙戌七乙酉十甲寅朔按舊紀正戊午朔不合乙酉六正癸未二壬子四辛亥六庚戌八己酉十一戊寅朔按通鑑目録二壬子作三壬午不合丙戌七正戊寅二丁未閏三丙午四乙亥五甲辰七癸卯十壬申朔三乙巳穀雨四乙亥小滿按新志九辛卯朔不合丁亥八正壬寅二辛未四庚午五己亥六戊辰八丁卯十丙寅朔按馮熙廟碑十一月壬子九日甲辰壬子亦月建也戊子九正丙申二乙丑五甲午六癸亥七壬辰九辛卯
